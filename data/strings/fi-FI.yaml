ONBOARD_MICE_EASY_SWITCH_DESCRIPTION: "Liitä hiiri jopa kolmeen laitteeseen ja vaihda niiden välillä Easy-Switch™-painikkeella. Yksi {DEVICE_NAME} riittää kannettavan tietokoneen, pöytäkoneen ja tabletin käyttämiseen."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION_V2: "Liitä hiiri jopa kolmeen laitteeseen ja vaihda niiden välillä Easy-Switch™-painikkeella. Yksi {DEVICE_NAME} riittää kannettavan tietokoneen, pöytäkoneen ja tabletin käyttämiseen."
