ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Craft-näppäimistön yläriville on jo määritetty oletuspikanäppäimiä, mutta voit myös luoda omia."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Pidätkö medianäppäimistä, mutta haluat silti käyttää F1-, F2- ja vastaavia painikkeita? Voit vaihtaa ne tavallisiksi toimintonäppäimiksi painamalla <strong>Esc+Fn.</strong> Tämä toimii vaihtokytkimenä – Fn-näppäintä ei tarvitse pitää painettuna joka kerta."
