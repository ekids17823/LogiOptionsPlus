EULA_RESTRICTIONS: "Et saa (etkä saa sallia muiden): (A) lisensoida, myydä, vuokrata, liisata, siirtää (paitsi kohdassa 1 nimenomaisesti sallitulla tavalla), jaella, isännöidä, ulkoistaa, julkistaa tai muutenkaan hyödyntää Ohjelmistoa kaupallisesti tai antaa sitä kolmannen osapuolen saataville, (B) kopioida Ohjelmistoa (paitsi kohdassa 1 nimenomaisesti sallitulla tavalla), (C) purkaa, ohjelmoida käänteisesti, yrittää saada selville lähdekoodia, laatia johdannaisteoksia Ohjelmistosta, sen asennusohjelmasta tai osista (paitsi sovellettavassa lainsäädännössä nimenomaisesti sallitulla tavalla) tai (D) poistaa Ohjelmistosta tavaramerkkiä, logoa, tekijänoikeusmerkintää, muita omistusoikeusmerkintöjä, selitteitä, symboleita tai merkintöjä tai tehdä niihin muutoksia."
EULA_OWNERSHIP: "Logitech ja sille käyttöoikeuden myöntäneet omistavat sekä säilyttävät itsellään kaikki oikeudet ja omistuksen Ohjelmistoon ja sen tekijänoikeuksiin sekä muihin aineettomiin oikeuksiin.  Logitech antaa sinulle käyttöoikeuden tähän Ohjelmistoon mutta ei myy sitä. Logitech pidättää itsellään kaikki oikeudet, joita ei nimenomaisesti ole myönnetty sinulle. "
EULA_AUTOMATIC_SOFTWARE_UPDATES: "Logitech voi antaa käyttöön virheenkorjauksia, päivityksiä ja muita muutoksia Ohjelmistoon (\"Päivitykset\").  Ne saatetaan asentaa automaattisesti ilman erillistä ilmoitusta tai erillisen hyväksynnän vastaanottoa.  Hyväksyt nämä automaattiset päivitykset.  Jos et halua tällaisia päivityksiä, lopeta Tuotteen käyttäminen.  Tämän Käyttöoikeussopimuksen ehdot koskevat kaikkia Logitechin toimittamia Päivityksiä, jotka korvaavat alkuperäisen Ohjelmiston tai täydentävät sitä, paitsi jos Päivityksen mukana tulee erillinen käyttöoikeussopimus. Tällaisessa tapauksessa sovelletaan kyseisen sopimuksen ehtoja."
EULA_APPLICATION_STORE: "Jos olet ladannut Ohjelmiston Sovellusmyymälästä, kuten Apple App Storesta, Apple Mac Storesta tai Google Playsta (\"Sovellusmyymälä\"), sitoudut noudattamaan kyseisen Sovellusmyymälän ehtoja. Jos Ohjelmiston käyttäminen edellyttää Sovellusmyymälän käyttöehtojen noudattamista ja Sovellusmyymälän sekä tämän Käyttöoikeussopimuksen välillä on ristiriitaisuuksia tai tulkintaongelmia, Sovellusmyymälän käyttöehdot ovat ensisijaiset mutta vain ristiriidan tai tulkintaongelman ratkaisemisen edellyttämässä laajuudessa. Tämän Käyttöoikeussopimuksen ehdot jäävät voimaan kaikessa laajuudessaan. Hyväksyt sen, että (i) tämä Käyttöoikeussopimus tehdään Logitechin ja sinun välillä eikä Sovellusmyymälän kanssa; (ii) Sovellusmyymälällä ei ole velvollisuutta tarjota minkäänlaista tukea tai huoltoa minkään sieltä ladatun Ohjelmiston osalta; (iii) Logitech, ei Sovellusmyymälä, on vastuussa tämän Käyttöoikeussopimuksen määrittämällä tavalla niiltä osin, joista se ei ole irtisanoutunut, Sovellusmyymälästä ladatun Ohjelmiston kaikista tuotetakuista, korvauspyynnöistä ja aineettomista oikeuksista. Joka tapauksessa Sovellusmyymälän enimmäisvastuu mistä tahansa takuusta on mahdollisen ostohinnan palauttaminen Ohjelmistosta; (iv) Apple ja sen tytäryhtiöt ovat Applen App Storesta ja Mac Storesta ladattujen ohjelmistojen osalta tämän Käyttöoikeussopimuksen kolmansia vastaanottajaosapuolia."
EULA_PRIVACY: "Tietosuojakäytäntömme on kuvattu käytännössämme {link} sekä erillisissä tietosuojailmoituksissamme (jotka muodostavat yhdessä ”Tietosuojakäytännöt”) jotka tarjoamme kun ohjelmisto, sovellus, tuote tai palvelu ostetaan, ladataan tai kun sitä käytetään. Asentamalla Ohjelmiston, käyttämällä Logitech-tuotteita tai antamalla meille henkilökohtaisia tietojasi hyväksyt ja annan luvan käytäntöihin ja ehtoihin, jotka on kuvattu Tietosuojakäytännöissä ja erillisissä tietosuojailmoituksissa. Tietosuojakäytäntömme on sisällytetty viittauksena tähän Käyttöoikeussopimukseen."
EULA_OPEN_SOURCE: "Tämä Käyttöoikeussopimus ei kata Ohjelmiston mahdollisesti sisältämää avoimen lähdekoodin ohjelmistoa (\"Avointa Lähdekoodia Sisältävät Komponentit\").  Ohjelmistoon sisältyvät Avointa Lähdekoodia Sisältävät Komponentit sekä niihin liittyvät sovellettavat käyttöoikeudet on lueteltu osoitteessa {link}. Avointa Lähdekoodia Sisältävien Komponenttien käyttäminen edellyttää niiden käyttöehtojen noudattamista.  Sinun on hyväksyttävä kunkin soveltuvan lisenssin ehdot, muutoin sinun ei tule käyttää ohjelmistoa. Mikään näissä Käyttöoikeusehdoissa ei rajoita Avointa Lähdekoodia Sisältävien Komponenttien käyttämistä mutta ei myöskään laajenna oikeuksiasi."
EULA_THIRD_PARTY_SOFTWARE: "Ohjelmiston ja Tuotteen yhteydessä voidaan käyttää muita tuotteita ja ohjelmistoja. Ne voivat sisältää linkkejä, käyttöliittymiä, sisältöä ja tietoja, jotka ovat peräisin muiden valmistajien ohjelmistoista (\"Muiden Valmistajien Ohjelmistot\").  Muiden Valmistajien Ohjelmistojen käyttämiseen sovelletaan niiden käyttöoikeuksien myöntäjien ehtoja, mukaan lukien muiden valmistajien tietosuojakäytännöt. Käyttämällä Muiden Valmistajien Ohjelmistoja sitoudut noudattamaan soveltuvia muun valmistajan ehtoja. Logitech ei anna minkäänlaisia takeita tällaisten Muiden Valmistajien Ohjelmistojen toimintakunnosta tai saatavuudesta.  Logitech tai käyttöoikeuksien myöntäjät eivät ole korvausvelvollisia tällaisen Muun Valmistajan Ohjelmiston poistamisesta tai käytön estymisestä. "
EULA_TERMINATION: "Tämä Käyttöoikeussopimus on voimassa, kunnes se irtisanotaan.  Tämän Käyttöoikeussopimuksen voi irtisanoa kumpi tahansa osapuoli, milloin tahansa ja mistä tahansa syystä.  Oikeutesi Ohjelmiston käyttöön päättyy automaattisesti ilman erillistä ilmoitusta Logitechiltä, jos rikot tämän Käyttöoikeussopimuksen ehtoja.  Irtisanomisen jälkeen sinun on lopetettava Ohjelmiston käyttö ja poistettava kaikki omistamasi ja hallitsemasi Ohjelmiston kopiot. Kohtien 6, 7, 8, 9 10, 11, 12, 16, 17 ja 18 ehdot jäävät voimaan irtisanomisen jälkeen.  Logitech ei takaa Ohjelmiston eikä Päivitysten saatavuutta tulevaisuudessa eikä ole vastuussa Ohjelmiston tai Päivitysten saatavuudesta eikä poistamisesta.  Logitech ei ole vastuussa huolto- tai tukipalvelujen saatavuudesta Ohjelmistolle."
