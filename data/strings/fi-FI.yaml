ONBOARD_KEYS_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Liitä näppäimistö jopa 2 laitteen kanssa ja vaihda niiden välillä Easy-Switch™-painikkeen painalluksella. Yksi {DEVICE_NAME} riittää kannettavan tietokoneen, pöytäkoneen ja tabletin käyttämiseen."
