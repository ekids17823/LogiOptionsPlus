EULA_US_GOVERNMENT_END_USERS: 'Ohjelmisto on kohdan 48 C.F.R. 2.101 määritelmän mukainen ”Kaupallinen tuote”, joka koostuu ”Kaupallisista tietokoneohjelmistoista” ja ”Kaupallisten tietokoneohjelmistojen dokumentaatiosta”, ja se on lisensoitu Yhdysvaltain hallinnon loppukäyttäjille (a) vain Kaupallisina tuotteina ja (b) vain niillä oikeuksilla, jotka on myönnetty kaikille muille loppukäyttäjille tämän Käyttöoikeussopimuksen ehtojen mukaisesti. Oikeudet julkaisemattomaan materiaaliin on pidätetty Yhdysvaltain tekijänoikeuslakien nojalla.'
