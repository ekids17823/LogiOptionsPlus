ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION: "Liitä näppäimistö jopa kolmeen laitteeseen ja vaihda niiden välillä Easy-Switch™-painikkeen painalluksella. Yksi {DEVICE_NAME} riittää kannettavan tietokoneen, pöytäkoneen ja tabletin käyttämiseen."
