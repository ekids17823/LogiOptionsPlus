EULA_ENTIRE_AGREEMENT: "Tämä Sopimus on koko Logitechin ja sinun välinen sopimus. Se on ensisijainen kaikkiin aiemmin tehtyihin Ohjelmistoa koskeviin kirjallisiin tai suullisiin sopimuksiin nähden.  Kaikki Käyttöoikeussopimuksen käännökset on tehty paikallisten vaatimusten täyttämiseksi. Jos englanninkielisen ja muunkielisten versioiden välillä esiintyy eroavaisuuksia, Käyttöoikeussopimuksen englanninkielinen versio on ensisijainen."

