ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Tavoitteemme Craft-näppäimistössä on <strong>virtaviivaistaa luovaa työnkulkuasi</strong>. Kruunu on ensimmäinen askeleemme tarjota tärkeimmät työkalut välittömästi käyttöösi napauttamalla, painamalla ja kääntämällä. Tämän vision pohjalta olemme <strong>laajentaneet Craftin ja kruunun ominaisuuksia</strong> , ja haluamme näyttää sinulle, miten ne toimivat."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Mestarillisuutta osoittimen kärjessä
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "<strong>Kruunua painamalla</strong> voit nyt käynnistää <strong>Actions Ringin</strong>, mukautettavan näytön peittokuvan, jonka avulla voit käyttää muun muassa työkaluja, suodattimia, säätöjä ja laajennuksia suoraan Ringin kautta silloin, kun tarvitset niitä."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Käynnistä toimintoja
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Kun Actions Ring on auki, <strong>valitse osoittimella toiminto, jonka haluat</strong> suorittaa, ja napsauta."
