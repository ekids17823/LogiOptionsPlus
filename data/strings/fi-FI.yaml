ONBOARD_SET_YOUR_F_KEYS_DESCRIPTION: Voit vaihtaa media- ja Fn-näppäinten välillä milloin tahansa painamalla Fn+Esc. F-näppäimiä voidaan käyttää vapaasti joutumatta samalla painamaan Fn-näppäintä.
