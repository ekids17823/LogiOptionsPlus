ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_SCREENSHOT: "Kokeile painaa sanelunäppäintä aloittaaksesi sanelun aktiiviseen tekstikenttään. Voit myös käyttää emojeja nopeasti painamalla emoji-näppäintä. Ota näytöstä helposti kuvakaappaus kuvakaappauspainikkeella."
