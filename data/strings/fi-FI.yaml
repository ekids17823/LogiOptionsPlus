ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Jos haluat tehdä nopeita säätöjä, <strong>siirrä vain osoitin toiminnon päälle ja kierrä kruunua</strong>. Voit säätää toimintoa myös <strong>napsauttamalla ja vetämällä toimintoa osoittimella vasemmalle tai oikealle</strong>."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Mukautuu sovelluksiisi
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>mukautuu käyttämiisi sovelluksiin</strong> ja muuttaa automaattisesti laitteen toimintoja lisäämään tehokkuutta. Voit käyttää oletussovellusprofiileja tai luoda omia tehostamaan työnkulkujasi."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: "Alla olevaa painiketta painamalla näet, mitä uutta Craft-näppäimistöön on tullut Options+-päivityksen jälkeen."
