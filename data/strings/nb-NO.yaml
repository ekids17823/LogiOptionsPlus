##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Den øverste raden på Craft-tastaturet har allerede blitt tilordnet noen standard hurtigtaster, men du kan også opprette dine egne."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Som å ha mediekontrollene, men likevel vil ha tilgang til F1, F2 osv.? Du kan bytte mellom å bruke dem som standard funksjonstaster ved å trykke på <strong>Esc+Fn.</strong> Denne fungerer som en bryter – du trenger ikke å holde nede Fn-tasten hver gang."
ONBOARD_CRAFT_BASED_ACTIONS_RING: En ny kroneopplevelse
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Vårt oppdrag med Craft var å <strong>effektivisere den kreative arbeidsflyten</strong>. Kronen var vårt første skritt for å gi deg umiddelbar tilgang til viktige verktøy ved å trykke, holde og dreie. Vi har bygget videre på denne visjonen for å <strong>utvide funksjonaliteten</strong> til Craft og kronen, og vi gleder oss til å vise deg hvordan den fungerer."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Full kontroll på skjermen
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Når du <strong>trykker på kronen</strong>, utløser du nå <strong>Actions Ring</strong>, et tilpassbart skjermoverlegg som gir deg direkte tilgang til verktøy, filtre, justeringer, plugin-moduler og mere til, direkte på Ring, akkurat når du trenger dem."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Starthandlinger
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Når Actions Ring er åpen, bruker du markøren til å <strong>velge handlingen du vil</strong> utføre, og klikker."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Foreta justeringer
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "For raske justeringer <strong>holder du markøren og dreier på kronen</strong> for å justere. Du kan også justere ved å <strong>klikke og dra til venstre eller høyre </strong>på handlingen med markøren."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Tilpasser seg appene dine
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>tilpasser seg programmene du bruker</strong>, og endrer automatisk enhetens funksjoner for økt effektivitet. Du kan bruke standard programprofiler eller opprette dine egne for å strømlinjeforme arbeidsprosessen."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Trykk på knappen nedenfor for å se hva som er nytt med Craft-tastaturet etter oppgraderingen til Options+.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Alt du trenger for arbeidet, uansett hvor du er."
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "{DEVICE_NAME} er utviklet for å oppmuntre til bedre produktivitet og holdning, uansett hvor arbeidsdagen skjer."
