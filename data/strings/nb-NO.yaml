EULA_APPLICATION_STORE: "Hvis du har lastet ned programvaren fra et applikasjonsmarked eller en nettbutikk, f.eks. Apple App Store eller Google Play («appbutikk»), er du også underlagt alle brukervilkårene til den aktuelle appbutikken. Hvis din bruk av programvaren er underlagt vilkårene til en appbutikk, i tilfelle konflikter eller tvetydigheter mellom vilkårene til appbutikken og denne EULA-en, skal vilkårene til appbutikken gjelde, men kun i den grad det er nødvendig for å løse den aktuelle konflikten eller tvetydigheten. Ellers skal vilkårene i denne EULA-en gjelde og implementeres. Du erkjenner at (i) denne lisensavtalen er inngått mellom Logitech og deg, og ikke med App Store; (ii) App Store har ingen forpliktelse til å gi støtte eller vedlikehold overhodet i forbindelse med programvare som er lastet ned derfra; (iii) Logitech, ikke App Store, vil være ansvarlig som angitt i denne EULA, i den grad det ikke fraskrives, for eventuelle produktgarantier, produktkrav og åndsverkskrav for programvaren lastet ned fra en App Store. I alle tilfeller skal App Stores maksimale ansvar for eventuelle garantier være refusjon av kjøpsprisen (hvis aktuelt) til programvaren, (iv) Apple og deres partnerselskaper er tredjepartsbegunstigede i denne EULA-en for programvare som lastes ned fra Apple App Store og Mac Store."
EULA_PRIVACY: "Vår personvernpraksis er beskrevet i vår {link}, samt i egne personvernerklæringer (samlet kalt «personvernreglene») som angis når en programvare, en app, et produkt eller en tjeneste kjøpes, lastes ned eller brukes. Ved å installere programvaren, bruke Logitech-produktene eller sende oss personopplysninger godtar du og samtykker i rutinene, vilkårene og betingelsene som beskrives i Personvernerklæringen og i eventuelle separate personvernerklæringer. Denne EULA-en inneholder henvisninger til vår Personvernerklæring."
EULA_OPEN_SOURCE: "Denne EULA-en gjelder ikke åpen kildekode-programvare som kan være inkludert i programvaren («komponenter med åpen kildekode»). Komponentene med åpen kildekode som gjelder for Programvaren, og tilhørende gjeldende lisenser, kan være oppført på: {link}. Din bruk av komponenter med åpen kildekode er underlagt vilkårene i hver relevante sluttbrukerlisens som følger med slike komponenter. Du må godta vilkårene i hver av de relevante lisensene, og bør ikke bruke programvaren dersom du ikke godtar disse. Ingenting i denne EULA-en begrenser dine rettigheter under, eller gir deg rettigheter som erstatter, vilkårene og betingelsene i gjeldende sluttbrukerlisens for slik åpen kildekode-programvare."
EULA_THIRD_PARTY_SOFTWARE: "Programvaren og produktet kan brukes sammen med andre produkter og programmer, og kan inneholde koblinger eller grensesnitt til, samt innhold og data fra tredjeparts programvare («tredjepartsprogrammer»). Bruk av slike tredjepartsprogrammer styres av vilkårene til lisensgiveren av slike tredjepartsprogrammer, inkludert tredjepartens personvernerklæring. Ved å åpne eller bruke tredjepartsprogrammene samtykker du i å overholde gjeldende tredjepartsvilkår. Logitech gir ingen representasjoner eller garantier om driften eller tilgjengeligheten av slike tredjepartsprogrammer. Verken Logitech, eller Logitechs lisensgivere, skal holdes ansvarlig for eventuell utilgjengelighet eller fjerning av slike tredjepartsprogrammer."
EULA_TERMINATION: "Denne EULA-en skal fortsette til den sies opp. Begge partene kan når som helst si opp denne EULA-en uansett årsak. Din rett til å bruke programvaren opphører automatisk, uten forvarsel fra Logitech, dersom du bryter noen av vilkårene i denne EULA-en. Ved opphør av avtalen må du slutte å bruke programvaren, og fjerne eventuelle kopier av programvaren som du eier eller kontrollerer. Bestemmelsene i avsnitt 6, 7, 8, 9 10, 11, 12, 16, 17 og 18 vil forbli gyldige, etter enhver slik oppsigelse. Logitech gir ingen representasjoner om fremtidig tilgjengelighet av programvaren eller eventuelle oppdateringer, og de skal ikke holdes ansvarlig for eventuell utilgjengelighet eller fjerning av programvaren eller oppdateringer. Logitech skal ikke ha noe ansvar for å levere støttetjenester når det gjelder programvaren."
EULA_WARRANTY_DISCLAIMER: 'I DEN GRAD DE TILLATES AV GJELDENDE LOV, LEVERES LOGITECHS PROGRAMVARE OG TJENESTENE «SOM DE ER», MED ALLE FEIL OG UTEN NOEN TYPE GARANTI. DU GODTAR UTTRYKKELIG OG SAMTYKKER I AT, I DEN GRAD GJELDENDE LOVGIVNING TILLATER DET, ER DIN BRUK AV LOGITECH-PROGRAMVAREN OG TJENESTENE PÅ EGEN RISIKO, OG DU TAR SELV ANSVAR FOR EVENTUELLE RISIKOER VEDRØRENDE TILFREDSSTILLENDE KVALITET, YTELSE, NØYAKTIGHET OG BRUK. LOGITECH OG LOGITECHS LISENSGIVERE FRASKRIVER SEG HERVED ALLE GARANTIER OG BETINGELSER KNYTTET TIL LOGITECH-PROGRAMVAREN OG -TJENESTENE, ENTEN DE ER DIREKTE, INDIREKTE ELLER LOVBESTEMTE, INKLUDERT, MEN IKKE BEGRENSET TIL, UNDERFORSTÅTTE GARANTIER OG/ELLER BETINGELSER RELATERT TIL SALGBARHET, TILFREDSSTILLENDE KVALITET, EGNETHET FOR BESTEMTE FORMÅL, NØYAKTIGHET, FREDELIG NYTELSE AV EIENDOM OG IVARETAKELSE AV TREDJEPARTS RETTIGHETER. LOGITECH GIR INGEN GARANTIER MOT FORSTYRRELSER AV DIN NYTELSE AV LOGITECH-PROGRAMVAREN OG -TJENESTENE, ELLER OM AT FUNKSJONENE I LOGITECH-PROGRAMVAREN OG -TJENESTENE SKAL OPPFYLE DINE BEHOV, AT LOGITECH-PROGRAMVAREN OG -TJENESTENE SKAL FUNGERE UFORSTYRRET OG FEILFRITT, OG AT FEIL I LOGITECH-PROGRAMVAREN OG -TJENESTENE SKAL KORRIGERES. INGEN LOGITECH-FORHANDLER, -REPRESENTANT ELLER -ANSATT ER AUTORISERT TIL Å FORETA ENDRINGER, UTVIDELSER ELLER TILFØYELSER TIL DENNE GARANTIFRASKRIVELSEN.'
EULA_WARRANTY_DISCLAIMER_ADDON: "Enkelte jurisdiksjoner tillater ikke utelatelse av underforståtte garantier eller begrensninger av relevante lovfestede forbrukerrettigheter, så det er mulig at begrensningene eller utelatelsene som er nevnt ovenfor, ikke gjelder deg."
EULA_LIMITATION_OF_LIABILITY: "I DEN GRAD GJELDENDE LOVGIVNING TILLATER DET, SKAL LOGITECH OG LOGITECHS LISENSGIVERE ALDRI HOLDES ANSVARLIGE FOR EVENTUELLE UTGIFTER I FORBINDELSE MED FREMSKAFFELSE AV ERSTATNINGSPRODUKTER ELLER -TJENESTER, TAP AV FORTJENESTE, TAP AV DATA ELLER INFORMASJON ELLER ANDRE SPESIELLE, INDIREKTE SKADER ELLER FØLGESKADER SOM PÅ NOEN MÅTE SKYLDES SALG AV, LISENSIERING AV, BRUK AV ELLER MANGLENDE EVNE TIL Å BRUKE ET LOGITECH-PRODUKT ELLER EN LOGITECH-TJENESTE, UAVHENGIG AV HVORDAN SKADEN BLE PÅFØRT, UAVHENGIG AV ANSVARSTEORIEN (KONTRAKT, IKKE-ØKONOMISK ELLER ANNET), SELV OM LOGITECH ER UNDERRETTET OM MULIGHETEN FOR SLIKE SKADER. UNDER INGEN OMSTENDIGHETER SKAL LOGITECHS ELLER LOGITECHS LISENSGIVERES TOTALE ANSVAR OVERSKRIDE DEN FAKTISKE PENGESUMMEN SOM BLE BETALT FOR LOGITECH-PRODUKTET ELLER -TJENESTEN SOM DANNER GRUNNLAG FOR ERSTATNINGSKRAVET. De ovennevnte begrensningene gjelder selv om ovennevnte rettsmiddel ikke gir resultater. Enkelte lands lovgivning tillater ingen form for fraskrivelse eller begrensing av ansvar ved uhell og følgeskader, så det er mulig at begrensningene eller unntaket som er nevnt ovenfor, ikke gjelder deg. Begrensningene ovenfor gjelder ikke ved personskader når, og i den grad, gjeldende lover krever et slikt ansvar."
EULA_PRODUCT_LIMITATIONS: "PROGRAMVAREN ER IKKE EGNET FOR BRUK I FORBINDELSE MED DRIFT AV ATOMKRAFTVERK, LUFTFARTSNAVIGASJON ELLER -KOMMUNIKASJONSSYSTEMER, LUFTTRAFIKKLEDELSE, MEDISINSKE APPARATER ELLER ANNET UTSTYR, DER FEIL I PROGRAMVAREN KAN FØRE TIL DØDSFALL, PERSONSKADER ELLER ALVORLIGE FYSISKE ELLER MILJØMESSIGE SKADER. DU ERKJENNER AT PROGRAMVAREN IKKE ER SERTIFISERT FOR NØDFORMÅL OG IKKE SKAL BRUKES TIL SLIKE FORMÅL. LOGITECH OVERVÅKER IKKE NØDMELDINGER, OG ER IKKE ANSVARLIG FOR Å LEVERE NØDTJENESTER TIL HJEMMET DITT."
EULA_US_GOVERNMENT_END_USERS: 'Programvaren er en «kommersiell vare», slik begrepet er definert ved 48 C.F.R. 2.101, som består av «Kommersiell dataprogramvare» og «Dokumentasjon for kommersiell datamaskinprogramvare» og er lisensiert i USA Offentlige sluttbrukere (a) bare som handelsvarer og (b) med bare de rettighetene som er gitt til alle andre sluttbrukere i henhold til vilkårene og betingelsene i denne EULA-en. Upubliserte rettigheter – forbeholdt lov om opphavsrett i USA.'
EULA_EXPORT_LAW_ASSURANCES: "Du samtykker til å ikke eksportere eller videre-eksportere programvaren dersom det utgjør brudd på relevante lover og regler, inkludert, uten begrensninger, lovgivning i USA, EU, Sveits og/eller jurisdiksjonen(e) der programvaren ble kjøpt."
EULA_AGENTS: "Dersom du kjøper programvaren på vegne av en annen person eller enhet, representerer du vedkommende og garanterer at du har autoritet til å binde den personen eller enheten som du kjøper programvaren for, til betingelsene som gjelder i denne sluttbrukeravtalen. Du garanterer at du er gammel nok i din jurisdiksjon til å åpne eller bruke programvaren og å inngå denne EULA-en."
EULA_CONTROLLING_LAW_1: "Dersom du befinner deg i USA, styres og tolkes denne sluttbrukeravtalen av og i samsvar med lovgivningen i USA og i delstaten California, uten hensyn til eller bruk av reglene eller prinsippene i valgt lovgivning. Hvis du befinner deg utenfor USA, er denne EULA-en utelukkende underlagt sveitsisk lovgivning. Hvis noen bestemmelse i denne EULA-en blir erkjent ugyldig, er partene likevel innforstått med at intensjonene til partene gjenspeiles i bestemmelsen, og resten av vilkårene i denne avtalen skal gjelde fullt og helt."
EULA_CONTROLLING_LAW_2: "Hvis du bor i USA og bruker programvaren eller produktet utelukkende til personlig eller husholdningsbruk, gjelder avsnitt 17:"
EULA_ARBITRATION: "Eventuelle tvister som oppstår mellom deg og Logitech skal løses gjennom endelig og bindende voldgift som gjennomføres i henhold til forbrukervoldgiftsreglene («reglene») til American Arbitration Association, bortsett fra at eventuelle tvister som ellers ville falle under jurisdiksjonen til en Small Claims Court i USA (forliksrådet i Norge), kan, hvis en av partene velger det, fremlegges for en Small Claims Court i en kompetent jurisdiksjon før oppnevning av voldgiftsdommer. Voldgiftsprosessen skal gjennomføres av en enkelt voldgiftsdommer (megler) som velges ved gjensidig avtale mellom partene eller under utvelgelsesprosessen som er angitt i reglene. Utgiftene til menglingen skal fordeles mellom partene som fastsatt i reglene. Voldgiftsdommen skal være endelig og bindende for partene uten klagerett. FOR Å UNNGÅ TAP AV BEVIS OG SIKRE RASK BEHANDLING AV KRAV SOM OPPSTÅR I FORBINDELSE MED DENNE AVTALEN, SKAL DEN PART SOM REISER KRAV I HENHOLD TIL DENNE EULA-EN, GI DEN ANDRE PARTEN ET SKRIFTLIG VARSEL OM GRUNNLAGET FOR KRAVET INNEN ETT (1) ÅR, ELLER INNEN MINIMUMSPERIODEN SOM KREVES I GJELDENDE LOVGIVNING HVIS DEN ER LENGRE ENN ETT (1) ÅR, FRA DATOEN DA HENDELSEN ELLER FAKTAENE SOM FØRTE TIL KRAVET, FANT STED, ELLER DENNE PARTEN FRASIER SEG RETTEN TIL Å FORFØLGE EVENTUELLE KRAV BASERT PÅ EN SLIK HENDELSE ELLER SLIKE FAKTA."
EULA_ENTIRE_AGREEMENT: "Denne avtalen fastsetter hele avtalen mellom deg og Logitech, og overstyrer alle tidligere avtaler, både skriftlige og muntlige, som gjelder programvaren. Eventuelle oversettelser av denne EULA-en er gjort for å oppfylle lokale krav, og hvis det oppstår konflikter mellom den engelske versjonen og en versjon oversatt til et annet språk, er det den engelske versjonen av denne EULA-en som gjelder."

