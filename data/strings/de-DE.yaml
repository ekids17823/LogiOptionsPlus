WHITE_BALANCE_TEMPERATURE_COMPENSATION_TOOLTIP_INFO: Mit der Temperaturkompensation können Sie die Farbtemperatur des automatischen Weißabgleichs ändern.
COLOR_TEMPERATURE_TOOLTIP_INFO: "Mit der Option „Temperatur“ können Sie die Farbbalance manuell einstellen, sodass die Bilder entsprechend unterschiedlichen Lichtverhältnissen wärmer oder kühler wirken."
TINT_TOOLTIP_INFO: Mit der Option „Tönung“ können Sie die Farben Grün und Magenta in Ihrem Video manuell anpassen.
VIBRANCE_TOOLTIP_INFO: "Mit der Option „Dynamik“ können Sie die Farbintensität anpassen. Dies funktioniert ähnlich wie die Sättigung, jedoch auf dezentere Weise, wobei insbesondere die gedeckteren Farben in Ihrer Szene berücksichtigt werden."
BRIGHTNESS_TOOLTIP_INFO: "Ermöglicht die Anpassung der Gesamthelligkeit des Bildes, nachdem es vom Sensor erfasst wurde. Wenn das Bild zu dunkel ist, empfiehlt es sich eventuell auch, eine Lichtquelle hinzuzufügen."
CONTRAST_TOOLTIP_INFO: Kontrast ist der Unterschied zwischen hellen und dunklen Bereichen eines Bildes.
SATURATION_TOOLTIP_INFO: Mit der Sättigung können Sie die Intensität von Farben anpassen. Setzen Sie die Sättigung auf 0 für ein Schwarzweiß-Bild.
SHARPNESS_TOOLTIP_INFO: „Schärfe“ ermöglicht das Wechseln zwischen einem weicher gezeichneten Bild (glatter) und einem Bild mit klareren Kanten (mehr Schärfe). Eine höhere Bildschärfe kann auch ein stärkeres Bildrauschen verursachen.
