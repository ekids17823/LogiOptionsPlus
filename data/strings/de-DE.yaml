##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "In der obersten Reihe Ihrer Craft Tastatur sind bereits einige Standard-Tastenkombinationen zugewiesen, Sie können aber auch eigene erstellen."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Sie möchten gern die Multimedia-Bedienelemente, aber weiterhin Zugriff auf F1, F2 usw. haben? Sie können zwischen ihnen als Standard-Funktionstasten wechseln, indem Sie <strong>Esc+Fn</strong> drücken. Dies fungiert als Umschalter – Sie müssen die Fn-Taste nicht jedes Mal gedrückt halten."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Ein Drehrad für ein ganz neues Erlebnis
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Unsere Mission mit der Craft Tastatur war es, <strong>Ihren kreativen Arbeitsablauf zu optimieren</strong>. Das Drehrad war unser erster Schritt, um Ihnen sofortigen Zugriff auf wichtige Tools zu geben – einfach tippen, drücken und drehen. Diese Vision für die Craft Tastatur mit Drehrad haben wir nun um <strong>weitere Funktionen</strong> ausgebaut. Gerne zeigen wir Ihnen, wie das funktioniert."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Meisterleistungen auf Knopfdruck
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Wenn Sie auf das <strong>Drehrad drücken</strong>, lösen Sie den <strong>Actions Ring</strong> aus, ein anpassbares Onscreen-Overlay, das Ihnen direkten Zugriff auf Tools, Filter, Anpassungen, Plug-Ins und mehr direkt auf dem Ring ermöglicht – genau dann, wenn Sie sie brauchen."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Aktionen starten
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Sobald der Actions Ring geöffnet ist, <strong>wählen Sie mit dem Mauszeiger die Aktion</strong> aus, die Sie ausführen möchten, und klicken Sie darauf."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Anpassungen vornehmen
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Für schnelle Anpassungen <strong>bewegen Sie die Maus einfach über die Aktion und drehen Sie das Drehrad</strong> zum Anpassen. Sie können die Aktion auch anpassen, indem Sie mit dem Mauszeiger nach <strong>links oder rechts </strong>auf die Aktion ziehen."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Anpassbar an Ihre Apps
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Der Actions Ring <strong>passt sich an die von Ihnen verwendeten Anwendungen an</strong> und ändert automatisch die Funktionen des Geräts, um die Effizienz zu verbessern. Sie können die Standardanwendungsprofile verwenden oder eigene erstellen, um Ihren Workflow zu optimieren."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: "Drücken Sie die Taste unten, um zu sehen, was sich bei Ihrer Craft Tastatur seit dem Upgrade auf Options+ neu gestaltet hat."
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Alles, was Sie zum Arbeiten brauchen, egal wo Sie gerade sind."
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "{DEVICE_NAME} wurde entwickelt, um mehr Produktivität und eine bessere Körperhaltung zu ermöglichen, ganz gleich, wo Sie Ihren Arbeitstag verbringen."
ONBOARD_SET_UP_EMOJI_KEY: Emoji-Taste
ONBOARD_SET_UP_EMOJI_DESCRIPTION_V2: Verleihen Sie Ihren Nachrichten im Handumdrehen eine persönliche Note mit der Emoji-Taste – sorgen Sie per Knopfdruck für ein bisschen gute Laune!
ONBOARD_SET_UP_PRINT_SCREEN_TITLE: Bildschirm drucken
ONBOARD_SET_UP_PRINT_SCREEN_DESCRIPTION_V2: Machen Sie mit der Druck-Taste schnell einen Screenshot vom gesamten Bildschirm und speichern Sie diesen.

