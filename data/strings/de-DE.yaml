HDR_TOOLTIP_INFO: "HDR kombiniert mehrere Belichtungen, um einen größeren Beleuchtungsbereich zu erfassen und den Kontrast für die dunklen und hellen Bildbereiche zu verbessern."
ENHANCED_VIDEO_STABILIZATION: Verbesserte Videostabilisierung
