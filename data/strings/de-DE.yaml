SHUTTER_SPEED_TOOLTIP: "Die Verschlusszeit wirkt sich auf die Belichtung und die Bewegungsunschärfe aus. Eine langsamere Wiedergabe wirkt heller, wobei allerdings Bewegungsunschärfe hinzukommt. Eine schnellere Wiedergabe ist klarer, aber dunkler. Sobald Sie mit Ihrer Bewegungsunschärfe zufrieden sind, passen Sie die Helligkeit mit der ISO-Steuerung weiter an."
