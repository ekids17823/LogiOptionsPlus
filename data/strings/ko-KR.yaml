ONBOARD_LIVING_ROOM_KB_D_PAD_DESCRIPTION: D-패드로 스마트 TV의 화면 메뉴와 앱 인터페이스를 간편하게 탐색할 수 있습니다. D-패드를 사용하여 즐겨 사용하는 스트리밍 앱의 미디어 플레이어를 제어할 수 있습니다.
ONBOARD_LIVING_ROOM_KB_K830_GESTURE_CONTROL_DESCRIPTION: 제스처 컨트롤이 손의 움직임을 인식하기 때문에 컴퓨터 시스템의 제어가 더욱 쉬워집니다.
ONBOARD_SMART_BACKLIGHT_DESCRIPTION: 조도 감지 센서가 백라이팅 레벨을 조절하여 자연광이 충분할 때 전원을 절약합니다. 하이라이트된 키를 이용하여 수동으로 백라이팅을 조절해보세요.
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_TITLE: 왼쪽 및 오른쪽 마우스 클릭 버튼
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_DESCRIPTION: 키보드의 왼쪽 상단에 있는 왼쪽 및 오른쪽 마우스 클릭 버튼입니다. 오른손으로 터치패드를 탐색하고 왼손으로 선택할 수 있습니다.
