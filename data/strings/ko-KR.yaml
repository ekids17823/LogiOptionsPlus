PIPL_SETTINGS_DESC: 제한된 개인 데이터 수집은 이 소프트웨어가 작동하는 데 필요하다는 점에 유의하세요. 이 설정을 수정하면 서비스가 제대로 작동하지 않을 수 있습니다.
