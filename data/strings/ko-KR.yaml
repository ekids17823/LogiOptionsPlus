ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_TITLE: 제스처 컨트롤
ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_DESCRIPTION: 대형 TV 화면에 최적화된 터치패드로 간편한 웹 브라우징을 즐겨보세요. 두 손가락으로 긴 웹 페이지를 위아래로 스크롤하고 TV에 연결된 PC를 확대 및 축소할 수 있습니다.
