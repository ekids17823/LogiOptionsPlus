ONBOARD_SETUP_DPI_SWITCH_DESCRIPTION: DPI 스위치 버튼을 클릭하여 두 개의 민감도 레벨을 전환할 수 있습니다. 버튼을 눌러 더욱 빠르게 움직이거나 정확도를 높일 수 있습니다.
