ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION: "키보드를 최대 3개의 장치와 페어링하고 Easy-Switch™ 버튼으로 손쉽게 기기를 전환하세요. 노트북, 데스크탑, 태블릿 모두 {DEVICE_NAME} 하나면 충분합니다."
ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION_V2: "키보드를 최대 세 개의 장치와 페어링하고 Easy-Switch™ 키를 눌러 기기를 전환하세요. 휴대폰, 노트북 또는 데스크톱에 하나의 {DEVICE_NAME} 키보드를 사용하세요."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION: "마우스를 최대 3개의 장치와 페어링하고 Easy-Switch™ 버튼으로 손쉽게 기기를 전환하세요. 노트북, 데스크탑, 태블릿 모두 {DEVICE_NAME} 하나면 충분합니다."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION_V2: "마우스를 최대 3개의 장치와 페어링하고 Easy-Switch™ 버튼으로 손쉽게 기기를 전환하세요. 노트북, 데스크탑, 태블릿 모두 {DEVICE_NAME} 하나면 충분합니다."
ONBOARD_KEYS_K480_EASY_SWITCH_DESCRIPTION: "최대 3개의 장치에 키보드를 페어링하고 선택 다이얼로 장치를 전환할 수 있습니다. 노트북, 데스크탑, 태블릿 모두 {DEVICE_NAME} 하나면 충분합니다."
