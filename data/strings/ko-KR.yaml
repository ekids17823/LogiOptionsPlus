EULA_TEXT_1: "{openingTag} 이 최종 사용자 라이선스 계약(\"EULA\")은 사용자와 LOGITECH EUROPE S.A.(이하 \"Logitech\") 사이의 법적 계약입니다. 사용자는 본 계약을 자세히 읽은 후 소프트웨어를 설치하거나 LOGITECH 제품을 사용해야 합니다. 본 소프트웨어를 설치하거나 LOGITECH 제품을 사용할 경우 본 EULA의 조항에 구속됨을 동의하는 것입니다. 이 EULA의 약관에 동의하지 않는 경우 구매처에 적용되는 반품 정책의 약관에 따라 제품을 반환하고 환불받을 수 있습니다.{closingTag}{openingTag}귀하가 자국 또는 거주 지역의 법적 최저 연령 미만인 경우, 부모 또는 법적 보호자가 EULA 약관을 읽고 수락해야 합니다.{closingTag}{openingTag} 사용자가 미국에 거주하고 있고(또는 주요 사업장이 미국 소재일 경우), 개인적 또는 가정용으로만 본 소프트웨어나 제품을 사용하는 경우 소비자 중재 규칙 하에 중재가 시행되므로 아래의 17절을 읽어 주십시오.{closingTag}{openingTag} 아래 4절에서 기술한 것처럼 사용자는 자동 소프트웨어 업데이트에 동의하는 것입니다. 동의하지 않으면 제품을 사용하거나 소프트웨어를 설치할 수 없습니다. {closingTag}{openingTag} 아래의 제품 제한 절은 생명 안전 및 중요 사용과 관련하여 소프트웨어 및 관련 서비스의 중요한 제한 사항을 설명합니다. 이 절은 귀하가 인정하고 동의해야 하므로 신중히 읽으십시오. {closingTag}{openingTag} “소프트웨어”의 정의: (i) 데스크톱 또는 모바일 장치에 다운로드하여 설치한 소프트웨어 응용 프로그램을 포함한 모든 소프트웨어 프로그램 또는 응용 프로그램, (ii) Logitech 제품에 내장된 소프트웨어 형태의 모든 소프트웨어, (iii) 그러한 소프트웨어의 관련 문서, 수정된 버전, 업그레이드 또는 개선 사항(업데이트 또는 다운로드 시점에서 다른 약관 하에 제공되지 않는 한), 그러한 소프트웨어의 모든 후속 버전, 사본.{closingTag}{openingTag} 이 조항은 사용자에게 구체적인 법적 권리를 부여하며 사용자는 또한 관할권에 따라 다른 법적 권리를 추가로 갖습니다.{closingTag}"
EULA_LICENSE: "본 EULA의 조건에 따라 Logitech은 사용자가 구입한 Logitech 제품 또는 사용한 Logitech 서비스에 한해 소프트웨어를 사용할 수 있도록 사용자에게 제한적인 비독점적 사용권을 부여합니다. 이 소프트웨어는 로지텍 제품에 내장되어 있는 경우를 제외하고 사용자가 본 소프트웨어의 사용을 지원하기 위해 백업 또는 보관 목적만으로 복사할 수 있으며 가정 내 또는 사내 네트워크 서버에서 사용자의 소유 또는 관리하에 있는 장치에 다운로드하기 위한 목적으로 하며 여기에 명시된 대로 소프트웨어를 사용하기 위한 목적으로만 사용할 수 있습니다. 모든 사본에는 원본에 포함된 모든 저작권 및 기타 소유권 고지 사항이 포함되어야 합니다. 귀하가 이용하는 Logitech 서비스를 통해 소유 또는 통제할 수 있는 내장 소프트웨어의 경우. 타인이 본 EULA에 동의하는 한 사용자는 해당 타인에게 이 소프트웨어를 사용하는 Logitech 제품의 영구적 양도를 통해 소프트웨어를 영구적으로 양도할 수 있으며, 그러한 양도 후에는 제품 및 소프트웨어 사용을 중단합니다."
EULA_RESTRICTIONS: "사용자에게 부여된 제한 사항은 다음과 같습니다. 사용자는 (A) 소프트웨어의 사용권 부여, 판매, 임대, 대여, 양도(1절에서 명시적으로 허용된 경우는 제외), 배포, 호스팅, 외주, 공개 또는 달리 상업적으로 이용하거나 제3자에게 소프트웨어를 제공하는 행위, (B) 소프트웨어를 복사하는 행위(1절에서 명시적으로 허용된 경우는 제외), (C) 소프트웨어 또는 그 일부에 대한 소스 코드의 디컴파일링, 디어셈블링, 역엔지니어링 또는 파생 작업을 하거나 설치 프로그램을 만들려고 시도하는 행위(관련 법에서 명시적으로 허용된 경우는 제외), (D) 소프트웨어에 있는 상표, 로고, 저작권 또는 기타 독점적 고지, 범례, 기호 또는 레이블을 삭제 또는 변형하려는 행위를 해서는 안 되며 타인에게 그러한 행위를 허락해서도 안 됩니다."
EULA_OWNERSHIP: "Logitech 및 해당 사용권 허가자는 소프트웨어 및 모든 저작권 및 기타 지적 재산권에 대한 모든 권리, 소유권 및 이권을 소유 및 보유합니다. 이 소프트웨어는 Logitech에 의해 사용자에게 판매되는 것이 아니라 사용권을 부여한 것으로 Logitech은 사용자에게 명시적으로 부여되지 않은 모든 권리를 보유합니다."
EULA_AUTOMATIC_SOFTWARE_UPDATES: "Logitech은 때때로 버그 수정, 업데이트, 업그레이드 및 기타 소프트웨어 수정 사항(이하 \"업데이트\")을 제공할 수 있습니다. 이것은 추가 공지 또는 추가 동의 없이 자동으로 설치될 수 있습니다. 사용자는 이 자동 업데이트에 동의합니다. 그러한 업데이트를 원하지 않는다면 제품 사용을 중단하십시오. 본 EULA 조건은 원래 소프트웨어를 교체하거나 보완하는 Logitech에서 제공하는 모든 업데이트에 적용됩니다. 단 그러한 업데이트가 별도의 사용권과 함께 제공되는 경우 해당 사용권의 조건이 적용됩니다."
EULA_APPLICATION_STORE: "Apple App Store, Apple Mac Store 또는 Google Play(이하 \"App Store\")와 같은 애플리케이션 시장 또는 매장에서 소프트웨어를 다운로드한 경우 사용자는 해당 App Store 이용 약관의 적용을 받습니다. 사용자의 소프트웨어 사용이 App Store 이용 약관의 적용을 받는 경우, App Store 약관과 본 EULA 간에 상충되거나 모호한 경우 App Store 약관이 적용됩니다. 단, 그러한 분쟁이나 모호성을 해결하는 데 필요한 범위까지만 적용되며 본 EULA의 조항은 완전한 효력을 유지합니다. 사용자는 (i) 본 EULA는 App Store가 아닌 Logitech과 사용자 간에 체결된 것이고 (ii) App Store는 다운로드한 소프트웨어와 관련해서 어떤 지원이나 유지보수를 제공할 의무가 없으며 (iii) 본 EULA에 제공된 대로 지정된 범위까지 App Store가 아닌 Logitech이 App Store에서 다운로드한 소프트웨어의 제품 보증, 제품 청구 및 지적재산 청구에 대한 책임이 있고, 어떤 경우에도 보증에 대한 App Store의 최대 책임은 소프트웨어의 구매 가격 환불로 국한되며 (iv) Apple과 해당 자회사는 Apple App Store 및 Mac Store에서 다운로드한 소프트웨어에 대해 본 EULA의 제3의 수혜자임을 확인합니다."
EULA_PRIVACY: "당사의 개인정보 처리방침은 {link}을 비롯하여 소프트웨어, 앱, 제품 또는 서비스를 구매하거나 다운로드하거나 사용할 때 제공되는 별도의 개인정보 보호 설명문(통칭하여 “개인정보 처리방침”이라 함)에 나와 있습니다. 본 소프트웨어를 설치하고 Logitech 제품을 이용하거나 당사에 개인 정보를 제공할 경우, 사용자는 개인정보 보호정책 및 별도의 개인정보 보호 설명문에 기술된 관행, 조건과 조항을 동의하는 것입니다. 당사의 개인정보 보호정책은 본 EULA에 참고 자료로 통합되어 있습니다."
EULA_OPEN_SOURCE: "본 EULA는 소프트웨어에 포함될 수 있는 모든 오픈 소스 소프트웨어(이하 \"오픈 소스 구성 요소\")에는 적용되지 않습니다. 소프트웨어에 적용되는 오픈 소스 구성 요소 및 해당하는 관련 사용권은 다음에 나열되어 있습니다. {link}. 각 오픈 소스 구성 요소의 사용에는 해당 오픈 소스 구성 요소에 수반되는 각 해당 최종 사용자 사용권 조항이 적용됩니다. 이와 같은 각각의 해당 사용권 조항에 동의하지 않을 경우 소프트웨어를 사용할 수 없습니다. 본 EULA의 어떤 내용도 오픈 소스 구성 요소에 대한 해당 최종 사용자 사용권의 조건을 귀하에게 부여하는 권리를 제한하거나 귀하에게 부여하는 권리를 대체하지 않습니다."
EULA_THIRD_PARTY_SOFTWARE: "소프트웨어 및 제품은 다른 제품 및 소프트웨어와 관련하여 사용될 수 있으며 타사 소프트웨어(이하 \"제3자 소프트웨어\")의 콘텐츠 및 데이터와 링크 또는 인터페이스를 포함할 수 있습니다. 그러한 제3자 소프트웨어의 사용에는 제3자의 개인정보 보호정책을 포함하여 해당 제3자 소프트웨어의 사용 허가자가 제공하는 조건이 적용됩니다. 제3자 소프트웨어에 접속하거나 그것을 이용하면 관련 제3자 조건에 동의하는 것입니다. Logitech은 그러한 제3자 소프트웨어의 작동 또는 제공 여부에 대해 어떠한 진술이나 보증도 하지 않습니다. Logitech 또는 해당 라이센스 제공자는 이러한 제3자 소프트웨어의 제공 불가 여부 또는 제거에 대해 책임을 지지 않습니다."
EULA_TERMINATION: "본 EULA는 해지될 때까지 계속됩니다. 양쪽 당사자 중 누구나 언제든지 어떤 사유로든 본 EULA를 해지할 수 있습니다. 사용자의 소프트웨어 사용권은 사용자가 본 EULA의 조건을 위반하는 경우 Logitech의 통지 없이 자동으로 해지됩니다. 그러한 해지 시, 사용자는 소프트웨어 사용을 중지하고 소유하고 있거나 관리하고 있는 소프트웨어 사본을 모두 제거해야 합니다. 조항 6, 7, 8, 9 10, 11, 12, 16, 17 및 18절은 그러한 해지 후에도 유효합니다. Logitech은 소프트웨어 또는 업데이트의 향후 제공 여부에 대한 어떠한 진술도 하지 않으며 소프트웨어 또는 업데이트의 제공 불가 여부 또는 제거에 대해 책임지지 않습니다. Logitech은 본 소프트웨어와 관련하여 유지 보수 또는 지원 서비스를 제공할 책임을 지지 않습니다."
EULA_WARRANTY_DISCLAIMER: '관련 법에서 허용하는 최대 한도까지, LOGITECH 소프트웨어 및 서비스는 모든 결함과 함께 어떠한 보증 없이 "있는 그대로" 제공됩니다. 해당 법에서 허용하는 한도까지 LOGITECH 소프트웨어 및 서비스 사용에 대한 위험 및 만족스러운 품질, 성능, 정확성 및 최선의 서비스에 관한 위험은 사용자 자신이 부담함을 인정하고 이에 동의합니다. LOGITECH과 LOGITECH 라이센서는 묵시적 보증 및/또는 상업성, 만족스러운 품질, 특정 목적에 대한 적합성, 정확성, 묵시적 권리 보유에 대한 조건, 제 3자의 권리 침해 등 LOGITECH 소프트웨어 및 서비스에 대한 모든 명시적, 묵시적 또는 법적 보증 등 모든 보증과 조건을 부인합니다. LOGITECH는 사용자의 LOGITECH 소프트웨어 또는 서비스의 권리 보유에 대한 간섭을 보증하지 않으며, LOGITECH 소프트웨어 또는 서비스에 포함되는 기능이 사용자의 요구 사항을 만족하리라 보증하지 않으며, LOGITECH 소프트웨어 또는 서비스의 작동이 중단되지 않거나 오류가 없다고 보증하지 않으며, LOGITECH 소프트웨어 또는 서비스 결함의 수정을 보증하지 않습니다.  LOGITECH의 딜러나 대리인 또는 직원은 본 보증의 부인을 수정, 확대 또는 추가할 수 있는 권한이 없습니다. '
EULA_WARRANTY_DISCLAIMER_ADDON: 일부 사법권역에서는 묵시적 보증에 대한 배제나 소비자의 법적 권리에 대한 제한을 허용하지 않으므로 위의 제한 또는 배제가 사용자에게 적용되지 않을 수도 있습니다.
EULA_LIMITATION_OF_LIABILITY: "해당 법에서 금지하지 않는 한도까지, LOGITECH이 손해의 가능성을 통보받은 경우라도, 책임론(계약, 불법 행위 등)에 상관없이 어떤 경우에도 LOGITECH 또는 LOGITECH 라이센서는 LOGITECH 제품, 소프트웨어 또는 서비스의 판매, 사용권 부여, 사용 또는 사용 불능에서 야기된 대체 제품 또는 서비스 구입, 이익 손실, 정보 손실, 데이터 손실 또는 기타 특별, 간접, 필연 또는 부수적 손해에 대해 책임을 지지 않습니다. LOGITECH과 LOGITECH 라이센서는 어떠한 경우에도 해당 제품, 소프트웨어의 실제 구입 가격을 초과하거나 책임져야 할 서비스를 초과하여 책임을 지지 않습니다. 상기 제한은 위에 명시된 구제책이 가장 중요한 목적을 달성하지 못한 경우에도 관계없이 해당됩니다.  일부 관할권에서는 부수적 또는 필연적 손해에 대한 예외 또는 제한을 허용하지 않으므로 위에 언급된 제한 또는 예외가 적용되지 않을 수도 있습니다. 위의 제한은 적용법이 지정하는 범위 및 정도에 따라 개인적인 상해의 경우에는 적용되지 않습니다."
EULA_PRODUCT_LIMITATIONS: "소프트웨어는 소프트웨어 결함이 사망, 상해 또는 심각한 물리적 또는 환경적 손상을 이끌 수 있는 핵 시설, 항법 또는 통신 시스템, 항공 관제 시스템, 의료 장치 또는 기타 장비 운용에 사용되지 않습니다. 사용자는 이 소프트웨어가 응급 목적으로 인증되지 않았으며 본 목적을 위해 사용되어서는 안 된다는 사실을 인정합니다. LOGITECH은 긴급 사태 통지를 모니터링하지 않으며 사용자의 가정에 긴급 서비스를 제공하지 않습니다."
EULA_US_GOVERNMENT_END_USERS: '소프트웨어는 48 CFR에 정의된 "상용 품목"입니다. 2.101, "상용 컴퓨터 소프트웨어" 및 "상용 컴퓨터 소프트웨어 설명서"로 구성되며, 미국 정부 최종 사용자는 (a) 상용 품목으로 한정하며 (b) 이 EULA의 이용 약관에 따라 다른 모든 최종 사용자에게 부여되는 권한만 보유합니다. 미국 저작권 법에 따라 보유되는 공표되지 않은 권리.'
EULA_EXPORT_LAW_ASSURANCES: "사용자는 미국, 유럽 연합, 스위스 및/또는 소프트웨어를 획득한 관할 법정의 법률 또는 규정 등 적용 법률 또는 규정을 위반하여 소프트웨어를 수출하거나 재수출하지 않는 것에 동의합니다."
EULA_AGENTS: "다른 사람이나 단체를 위해 소프트웨어를 구입하는 경우, 구입자는 본인에게 소프트웨어를 구입할 해당 단체 및 기관이 본 EULA의 약관을 준수하도록 규제할 수 있는 권한이 있음을 표시하고 보증해야 합니다. 사용자는 소프트웨어를 사용하거나 액세스하고 본 EULA를 체결할 수 있는 충분한 법적 연령이 사용자의 관할지에서 부합하다는 사실을 나타냅니다."
EULA_CONTROLLING_LAW_1: "사용자가 미국에 있는 경우, 본 EULA는 법률 또는 법칙 선택 규정 적용에 관계없이 미국 법률과 캘리포니아주 법의 적용을 받으며 이에 따라 해석됩니다. 사용자가 미국 외 지역에 있는 경우, 본 EULA는 스위스 법의 적용을 받습니다. 본 EULA의 조항이 유효하지 않은 것으로 판단될 경우, 계약 당사자는 법원이 해당 조항에 반영된 대로 당사자의 의도에 대해 법적 조치를 취하며, EULA의 나머지 조항은 효력이 유효하고 유지됨에 동의합니다."
EULA_CONTROLLING_LAW_2: "미국에 거주하고 본 소프트웨어 또는 제품을 개인용이나 가정용으로만 사용할 경우, 17절이 적용됩니다."
EULA_ARBITRATION: "사용자와 Logitech 사이에 발생하는 모든 분쟁은 미국 중재 협회의 소비자 중재 규칙(이하 \"규칙\")에 따라 시행된 구속력이 있는 최종 중재를 통해 해결됩니다. 단, 소액 배상 청구 법원의 관할 하에 있는 분쟁의 경우 당사자 중 한 사람의 선택에 따라 중재인 선임에 앞서 소관 관할 법원에 소집됩니다. 중재는 당사자 간의 상호 합의 또는 규칙에 명시된 선정 절차에 따라 선정된 단일 중재인이 수행해야 합니다. 중재 비용은 규칙에 명시된 대로 당사자 간에 배분됩니다. 중재자의 판정은 최종적이며 상소권 없이 당사자를 구속합니다. 증거의 유실을 막고 본 계약에 따라 제기되는 배상청구의 신속한 해결을 위해 본 EULA에 따라 배상청구를 하는 일방은 그 배상청구의 원인이 된 사건 또는 사실 발생일로부터 일(1)년 이내에, 또는 준거법에서 정한 최소 기한이 일(1)년을 초과할 경우 그 기한 내에 배상청구의 근거를 상대방에게 서면으로 고지해야 하며, 그렇지 않을 경우 그 일방은 해당 사건 또는 사실에 근거한 배상청구를 제기할 권리를 상실하게 됩니다."
EULA_ENTIRE_AGREEMENT: "본 계약은 사용자와 Logitech 간의 전체 계약을 명시하며 소프트웨어와 관련하여 서면 또는 구두로 이루어진 모든 이전 계약에 우선합니다. 본 EULA에 대한 번역은 해당 지역의 요구에 따라 이루어지며 영어와 비영어 버전 간의 불일치가 발생하는 경우, 본 EULA의 영어 버전이 우선됩니다."

