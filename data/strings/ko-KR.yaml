# MX-Keys Onboard strings start
ONBOARD_SET_UP_SMART_BACKLIGHTING: 백라이팅
ONBOARD_SMART_BACKLIGHTING_DESCRIPTION: 조도 감지 센서가 백라이트 밝기를 조절하여 자연광이 부족할 때 전원을 절약합니다. 두 개의 하이라이트 된 키를 사용하여 백라이팅을 수동으로 조절할 수 있습니다.
ONBOARD_SET_UP_SMART_BACKLIGHTING_TITLE: 스마트 백라이팅
ONBOARD_SET_UP_SMART_BACKLIGHTING_DESCRIPTION: "\"Fn + 전구\" 키를 누르거나 아래 목록에서 선택하여 키보드에 다양한 백라이팅 효과를 선택할 수 있습니다."
ONBOARD_SET_UP_BATTERY_NOTIFICATION: 낮은 배터리 알림
ONBOARD_BATTERY_NOTIFICATION_DESCRIPTION: 배터리 레벨이 10% 미만인 경우 백라이팅이 꺼집니다. LED가 빨갛게 깜박이고 화면을 통해 알림을 받게 됩니다. USB-C 충전 케이블을 사용하여 장치를 충전하세요.
ONBOARD_EASY_SWITCH: Easy-Switch
ONBOARD_SET_UP_CUSTOMIZE_KEYS: 키 커스텀
ONBOARD_CUSTOMIZE_KEYS_DESCRIPTION: "몇 가지 기본 바로가기 키가 설정되어 있지만, 직접 만드셔도 됩니다."
ONBOARD_SET_YOUR_F_KEYS: F 키 설정
ONBOARD_SET_YOUR_F_KEYS_DESCRIPTION: Fn+Esc 키를 눌러 언제든지 미디어 및 Fn 키를 전환할 수 있습니다. Fn 키를 누를 필요 없이 자유롭게 F 키를 사용해보세요.
ONBOARD_SET_UP_MUTE_UNMUTE: 음소거/음소거 해제
ONBOARD_MUTE_UNMUTE_DESCRIPTION: 마이크 버튼을 누르면 미팅 중 나의 음성을 음소거/음소거 해제할 수 있습니다.
ONBOARD_MUTE_UNMUTE_DESCRIPTION_1: 완벽한 통화를 위해 이 키를 탭해 마이크 음소거/음소거 해제를 이용해보세요.
ONBOARD_SET_UP_DICTATION_AND_EMOJI: 받아쓰기 및 이모티콘
ONBOARD_SET_UP_DICTATION_AND_EMOJI_SCREENSHOT: "받아쓰기, 이모티콘, 스크린샷 키"
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION: 받아쓰기 키를 탭하면 선택한 텍스트 필드에 받아쓰기를 이용할 수 있습니다. 이모티콘 키로 빠르게 이모티콘을 이용해보세요.
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_SCREENSHOT: "받아쓰기 버튼으로 활성 텍스트 필드에 받아쓰기를 시작해보세요. 또한 이모티콘 키를 눌러 이모티콘을 이용할 수 있습니다. 화면 캡처 키로 화면에 있는 콘텐츠의 스크린샷을 간단하게 찍을 수 있습니다."
ONBOARD_SET_UP_DO_NOT_DISTURB: 방해 금지
ONBOARD_DO_NOT_DISTURB_DESCRIPTION: Mac의 방해 금지 모드를 활성화하면 집중이 필요할 때 작업에 집중할 수 있습니다.
ONBOARD_NEXT_TRACK: 다음 트랙
ONBOARD_NEXT_TRACK_DESCRIPTION: 재생/일시 정지 버튼을 두 번 탭하면 트랙을 건너뜁니다.
ONBOARD_SET_UP_EMOJI_MENU: 이모티콘 메뉴
ONBOARD_EMOJI_MENU_DESCRIPTION: 전체 이모티콘 메뉴를 열어 다양한 이모티콘 중 선택할 수 있습니다.
ONBOARD_SET_UP_CUSTOMIZE_KEYS_CAPS: 키 캡 커스텀
ONBOARD_CUSTOMIZE_KEYS_CAPS_DESCRIPTION: 8개의 교체식 이모티콘 키로 온라인에서 개성을 표현해보세요. 원하는 대로 변경 및 커스텀할 수 있습니다.
ONBOARD_OPEN_CLOSE_TAB: 새 브라우저 탭 및 브라우저 탭 닫기
ONBOARD_OPEN_CLOSE_TAB_DESCRIPTION: 키를 누르면 브라우저의 탭을 열거나 닫을 수 있습니다.
ONBOARD_LANGUAGE_SWITCH: 언어 전환
ONBOARD_LANGUAGE_SWITCH_DESCRIPTION: 언어 전환 버튼을 누르면 키보드 입력 설정을 전환할 수 있습니다.
ONBOARD_KEYS_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "키보드를 최대 2개의 장치와 페어링하고 Easy-Switch™ 버튼으로 손쉽게 기기를 전환하세요. 노트북, 데스크탑, 태블릿 모두 {DEVICE_NAME} 하나면 충분합니다."
