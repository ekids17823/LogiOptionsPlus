ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Craft 키보드 상단 줄에 이미 기본 바로가기 키가 할당되어 있지만, 자신만의 바로가기를 만드셔도 됩니다."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "미디어 컨트롤을 사용하면서도 F1, F2 등의 키를 이용하고 싶으세요? <strong>Esc+Fn</strong>을 눌러 표준 기능 키로 전환할 수 있습니다. 이 버튼은 토글 방식으로 작동하므로 매번 Fn 키를 누를 필요가 없습니다."
ONBOARD_CRAFT_BASED_ACTIONS_RING: 새로운 크라운 경험
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "당사는 Craft를 통해 <strong>창의적 워크플로우를 더 간결하게 만드는 것</strong>을 목표로 합니다. 크라운은 탭하고, 누르고, 돌리는 동작만으로 핵심 도구에 즉시 접근할 수 있도록 설계한 로지텍의 첫 번째 시도였습니다. Craft와 크라운의<strong>기능성 확장</strong>이라는 비전으로 이뤄낸 이번 혁신을 직접 소개하게 되어 매우 기쁩니다."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: 커서의 완벽한 기능
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "이제 <strong>크라운을 누르면</strong> <strong>Actions Ring</strong>을 작동시키며, 도구, 필터, 조정값, 플러그인 등의 필요한 기능에 직접 액세스할 수 있는 커스터마이징 가능한 오버레이가 화면에 표시됩니다. 필요한 순간, Ring 위에서 바로 사용할 수 있습니다."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: 동작 실행
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: Actions Ring이 열리면 커서를 사용하여 실행할 <strong>동작을 선택</strong>하고 클릭합니다.
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: 조정
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "빠르게 조정하려면 <strong>액션 위에 마우스를 올리고 마우스로 호버링을 한 뒤 크라운을 돌리면 됩니다</strong>. 또한 커서로 동작을 <strong>클릭하고 왼쪽 또는 오른쪽으로 드래그</strong>하여 동작을 조절할 수 있습니다."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: 앱에 적응
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring은 <strong>사용하는 응용 프로그램에 적응</strong>하여 효율을 위해 장치의 기능을 자동으로 변경합니다. 기본 애플리케이션 프로필을 사용하거나 나만의 프로필을 만들어 워크플로를 효율화할 수 있습니다."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: 아래 버튼을 눌러 Options+로 업그레이드한 후 Craft 키보드에 추가된 새로운 기능을 확인해보세요.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: 장소에 관계없이 업무에 필요한 모든 것을 탑재할 수 있습니다.
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "{DEVICE_NAME}은(는) 어디에서나 생산성과 자세를 개선할 수 있도록 설계되었습니다."
ONBOARD_SET_UP_EMOJI_KEY: 이모티콘 키
ONBOARD_SET_UP_EMOJI_DESCRIPTION_V2: 이모티콘 키로 메시지에 개성을 더해보세요. 즐거움으로 가는 지름길입니다!
ONBOARD_SET_UP_PRINT_SCREEN_TITLE: Print Screen
ONBOARD_SET_UP_PRINT_SCREEN_DESCRIPTION_V2: Print Screen 키를 눌러 전체 화면을 빠르게 캡처하고 스크린샷을 저장하세요.

