PIPL_SETTINGS_POLICY_SHARE: "{LOGITECH_PRIVACY_POLICY}에 설명된 방식으로 신뢰할 수 있는 파트너 및 기타 로지텍 법인이 내 개인 데이터를 공유하는 것에 동의합니다."
