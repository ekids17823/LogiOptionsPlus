PIPL_PAGE: 로지텍 개인정보 보호
PIPL_PAGE_DESC: "로지텍은 귀하의 개인정보를 중요하게 생각하며, 당사의 애플리케이션에 추가적인 투명성을 더하고 있습니다. Options+의 정상 작동을 보장하기 위해 로지텍은 제한된 개인 데이터를 수집해야 합니다. 수집된 데이터에 대한 자세한 내용은 {LOGITECH_PRIVACY_POLICY}을 참조하세요. 언제든지 설정에서 이러한 권한을 검토하고 수정할 수 있습니다."
PIPL_PAGE_POLICY_PROCESS: "{LOGITECH_PRIVACY_POLICY}에 설명된 방식으로 내 개인 데이터가 처리되는 것에 동의합니다"
