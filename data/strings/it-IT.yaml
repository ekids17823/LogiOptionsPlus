EULA_TEXT_1: "{openingTag} IL PRESENTE CONTRATTO DI LICENZA CON L'UTENTE FINALE (\"EULA\") COSTITUISCE UN ACCORDO LEGALE TRA L'UTENTE E LOGITECH EUROPE S.A. (\"Logitech\"). LEGGERE ATTENTAMENTE QUESTO ACCORDO DI LICENZA PRIMA DI INSTALLARE IL SOFTWARE O UTILIZZARE IL PRODOTTO LOGITECH.  L'INSTALLAZIONE DEL SOFTWARE O L'UTILIZZO DEL PRODOTTO LOGITECH IMPLICANO L'ACCETTAZIONE DEI TERMINI DEL PRESENTE EULA. SE ACCETTA I TERMINI DEL PRESENTE EULA, L'UTENTE PUÒ RESTITUIRE IL PRODOTTO PER UN RIMBORSO, CONFORMEMENTE AI TERMINI E ALLE CONDIZIONI DELLA POLITICA DI RESTITUZIONE APPLICABILE AL PUNTO DI ACQUISTO.{closingTag}{openingTag}SE L'UTENTE È MINORENNE IN BASE ALLA LEGISLAZIONE VIGENTE NEL PAESE O TERRITORIO IN CUI RISIEDE, UNO DEI GENITORI O TUTORI DEVE LEGGERE E ACCETTARE I TERMINI DELLA PRESENTE EULA.{closingTag}{openingTag} SE L'UTENTE RISIEDE (O IL SUO LUOGO DI LAVORO PRINCIPALE SI TROVA) NEGLI STATI UNITI E IL SOFTWARE O IL PRODOTTO SONO DESTINATI ESCLUSIVAMENTE A USO PERSONALE O DOMESTICO, SI PREGA DI CONSULTARE LA SEZIONE 17 DI SEGUITO, CHE FA RIFERIMENTO ALLE POSSIBILI CONTROVERSIE OGGETTO DI ARBITRATO EMERSE NELL'AMBITO DELLE CONSUMER ARBITRATION RULES.{closingTag}{openingTag} COME DESCRITTO DI SEGUITO NELLA SEZIONE 4, L'UTENTE ACCETTA GLI AGGIORNAMENTI DEL SOFTWARE AUTOMATICI. SE L'UTENTE NON ACCETTA, NON DEVE UTILIZZARE IL PRODOTTO O INSTALLARE IL SOFTWARE. {closingTag}{openingTag} LA SEZIONE DELLE LIMITAZIONI DEL PRODOTTO RIPORTATA DI SEGUITO SPECIFICA LE LIMITAZIONI PIÙ IMPORTANTI, RELATIVE AL SOFTWARE E AI RELATIVI SERVIZI, IN MERITO A SICUREZZA PER LA VITA E USI CRITICI. SI PREGA DI LEGGERE ATTENTAMENTE QUESTA SEZIONE, IN QUANTO L'UTENTE RICONOSCE E ACCETTA AUTOMATICAMENTE QUANTO IN ESSA RIPORTATO. {closingTag}{openingTag} Per \"Software\" si intende: (i) qualsiasi applicazione o programma software, incluse le applicazioni software scaricate e installate su un computer desktop o su un dispositivo mobile; (ii) qualsiasi software nella forma di un software integrato in un prodotto Logitech; (iii) qualsiasi documentazione correlata, versione modificata, aggiornamento o miglioria di tale software (a meno che non sia espressamente specificato in termini diversi nel momento dell'aggiornamento o del download), tutte le versioni o le copie successive di tale software.{closingTag}{openingTag} Questi termini concedono all'utente diritti legali specifici, oltre agli altri diritti legali di cui l'utente potrebbe godere, che variano a seconda della giurisdizione.{closingTag}"
EULA_LICENSE: "In base ai termini del presente EULA, Logitech concede all'utente una licenza non esclusiva limitata per l'uso del Software esclusivamente con il prodotto Logitech acquistato o il servizio Logitech utilizzato. Ad eccezione del software integrato in un prodotto Logitech, il Software può essere copiato per scopi di backup o archiviazione come supporto all'uso del Software secondo quanto concesso nel presente documento e per renderlo disponibile in ambito domestico interno o su un server di rete aziendale al solo scopo di scaricarlo nei dispositivi in proprio possesso o controllati nell'ambiente domestico o aziendale; tutto questo esclusivamente allo scopo di utilizzare il Software come indicato nel presente documento. Ogni copia dovrà includere tutte le informazioni sul copyright e le altre comunicazioni proprietarie presenti nell'originale.  Per il possesso o il controllo del Software incorporato o con il servizio Logitech utilizzato dall'utente. L'utente può trasferire in modo permanente il Software a un'altra persona previo trasferimento permanente del prodotto Logitech che utilizza il Software, pertanto, se la suddetta persona accetta di essere vincolata dai termini e dalle condizioni del presente EULA, in seguito al trasferimento l'utente deve interrompere l'uso del prodotto e del Software."
EULA_RESTRICTIONS: "All'utente non è consentito (ed egli stesso non deve consentire ad altri) di: (A) concedere in licenza, vendere, affittare, cedere in leasing, trasferire (fatta eccezione per quanto espressamente consentito nella Sezione 1), distribuire, ospitare, appaltare, divulgare o sfruttare in qualsiasi altra modalità commerciale il Software o rendere disponibile il Software a terze parti; (B) copiare il Software (fatta eccezione per quanto espressamente consentito nella Sezione 1); (C) decompilare, disassemblare, decodificare o cercare di ottenere il codice sorgente, oppure creare elementi derivati o un programma di installazione per il Software e per qualsiasi componente dello stesso (fatta eccezione per quanto espressamente consentito dalle leggi vigenti); (D) rimuovere o alterare qualsiasi marchio, logo, informazioni sul copyright o di proprietà, legende, simboli o etichette presenti nel Software."
EULA_OWNERSHIP: "Logitech e i suoi concessori di licenza posseggono e conservano tutti i diritti, la titolarità e l'interesse verso il Software, inclusi tutti i diritti di copyright e la proprietà intellettuale.   Il Software viene concesso in licenza, ma non venduto, all'utente da Logitech e Logitech si riserva tutti i diritti non espressamente concessi all'utente. "
EULA_AUTOMATIC_SOFTWARE_UPDATES: "Logitech si riserva il diritto di fornire periodicamente, a propria esclusiva discrezione, correzioni di bug, aggiornamenti, upgrade e altre modifiche al Software (\"Aggiornamenti\").   Tali Aggiornamenti possono essere installati automaticamente e senza necessità di ulteriore notifica o consenso.   L'utente acconsente agli Aggiornamenti automatici.  Se non si desidera installare gli Aggiornamenti, la soluzione è interrompere l'utilizzo del Prodotto.  Tutti gli Aggiornamenti forniti da Logitech in sostituzione e/o in aggiunta al Software originale saranno regolati dai termini del presente EULA, a meno che tali Aggiornamenti non siano accompagnati da una licenza a parte, nel qual caso saranno regolati dai termini di suddetta licenza."
EULA_APPLICATION_STORE: "Se l'utente ha scaricato il Software da un negozio o store di applicazioni, come l'App Store di Apple, il Mac Store di Apple o Google Play (\"Store di app\"), è altresì soggetto ai termini di utilizzo del suddetto app store. Se l'utilizzo del Software da parte dell'utente è soggetto ai termini di utilizzo di uno Store di app, in caso di conflitto o ambiguità tra i termini dello Store di app e il presente EULA prevarranno i termini dello Store di app, ma solo nella misura in cui tali termini siano necessari a risolvere il suddetto conflitto o ambiguità, e i termini del presente EULA resteranno comunque in vigore a tutti gli effetti.  L'utente riconosce che (i) il presente EULA si considera rescisso tra Logitech e l'Utente, e non con lo Store di app; (ii) lo Store di app non ha alcun obbligo di fornitura di manutenzione e servizi di supporto per il Software in qualsiasi modo scaricato; (iii) Logitech, non lo Store di app, sarà responsabile, come indicato nel presente EULA, nella misura in cui non espressamente negato, per ogni garanzia prodotto, rivendicazione prodotto e rivendicazione di proprietà intellettuale per il Software scaricato da uno Store di app. In ogni caso, la responsabilità massima dello Store di app per qualsiasi garanzia corrisponderà al rimborso del prezzo di acquisto (se necessario) per il Software; (iv) Apple e le sue consociate sono beneficiari terzi del presente EULA per il Software scaricato da App Store di Apple e da Mac Store.   "
EULA_PRIVACY: "Le nostre pratiche sulla privacy sono descritte nella nostra {link}, nonché in dichiarazioni di riservatezza separate (collettivamente l'\"Informativa sulla privacy\") fornite quando un Software, un prodotto o un servizio viene acquistato, scaricato o utilizzato. Installando il Software, utilizzando i prodotti Logitech o fornendoci i propri dati personali, l'Utente accetta le procedure, i termini e le condizioni indicati nell'Informativa sulla privacy e nelle dichiarazioni di riservatezza separate.  La nostra Informativa sulla privacy è incorporata sotto forma di riferimento in questo EULA. "
EULA_OPEN_SOURCE: "Il presente EULA non è applicabile ad alcun software Open Source eventualmente incluso nel Software (\"Componenti Open Source\").  I Componenti Open Source applicabili al Software e le licenze associate applicabili potrebbero essere elencati qui: {link} L'utilizzo di ciascun componente Open Source è soggetto ai termini della relativa licenza per l'utente finale.  L'utente dovrà accettare i termini di ciascuna delle licenze valide, o in caso contrario evitare di utilizzare il Software. I termini inclusi nel presente EULA non limitano in alcun modo i diritti conferiti all'utente dai termini e dalle condizioni della licenza per l'utente finale applicabile ai Componenti Open Source di cui sopra, né garantiscono all'utente diritti in grado di sostituire tali termini e condizioni."
EULA_THIRD_PARTY_SOFTWARE: "Il Software e il Prodotto possono essere utilizzati in combinazione con altri prodotti e software, e possono contenere interfacce o collegamenti a, nonché contenuti e dati provenienti da, software di terze parti (\"Software di terze parti\").  L'uso di tale Software di terze parti è disciplinato dai termini forniti dal concessore di licenza del suddetto Software di terze parti, inclusa l'informativa sulla privacy della terza parte. Accedendo o utilizzando il Software di terze parti, l'utente accetta di rispettare i termini applicabili di terze parti. Logitech non si assume alcuna responsabilità, né formula garanzie riguardo al funzionamento o alla disponibilità di detto Software di terze parti.   Né Logitech, né i suoi concessori di licenza possono essere ritenuti responsabili per la mancata disponibilità o la rimozione del Software di terze parti. "
EULA_TERMINATION: "La presente EULA rimane in vigore fino alla sua risoluzione.  Entrambe le parti possono decidere di rescindere la presente EULA per qualunque motivo e in qualsiasi momento.  Il diritto a utilizzare il Software si estinguerà automaticamente senza preavviso da parte di Logitech qualora l'utente violi una qualsiasi delle condizioni previste dalla presente EULA.  Al momento della risoluzione, l'utente è tenuto a interrompere l'utilizzo del Software e a rimuovere tutte le copie in suo possesso. Le disposizioni riportate nelle Sezioni 6, 7, 8, 9 10, 11, 12, 16, 17 e 18 resteranno in vigore dopo la risoluzione.  Logitech non rilascia alcuna dichiarazione in merito alla futura disponibilità del Software o dei relativi Aggiornamenti e non potrà essere ritenuta responsabile per la mancata disponibilità o la rimozione del Software o degli Aggiornamenti.  Logitech declina qualsiasi responsabilità in merito alla fornitura di servizi di manutenzione o supporto relativi al Software."
EULA_WARRANTY_DISCLAIMER: 'NELLA MISURA PREVISTA DALLA LEGGE APPLICABILE, IL SOFTWARE E I SERVIZI LOGITECH VENGONO FORNITI "COSÌ COME SONO", CON I RELATIVI DIFETTI E SENZA GARANZIE DI ALCUN TIPO. L''UTENTE RICONOSCE E ACCETTA ESPRESSAMENTE CHE, NELLA MISURA MASSIMA CONSENTITA DALLE LEGGI IN VIGORE, L''USO DEL SOFTWARE E DEI SERVIZI LOGITECH DA PARTE DELL''UTENTE È A RISCHIO ESCLUSIVO DELLO STESSO, E CHE È RESPONSABILE DI OGNI RISCHIO RIGUARDANTE LA QUALITÀ SODDISFACENTE, LE PRESTAZIONI, LA PRECISIONE E L''IMPIEGO.  LOGITECH E I SUOI CONCESSORI DI LICENZA NON RICONOSCONO ALCUNA GARANZIA E CONDIZIONE RELATIVA AL SOFTWARE E AI SERVIZI LOGITECH, ESPLICITA, IMPLICITA O DI LEGGE, INCLUSE TRA LE ALTRE LE GARANZIE E/O CONDIZIONI IMPLICITE DI COMMERCIABILITÀ, QUALITÀ SODDISFACENTE, IDONEITÀ PER UNO SCOPO SPECIFICO, ATTENDIBILITÀ, AZIONE NEGATORIA E NON VIOLAZIONE DEI DIRITTI DI TERZE PARTI.  LOGITECH NON GARANTISCE CHE LE FUNZIONI FORNITE CON IL SOFTWARE O I SERVIZI LOGITECH SODDISFINO I REQUISITI DELL''UTENTE, CHE Il FUNZIONAMENTO DEL SOFTWARE SIA PRIVO DI ERRORI O INTERRUZIONI O CHE TUTTI GLI ERRORI RILEVATI NEL SOFTWARE SIANO CORRETTI. NESSUN DISTRIBUTORE, AGENTE O DIPENDENTE DI LOGITECH È AUTORIZZATO AD APPORTARE MODIFICHE, ESTENSIONI O AGGIUNTE DI QUALSIASI TIPO ALLA PRESENTE ESCLUSIONE DI ALTRE GARANZIE.'
