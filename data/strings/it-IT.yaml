EULA_LIMITATION_OF_LIABILITY: "FATTA ECCEZIONE PER QUANTO PROIBITO DALLA LEGGE VIGENTE, IN NESSUN CASO LOGITECH O I SUOI CONCESSORI DI LICENZA POTRANNO ESSERE RITENUTI RESPONSABILI PER COSTI DI FORNITURA DI PRODOTTI, SOFTWARE O SERVIZI SOSTITUTIVI, PERDITA DI PROFITTI, PERDITA DI INFORMAZIONI O DATI O PER QUALSIASI ALTRO TIPO DI DANNO SPECIALE, INDIRETTO, CONSEGUENTE O INCIDENTALE DERIVANTE DALLA VENDITA, DALLA CONCESSIONE IN LICENZA, DALL'USO O DALL'IMPOSSIBILITÀ DI UTILIZZARE QUALSIASI PRODOTTO, SOFTWARE O SERVIZIO LOGITECH, INDIPENDENTEMENTE DALLA CAUSA, A PRESCINDERE DA QUALSIASI TEORIA DI RESPONSABILITÀ ATTRIBUIBILE A CONTRATTO, PRECISA RESPONSABILITÀ O ALTRE CAUSE, ANCHE QUALORA L'EVENTUALITÀ DI TALI DANNI SIA STATA COMUNICATA A LOGITECH.  IN NESSUN CASO L'OBBLIGO DI RISARCIMENTO DI LOGITECH E DEI SUOI CONCESSORI DI LICENZA POTRÀ ESSERE SUPERIORE ALL'IMPORTO EFFETTIVAMENTE PAGATO PER IL PRODOTTO, IL SOFTWARE O IL SERVIZIO LOGITECH ALL'ORIGINE DELLA RESPONSABILITÀ.  Le limitazioni di cui sopra saranno applicabili anche se la misura correttiva sopra citata esula dallo scopo essenziale.  Alcune giurisdizioni non ammettono l'esclusione o le limitazioni per danni incidentali o consequenziali, pertanto la limitazione di cui sopra potrebbe non essere applicabile ovunque.  Le limitazioni sopra indicate non si applicheranno in caso di lesioni personali, quando e nella misura in cui la legge applicabile prevede questa responsabilità."
EULA_PRODUCT_LIMITATIONS: "IL SOFTWARE NON È PROGETTATO PER L'UTILIZZO IN IMPIANTI NUCLEARI, SISTEMI DI NAVIGAZIONE O DI COMUNICAZIONE AEREA, SISTEMI DI CONTROLLO DEL TRAFFICO AEREO, DISPOSITIVI MEDICI O QUALSIASI ALTRO TIPO DI APPARECCHIATURA PER LE QUALI IL MALFUNZIONAMENTO DEL SOFTWARE POTREBBE PROVOCARE MORTE, LESIONI PERSONALI O GRAVI DANNI FISICI O AMBIENTALI.   L'UTENTE RICONOSCE CHE IL SOFTWARE NON DISPONE DELLA CERTIFICAZIONE PER SCOPI DI EMERGENZA E NON DEVE ESSERE PERTANTO UTILIZZATO A TALE SCOPO.  LOGITECH NON MONITORA LE NOTIFICHE DI EMERGENZA E NON È RESPONSABILE DELLA FORNITURA DI SERVIZI DI EMERGENZA PRESSO IL DOMICILIO DELL'UTENTE."
EULA_US_GOVERNMENT_END_USERS: 'Il Software è un "articolo commerciale", secondo la definizione contenuta in 48 C.F.R. 2.101, costituito da "Software per computer commerciale" e "Documentazione del software per computer commerciale", ed è concesso in licenza agli utenti finali del governo degli Stati Uniti (a) solo come elemento commerciale e (b) con i soli diritti concessi a tutti gli altri utenti finali in base ai termini e alle condizioni del presente EULA. Diritti di non pubblicazione riservati in base alle leggi di copyright degli Stati Uniti.'
