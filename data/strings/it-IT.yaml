ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_TITLE: Controllo tramite gesti
ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_DESCRIPTION: Goditi una navigazione sul Web senza problemi grazie a un touchpad ottimizzato per l’utilizzo con schermi TV di grandi dimensioni. Utilizza due dita per scorrere su e giù le lunghe pagine Web e per eseguire lo zoom avanti e indietro sul PC collegato alla TV.
ONBOARD_LIVING_ROOM_KB_D_PAD_TITLE: Tastierino direzionale
ONBOARD_LIVING_ROOM_KB_D_PAD_DESCRIPTION: Usa il tastierino direzionale per navigare in tutta semplicità nei menu sullo schermo e nelle interfacce delle app sulla Smart TV. Puoi anche usare il tastierino direzionale per controllare i lettori multimediali nelle tue app di streaming preferite.
ONBOARD_LIVING_ROOM_KB_K830_GESTURE_CONTROL_DESCRIPTION: "Il controllo tramite gesti riconosce i movimenti della mano, facilitando il controllo del sistema informatico."
ONBOARD_SMART_BACKLIGHT_DESCRIPTION: Il sensore di luce ambiente regola il livello di retroilluminazione in modo da ridurre il consumo energetico in condizioni di sufficiente luce naturale. Usa il tasto evidenziato per modificare manualmente la retroilluminazione.
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_TITLE: Pulsante clic sinistro e destro del mouse
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_DESCRIPTION: Pulsante clic sinistro e destro del mouse sul lato superiore sinistro della tastiera. Ti consente di navigare sul touchpad con la mano destra e di selezionare con la sinistra.
#Living room Keyboards Onboard strings end

# MX-Vertical-mini
ONBOARD_ERGO_BENEFITS_TITLE: Design ergonomico
ONBOARD_ERGO_BENEFITS_DESCRIPTION: LIFT è un mouse ergonomico verticale progettato per consentirti di lavorare comodamente a lungo senza sentirti affaticato dopo una lunga giornata alla scrivania.
ONBOARD_ERGO_BENEFITS_DESCRIPTION_1: "L’eccezionale design verticale ergonomico e sagomato, solleva il polso in una postura più naturale e ti mantiene rilassato per tutta la giornata, così puoi concentrarti su ciò che conta davvero!"
