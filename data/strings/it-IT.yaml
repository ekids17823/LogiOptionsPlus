ONBOARD_SET_UP_BATTERY_NOTIFICATION_DESCRIPTION: "L'indicatore dello stato delle batterie emette una luce rossa quando le batterie sono quasi scariche. Utilizza il cavo di ricarica incluso con la tastiera per ricaricare la tastiera."
ONBOARD_F_KEY_DESCRIPTION: "Gli intuitivi tasti funzione migliorati consentono di avviare con facilità le applicazioni. Per utilizzare le funzioni avanzate (icone di colore giallo), tenere premuto il tasto ‘/ e premere quindi il tasto funzione desiderato."
