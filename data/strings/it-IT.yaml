EULA_CONTROLLING_LAW_1: "Se l'utente risiede negli Stati Uniti, la presente EULA verrà regolata e interpretata esclusivamente secondo le leggi degli Stati Uniti e dello Stato della California, nonostante le leggi dello Stato della California concedano la possibilità di scegliere la giurisdizione di competenza.  Se l'utente risiede al di fuori degli Stati Uniti, la presente EULA sarà regolata esclusivamente dalle leggi della Svizzera.  Se una qualsiasi disposizione della presente EULA non dovesse essere valida, le parti convengono comunque che le intenzioni delle parti così come espresse nella disposizione, e le restanti norme contenute nell'EULA, resteranno in vigore a tutti gli effetti."
EULA_CONTROLLING_LAW_2: "Se l'utente risiede negli Stati Uniti e il Software o il Prodotto sono destinati esclusivamente a uso personale o domestico, risulta valido quanto riportato nella Sezione 17:"
EULA_ARBITRATION: "Eventuali controversie tra l'utente e Logitech saranno risolte mediante arbitrato definitivo e vincolante condotto in conformità con le Consumer Arbitration Rules (\"Regole\") dell'American Arbitration Association, fatta eccezione per le controversie che ricadono sotto la giurisdizione di un tribunale per cause di minimo valore che, su richiesta di una delle due parti, possono essere presentate a un tribunale per cause di minimo valore appartenente alla giurisdizione di competenza prima della nomina di un arbitro.  L'Arbitrato viene condotto da un solo arbitro scelto di comune accordo da entrambe le parti o mediante il processo di selezione descritto nelle Regole.  I costi del processo di arbitrato devono essere ripartiti tra le parti in conformità a quanto stabilito nelle Regole. La decisione dell'arbitro è decisiva e vincolante per entrambe le parti, senza diritto d'appello. AL FINE DI EVITARE LA PERDITA DI PROVE E GARANTIRE LA PRONTA RISOLUZIONE DELLE AZIONI LEGALI DERIVANTI DAL PRESENTE CONTRATTO, UNA PARTE CHE INTENTA UNA QUALSIASI AZIONE LEGALE AI SENSI DEL PRESENTE EULA DEVE FORNIRE ALL'ALTRA PARTE AVVISO SCRITTO DELLA BASE DELL'AZIONE LEGALE ENTRO UN (1) ANNO O ENTRO IL TEMPO MINIMO RICHIESTO DALLA LEGGE VIGENTE, SE PIÙ DI UN (1) ANNO, DALLA DATA DEL VERIFICARSI DELL'EVENTO O DEI FATTI CHE HANNO DATO ORIGINE ALL'AZIONE LEGALE OPPURE TALE PARTE DEVE RINUNCIARE AL DIRITTO DI INTENTARE QUALSIASI AZIONE LEGALE BASATA SU TALE EVENTO O FATTI."
EULA_ENTIRE_AGREEMENT: "Il presente accordo descrive l'accordo completo tra l'utente e Logitech e sostituisce qualsiasi accordo precedente, orale o scritto, relativamente al Software.  Il presente EULA viene tradotto in conformità ai requisiti locali. Nell'eventualità di contenuti non uniformi tra la versione inglese e la versione in un'altra lingua, la versione vincolante dell'EULA sarà quella in inglese."

