# MX-Keys Onboard strings start
ONBOARD_SET_UP_SMART_BACKLIGHTING: Retroilluminazione
ONBOARD_SMART_BACKLIGHTING_DESCRIPTION: Il sensore di luce ambiente regola la retroilluminazione e riduce il consumo energetico in condizioni di sufficiente luce naturale. La retroilluminazione può essere regolata anche manualmente usando i due tasti evidenziati.
ONBOARD_SET_UP_SMART_BACKLIGHTING_TITLE: Retroilluminazione intelligente
ONBOARD_SET_UP_SMART_BACKLIGHTING_DESCRIPTION: "Scegli tra diversi effetti di retroilluminazione per la tua tastiera premendo i tasti Fn + lampadina o selezionandoli dall'elenco seguente"
ONBOARD_SET_UP_BATTERY_NOTIFICATION: Notifiche batteria quasi scarica
ONBOARD_BATTERY_NOTIFICATION_DESCRIPTION: La retroilluminazione si spegne quando il livello di carica della batteria scende sotto il 10%. Il LED lampeggia in rosso e viene visualizzata una notifica su schermo. Utilizza il cavo di ricarica USB-C per ricaricare il dispositivo.
ONBOARD_EASY_SWITCH: Easy-Switch
ONBOARD_SET_UP_CUSTOMIZE_KEYS: Personalizza tasti
ONBOARD_CUSTOMIZE_KEYS_DESCRIPTION: "Abbiamo configurato alcune scelte rapide predefinite, ma puoi anche crearne di personalizzate."
ONBOARD_SET_YOUR_F_KEYS: Configura i tasti funzione
ONBOARD_SET_YOUR_F_KEYS_DESCRIPTION: Passa dai tasti multimediali ai tasti funzione e viceversa in qualsiasi momento premendo Fn+Esc. Usa liberamente i tasti funzione senza bisogno di tenere premuto Fn.
ONBOARD_SET_UP_MUTE_UNMUTE: Disattiva/riattiva audio
ONBOARD_MUTE_UNMUTE_DESCRIPTION: Premi il pulsante del microfono per disattivare/riattivare il tuo audio durante le riunioni.
ONBOARD_MUTE_UNMUTE_DESCRIPTION_1: Tocca il tasto per disattivare e riattivare il microfono per chiamate di alta qualità.
ONBOARD_SET_UP_DICTATION_AND_EMOJI: Dettatura ed emoji
ONBOARD_SET_UP_DICTATION_AND_EMOJI_SCREENSHOT: "Tasto dettatura, emoji e istantanea schermo"
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION: Tocca il tasto di dettatura per attivare la modalità voice to text in qualsiasi campo di testo selezionato. Accedi rapidamente alle emoji con il tasto emoji.
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_SCREENSHOT: "Prova il pulsante di dettatura per iniziare a dettare qualsiasi cosa su un campo di testo attivo. Puoi accedere rapidamente alle emoji usando il tasto emoji. Acquisisci facilmente un’istantanea dei contenuti sullo schermo con il tasto di acquisizione schermo."
ONBOARD_SET_UP_DO_NOT_DISTURB: Non disturbare
ONBOARD_DO_NOT_DISTURB_DESCRIPTION: Attiva la modalità “Non disturbare” sul Mac per restare concentrato su quello che stai facendo.
ONBOARD_NEXT_TRACK: Brano successivo
ONBOARD_NEXT_TRACK_DESCRIPTION: Tocca due volte il pulsante Riproduci/Pausa per saltare il brano.
ONBOARD_SET_UP_EMOJI_MENU: Menu emoji
ONBOARD_EMOJI_MENU_DESCRIPTION: Puoi anche aprire il menu emoji completo e selezionare una vasta gamma di emozioni.
ONBOARD_SET_UP_CUSTOMIZE_KEYS_CAPS: Personalizza i copritasti
ONBOARD_CUSTOMIZE_KEYS_CAPS_DESCRIPTION: Esprimi la tua personalità online con gli 8 tasti emoji intercambiabili. Cambia e personalizza come vuoi tu.
ONBOARD_OPEN_CLOSE_TAB: Nuova e chiudi scheda del browser
ONBOARD_OPEN_CLOSE_TAB_DESCRIPTION: Premi il tasto per aprire una nuova scheda e chiuderla nel browser.
ONBOARD_LANGUAGE_SWITCH: Cambio lingua
ONBOARD_LANGUAGE_SWITCH_DESCRIPTION: Premi il pulsante di cambio lingua per passare alle preferenze di digitazione della tua tastiera.
ONBOARD_KEYS_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Associa la tastiera a un massimo di due dispositivi e passa da uno all'altro con la semplice pressione di un pulsante Easy-Switch™. Usa un solo {DEVICE_NAME} per il tuo laptop, desktop o tablet."
ONBOARD_MICE_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Associa al mouse fino a due dispositivi e passa dall’uno all'altro con la semplice pressione del pulsante Easy-Switch™. Usa un solo {DEVICE_NAME} per il tuo laptop, desktop o tablet."
ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION: "Associa la tastiera a un massimo di tre dispositivi e passa da uno all'altro con la semplice pressione di un pulsante Easy-Switch™. Usa un solo {DEVICE_NAME} per il tuo laptop, desktop o tablet."
ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION_V2: "Associa la tastiera a massimo tre dispositivi e passa dall'uno all'altro con la semplice pressione di un tasto Easy-Switch™. Usa una tastiera {DEVICE_NAME} per il tuo telefono, laptop o desktop."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION: "Associa al mouse fino a tre dispositivi e passa dall’uno all'altro con la semplice pressione del pulsante Easy-Switch™. Usa un solo {DEVICE_NAME} per il tuo laptop, desktop o tablet."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION_V2: "Associa al mouse fino a tre dispositivi e passa dall’uno all'altro con la semplice pressione del pulsante Easy-Switch™. Usa un solo {DEVICE_NAME} per il tuo laptop, desktop o tablet."
ONBOARD_KEYS_K480_EASY_SWITCH_DESCRIPTION: "Associa la tastiera a un massimo di 3 dispositivi e passa dall'uno all'altro utilizzando la manopola di selezione. Usa un solo {DEVICE_NAME} per il tuo laptop, desktop o tablet."
