##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Alla riga superiore della tastiera Craft sono già state assegnate alcune scelte rapide predefinite, ma puoi anche crearne di personalizzate."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Ti piacerebbe avere i controlli multimediali ma vuoi comunque avere accesso a F1, F2, ecc.? Puoi passare dall’uno all’altro come tasti funzione standard premendo <strong>Esc+Fn.</strong> Funziona come un interruttore: non è necessario tenere premuto il tasto Fn ogni volta."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Una nuova esperienza del pulsante girevole
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "La nostra missione con Craft era <strong>semplificare il tuo flusso di lavoro creativo</strong>. Il pulsante girevole è stato il primo passo per darti accesso istantaneo agli strumenti essenziali con tocco, pressione e rotazione. Ci siamo basati su questa visione per <strong>estendere le funzionalità</strong> di Craft e del pulsante girevole e non vediamo l'ora di farti vedere come funziona."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Controllo a portata di cursore
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Quando <strong>premi il pulsante girevole</strong>, adesso attiverai <strong>Actions Ring</strong>, una sovrapposizione su schermo personalizzabile che ti dà accesso immediato a strumenti, filtri, regolazioni, plug-in e altro ancora, direttamente sull'anello, nel momento in cui ne hai bisogno."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Avvia azioni
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Una volta aperto Actions Ring, utilizza il cursore per <strong>selezionare l’azione desiderata</strong> da eseguire e fai clic."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Regolazioni
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Per regolazioni rapide, basta <strong>passare sull’azione e girare il tasto girevole</strong> per regolare. Puoi anche regolare l'azione <strong>facendo clic e trascinando a sinistra o a destra </strong>sull'azione con il cursore."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Si adatta alle tue app
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>si adatta alle applicazioni che utilizzi</strong>, modificando automaticamente le funzioni del dispositivo per aumentare l’efficienza. Puoi utilizzare i profili predefiniti dell'applicazione o crearne di personalizzati per semplificare il flusso di lavoro."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Premi il pulsante in basso per scoprire le novità della tua tastiera Craft dall’aggiornamento a Options+.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Tutto ciò di cui hai bisogno per lavorare, ovunque tu ti trovi."
