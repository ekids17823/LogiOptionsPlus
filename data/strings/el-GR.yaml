##R500 AND R500s
ONBOARD_LASER: κόκκινο λέιζερ
ONBOARD_SET_UP_R500_POINTER_DESCRIPTION: "Δείξτε με ακρίβεια συγκεκριμένες περιοχές της παρουσίασής σας, με έναν εύχρηστο και φωτεινό δείκτη με {SLOTS_NAME}."
ONBOARD_R500_SET_UP_PRESENTER_INTRO: "ΤΗΛΕΧΕΙΡΙΣΤΗΡΙΟ ΠΑΡΟΥΣΙΑΣΕΩΝ ΜΕ ΛΕϊΖΕΡ %0"

##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Στην επάνω σειρά του πληκτρολογίου Craft έχουν ήδη αντιστοιχιστεί ορισμένες προεπιλεγμένες συντομεύσεις, αλλά μπορείτε να δημιουργήσετε και τις δικές σας."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Σας αρέσει να έχετε τα στοιχεία ελέγχου πολυμέσων, αλλά εξακολουθείτε να θέλετε να έχετε πρόσβαση στις λειτουργίες F1, F2 κ.λπ.; Μπορείτε να κάνετε εναλλαγή μεταξύ τους χρησιμοποιώντας τα τυπικά πλήκτρα λειτουργιών πατώντας <strong>Esc+Fn.</strong> Λειτουργεί ως διακόπτης – δεν χρειάζεται να κρατάτε παρατεταμένα το πλήκτρο Fn κάθε φορά."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Μια νέα εμπειρία του Περιστροφικού επιλογέα
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Η αποστολή μας με το Craft ήταν να <strong>βελτιστοποιήσουμε τη δημιουργική ροή της εργασίας σας</strong>. Ο Περιστροφικός επιλογέας ήταν το πρώτο μας βήμα για να σας παρέχουμε άμεση πρόσβαση στα απαραίτητα εργαλεία με το άγγιγμα, το πάτημα και την περιστροφή. Βασιστήκαμε σε αυτό το όραμα για να <strong>επεκτείνουμε τις δυνατότητες</strong> του Craft και του Περιστροφικού επιλογέα και είμαστε ενθουσιασμένοι να σας δείξουμε πώς λειτουργεί."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Η μαεστρία στην άκρη του δρομέα σας
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Όταν <strong>πιέζετε τον Περιστροφικό επιλογέα</strong>, θα ενεργοποιείτε το <strong>Actions Ring,</strong> μια προσαρμόσιμη επικάλυψη επί της οθόνης που σας δίνει άμεση πρόσβαση σε εργαλεία, φίλτρα, προσαρμογές, πρόσθετα και άλλα, απευθείας από το Ring, ακριβώς τη στιγμή που τα χρειάζεστε."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Εκκίνηση ενεργειών
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Μόλις ανοίξει το Actions Ring, χρησιμοποιήστε τον δρομέα για να <strong>επιλέξετε την ενέργεια που θέλετε</strong> να εκτελέσετε και κάντε κλικ."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Κάντε προσαρμογές
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Για γρήγορες προσαρμογές, απλώς <strong>τοποθετήστε τον δείκτη του ποντικιού πάνω από την ενέργεια και περιστρέψτε τον Περιστροφικό επιλογέα</strong> για προσαρμογή. Μπορείτε επίσης να προσαρμόσετε την ενέργεια <strong>κάνοντας κλικ και σύροντας με τον δρομέα σας αριστερά ή δεξιά</strong> στην ενέργεια."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Προσαρμόζεται στις εφαρμογές σας
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Το Actions Ring <strong>προσαρμόζεται στις εφαρμογές που χρησιμοποιείτε</strong>, αλλάζοντας αυτόματα τις λειτουργίες της συσκευής για μεγαλύτερη αποδοτικότητα. Μπορείτε να χρησιμοποιήσετε τα προεπιλεγμένα προφίλ εφαρμογών ή να δημιουργήσετε τα δικά σας, για να βελτιστοποιήσετε τη ροή της εργασίας σας."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Πατήστε το παρακάτω κουμπί για να δείτε τι νέο υπάρχει με το πληκτρολόγιο Craft μετά την αναβάθμιση σε Options+.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Όλα όσα χρειάζεστε για την εργασία σας, όπου κι αν βρίσκεστε."
