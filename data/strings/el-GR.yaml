PRESENTER_TOOLTIP: Κάντε διπλό κλικ στο κουμπί του δείκτη για εναλλαγή μεταξύ των εφέ.
CONFIGURATION_COPY_MAGNIFY_SCREEN_PERMISSION: Ενεργοποιήστε τα δικαιώματα εγγραφής οθόνης προκειμένου να μεγεθύνετε το περιεχόμενο που εμφανίζεται στην οθόνη
ENABLE_NOW: ΕΝΕΡΓΟΠΟΙΗΣΗ ΤΩΡΑ
