ONBOARD_SET_UP_MUTE_UNMUTE: Σίγαση/Κατάργηση σίγασης
ONBOARD_MUTE_UNMUTE_DESCRIPTION: Πατήστε το κουμπί του μικροφώνου για σίγαση/απενεργοποίηση σίγασης κατά τη διάρκεια των συσκέψεών σας.
ONBOARD_MUTE_UNMUTE_DESCRIPTION_1: "Πατήστε το πλήκτρο για να ενεργοποιήσετε ή να απενεργοποιήσετε τη σίγαση του μικροφώνου, για κλήσεις χωρίς διακοπές."
ONBOARD_SET_UP_DICTATION_AND_EMOJI: Υπαγόρευση και Emoji
ONBOARD_SET_UP_DICTATION_AND_EMOJI_SCREENSHOT: "Υπαγόρευση, Emoji και Πλήκτρο αποτύπωσης οθόνης"
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION: Πατήστε το πλήκτρο υπαγόρευσης για να μετατρέψετε την ομιλία σε κείμενο σε οποιοδήποτε πεδίο κειμένου. Χρησιμοποιήστε γρήγορα τα emoji με το πλήκτρο για τα emoji.
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_SCREENSHOT: "Δοκιμάστε το κουμπί υπαγόρευσης για να αρχίσετε την υπαγόρευση για οτιδήποτε εμφανίζεται σε ένα ενεργό πεδίο κειμένου. Μπορείτε, επίσης, να αποκτήσετε γρήγορη πρόσβαση στα emoji χρησιμοποιώντας το πλήκτρο emoji. Αποτυπώστε εύκολα περιεχόμενο στιγμιότυπου οθόνης στην οθόνη σας με το πλήκτρο αποτύπωσης οθόνης."
ONBOARD_SET_UP_DO_NOT_DISTURB: Μην ενοχλείτε
ONBOARD_DO_NOT_DISTURB_DESCRIPTION: Ενεργοποιήστε τη λειτουργία «Μην ενοχλείτε» του Mac για να συγκεντρώνεστε στην εργασία σας όποτε αυτό είναι απαραίτητο.
ONBOARD_NEXT_TRACK: Επόμενο κομμάτι
ONBOARD_NEXT_TRACK_DESCRIPTION: "Πατήστε δύο φορές το κουμπί Αναπαραγωγής/Παύσης, για παράλειψη κομματιού."
ONBOARD_SET_UP_EMOJI_MENU: Μενού Emoji
ONBOARD_EMOJI_MENU_DESCRIPTION: Μπορείτε επίσης να ανοίξετε το πλήρες μενού emoji και να επιλέξετε μέσα από μια μεγάλη ποικιλία συναισθημάτων.
ONBOARD_SET_UP_CUSTOMIZE_KEYS_CAPS: Προσαρμογή πλήκτρων
ONBOARD_CUSTOMIZE_KEYS_CAPS_DESCRIPTION: Ελευθερώστε τη διαδικτυακή προσωπικότητά σας με 8 πλήκτρα emoji που μπορείτε να αντικαταστήσετε. Αλλάξτε και προσαρμόστε τα όπως θέλετε.
ONBOARD_OPEN_CLOSE_TAB: Νέα καρτέλα και κλείσιμο καρτέλας προγράμματος περιήγησης
ONBOARD_OPEN_CLOSE_TAB_DESCRIPTION: Πατήστε το πλήκτρο για να ανοίξει νέα και να κλείσει η καρτέλα στο πρόγραμμα περιήγησης.
ONBOARD_LANGUAGE_SWITCH: Εναλλαγή γλώσσας
ONBOARD_LANGUAGE_SWITCH_DESCRIPTION: Πατήστε το κουμπί εναλλαγής γλώσσας για εναλλαγή στις προτιμήσεις πληκτρολόγησης του πληκτρολογίου σας.
ONBOARD_KEYS_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Κάντε σύζευξη του πληκτρολογίου σας με έως και 2 συσκευές και κάντε εναλλαγή μεταξύ τους με το πάτημα του κουμπιού Easy-Switch™. Χρησιμοποιήστε ένα {DEVICE_NAME} για τον φορητό υπολογιστή, τον επιτραπέζιο υπολογιστή ή το tablet σας."
ONBOARD_MICE_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Κάντε σύζευξη του ποντικιού σας με έως και 2 συσκευές και κάντε εναλλαγή μεταξύ τους με το πάτημα ενός κουμπιού Easy-Switch™. Χρησιμοποιήστε ένα {DEVICE_NAME} για τον φορητό υπολογιστή, τον επιτραπέζιο υπολογιστή ή το tablet σας."
ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION: "Κάντε σύζευξη του πληκτρολογίου σας με έως και 3 συσκευές και κάντε εναλλαγή μεταξύ τους με το πάτημα του κουμπιού Easy-Switch™. Χρησιμοποιήστε ένα {DEVICE_NAME} για τον φορητό υπολογιστή, τον επιτραπέζιο υπολογιστή ή το tablet σας."
ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION_V2: "Πραγματοποιήστε σύζευξη του πληκτρολογίου σας με έως και τρεις συσκευές και κάντε εναλλαγή μεταξύ τους με το πάτημα ενός πλήκτρου Easy-Switch™. Χρησιμοποιήστε ένα {DEVICE_NAME} πληκτρολόγιο για το τηλέφωνο, τον φορητό υπολογιστή ή τον επιτραπέζιο υπολογιστή σας."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION: "Κάντε σύζευξη του ποντικιού σας με έως και 3 συσκευές και κάντε εναλλαγή μεταξύ τους με το πάτημα ενός κουμπιού Easy-Switch™. Χρησιμοποιήστε ένα {DEVICE_NAME} για τον φορητό υπολογιστή, τον επιτραπέζιο υπολογιστή ή το tablet σας."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION_V2: "Κάντε σύζευξη του ποντικιού σας με έως και 3 συσκευές και κάντε εναλλαγή μεταξύ τους με το πάτημα ενός κουμπιού Easy-Switch™. Χρησιμοποιήστε ένα {DEVICE_NAME} για τον φορητό υπολογιστή, τον επιτραπέζιο υπολογιστή ή το tablet σας."
ONBOARD_KEYS_K480_EASY_SWITCH_DESCRIPTION: "Κάντε σύζευξη του πληκτρολογίου με έως και 3 συσκευές και κάντε εναλλαγή μεταξύ τους χρησιμοποιώντας το ρυθμιστικό επιλογέα. Χρησιμοποιήστε ένα {DEVICE_NAME} για τον φορητό υπολογιστή, τον επιτραπέζιο υπολογιστή ή το tablet σας."
# MX-Keys Onboard strings end

# K800 Onboard strings start
ONBOARD_BATTERY_NOTIFICATION: Ειδοποίηση για την μπαταρία
ONBOARD_SET_UP_BATTERY_NOTIFICATION_DESCRIPTION: Η ενδεικτική λυχνία κατάστασης μπαταρίας ανάβει με κόκκινο χρώμα όταν η στάθμη της μπαταρίας είναι χαμηλή. Χρησιμοποιήστε το καλώδιο φόρτισης που συνόδευε το πληκτρολόγιο για να φορτίσετε το πληκτρολόγιο.
ONBOARD_F_KEY_DESCRIPTION: "Τα βελτιωμένα και φιλικά προς το χρήστη πλήκτρα F σας δίνουν τη δυνατότητα να ανοίγετε εύκολα εφαρμογές. Για να χρησιμοποιήσετε τις βελτιωμένες λειτουργίες (κίτρινα εικονίδια), πρώτα πατήστε παρατεταμένα το πλήκτρο ‘/ και ύστερα το πλήκτρο F που θέλετε να χρησιμοποιήσετε."
# K800 Onboard strings end

#M275/M280/M320/B330/M330/M331 Onboard strings start
ONBOARD_CUSTOMIZE_MIDDLE_BUTTON: Προσαρμογή μεσαίου κουμπιού
ONBOARD_MIDDLE_BUTTON_DESCRIPTION: Ακολουθεί μια λίστα συνιστώμενων ενεργειών για να προσαρμόσετε το δικό σας μεσαίο κουμπί. Υπάρχουν περισσότερες επιλογές διαθέσιμες μετά την εισαγωγή στη χρήση.
