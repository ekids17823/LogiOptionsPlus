AI_OVERLAY_SAMPLE_TEXT_CONTENT: "Γεια σας, ήθελα απλώς να σας πω ότι δεν θα μπορέσω να έρθω στη σύσκεψη της Παρασκευής. Έχω κάτι άλλο προγραμματισμένο εκείνη την ώρα και, δυστυχώς, δεν μπορώ να το αλλάξω γιατί είναι πολύ σημαντικό. Γνωρίζω ότι οι συσκέψεις είναι απαραίτητες για να είμαστε όλοι ενημερωμένοι και λυπάμαι πραγματικά αν η απουσία μου προκαλέσει προβλήματα ή καθυστερήσεις."
