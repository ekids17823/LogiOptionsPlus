MACRO_ONBOARDING_FIFTH_TITLE: ΕΙΣΤΕ ΕΤΟΙΜΟΙ
MACRO_ONBOARDING_FIFTH_DESCRIPTION: "Τώρα, μπορείτε να εξερευνήσετε τα πρότυπα Smart Actions ή να δημιουργήσετε τα δικά σας."
MACRO_ONBOARDING_RESTART: ΕΠΑΝΕΚΚΙΝΗΣΗ
MACRO_TEMPLATES_TAB_BANNER: "Σε αυτήν την καρτέλα, μπορείτε να βρείτε πρότυπα Smart Actions που έχουμε δημιουργήσει για εσάς. Απλώς επιλέξτε ένα από αυτά, πατήστε «ΛΗΨΗ», αντιστοιχίστε το στη συσκευή σας και είναι έτοιμο για χρήση! Αφού ολοκληρωθεί η εγκατάσταση, μπορείτε να τα χρησιμοποιήσετε αυτούσια ή να τα προσαρμόσετε ανάλογα με τις ανάγκες σας."
MACRO_MANAGE_TAB_BANNER: "Σε αυτήν την καρτέλα, εμφανίζονται τα Smart Actions σας. Μπορείτε να προσθέσετε Smart Actions από τα διαθέσιμα πρότυπα ή να δημιουργήσετε ένα εντελώς νέο, χρησιμοποιώντας το κουμπί «Δημιουργία». Πειραματιστείτε ελεύθερα με τα Smart Actions ανάλογα με τις ανάγκες σας. Μπορείτε να χρησιμοποιήσετε τη λειτουργία «Εξαγωγή/Εισαγωγή ως αρχείο», για να μοιραστείτε τα Smart Actions που έχετε δημιουργήσει με τους φίλους και τους συναδέλφους σας."
MACRO_DEVICE_TOOLTIP: "Σας επιτρέπει να αντιστοιχίσετε ένα έναυσμα με ένα πλήκτρο στο πληκτρολόγιο ή στο ποντίκι. Μπορείτε, επίσης, να το αναθέσετε σε ένα συγκεκριμένο προφίλ εφαρμογής."
MACRO_APPLICATION_TRIGGER_TOOLTIP: "Σας επιτρέπει να ενεργοποιείτε τα Smart Actions αναθέτοντας ένα συμβάν εφαρμογής. Τώρα μπορείτε να αναθέσετε το άνοιγμα, το κλείσιμο ή τη μεταφορά συμβάντων εφαρμογών στο προσκήνιο."
MACRO_APPLICATION_TOOLTIP: Σας επιτρέπει να ανοίγετε/κλείνετε/φέρνετε στο προσκήνιο τις εγκατεστημένες εφαρμογές σας. Οι εφαρμογές με πρόσθετες ενέργειες που αφορούν συγκεκριμένες εφαρμογές θα είναι διαθέσιμες για εσάς στην κορυφή της λίστας σας. Περισσότερες ενέργειες για συγκεκριμένες εφαρμογές σύντομα κοντά σας!
MACRO_KEYSTROKE_TOOLTIP: Σας επιτρέπει να αναπαράγετε συντομεύσεις ή οποιεσδήποτε ακολουθίες πατημάτων και απελευθερώσεων πλήκτρων.
MACRO_TEXT_TOOLTIP: "Σας επιτρέπει να κάνετε επικόλληση κειμένου. Μπορεί να είναι μια διεύθυνση URL, μια διαδρομή καταλόγου, ένα κομμάτι κώδικα, μια εντολή, ένα μήνυμα ή ένα πρότυπο email."
MACRO_SYSTEM_TOOLTIP: "Σας επιτρέπει να εκτελείτε ενέργειες συστήματος, όπως ο τερματισμός λειτουργίας, το άνοιγμα αρχείων, η αντιγραφή, η διαγραφή και πολλά άλλα."
MACRO_DELAY_TOOLTIP: "Σας επιτρέπει να δημιουργείτε καθυστερήσεις μεταξύ των ενεργειών που έχετε προσθέσει. Είναι χρήσιμο όταν πρέπει να περιμένετε να ολοκληρωθεί η προηγούμενη ενέργεια, πριν εκτελέσετε την επόμενη ενέργεια."
MACRO_APP_ACTION_TT_TRIGGER_AS_TRIGGER: Αυτή η ενεργοποίηση εφαρμογής είναι ήδη επιλεγμένη.
MACRO_APP_ACTION_TT_TRIGGER_AS_ACTION: Αυτή η ενεργοποίηση εφαρμογής χρησιμοποιείται από άλλα smart actions ως ενέργεια.
MACRO_APP_ACTION_TT_TRIGGER_AS_ACTION_BELOW: Αυτή η ενεργοποίηση εφαρμογής έχει ήδη επιλεγεί ως ενέργεια παρακάτω.
MACRO_APP_ACTION_TT_ACTION_AS_TRIGGER: Αυτή η ενέργεια εφαρμογής χρησιμοποιείται από άλλα smart actions ως έναυσμα.
MACRO_APP_ACTION_TT_ACTION_AS_TRIGGER_ABOVE: Αυτή η ενέργεια εφαρμογής έχει ήδη επιλεγεί ως έναυσμα παραπάνω.
