#Living room Keyboards Onboard strings start
ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_TITLE: Έλεγχος με κινήσεις
ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_DESCRIPTION: Απολαύστε την περιήγηση στο web χωρίς προβλήματα με ένα touchpad που έχει βελτιστοποιηθεί για μεγάλες οθόνες τηλεοράσεων. Χρησιμοποιήστε δύο δάχτυλα για να κάνετε κύλιση προς τα επάνω και προς τα κάτω σε μεγάλες ιστοσελίδες καθώς και μεγέθυνση ή σμίκρυνση στο PC που έχετε συνδέσει στην τηλεόραση.
ONBOARD_LIVING_ROOM_KB_D_PAD_TITLE: Πλήκτρα κατεύθυνσης
ONBOARD_LIVING_ROOM_KB_D_PAD_DESCRIPTION: Πλήκτρα κατεύθυνσης για εύκολη πλοήγηση στα μενού που εμφανίζονται στην οθόνη και στο περιβάλλον των εφαρμογών της Smart TV. Μπορείτε να χρησιμοποιείτε τα πλήκτρα κατεύθυνσης και για να ελέγχετε την αναπαραγωγή των πολυμέσων στις αγαπημένες σας εφαρμογές streaming.
ONBOARD_LIVING_ROOM_KB_K830_GESTURE_CONTROL_DESCRIPTION: Ο έλεγχος με κινήσεις αναγνωρίζει τις κινήσεις του χεριού σας και διευκολύνει τον έλεγχο του υπολογιστή.
ONBOARD_SMART_BACKLIGHT_DESCRIPTION: Ο αισθητήρας οπίσθιου φωτισμού προσαρμόζει το επίπεδο οπίσθιου φωτισμού ώστε να εξοικονομείται ενέργεια όταν υπάρχει αρκετό φυσικό φως. Χρησιμοποιήστε το επισημασμένο πλήκτρο για να αλλάξετε το επίπεδο του οπίσθιου φωτισμού με μη αυτόματο τρόπο.
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_TITLE: Αριστερό και δεξί κουμπί ποντικιού
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_DESCRIPTION: Το αριστερό και το δεξί κουμπί ποντικιού στην επάνω αριστερή πλευρά του πληκτρολογίου. Σας επιτρέπουν να χρησιμοποιείτε το touchpad με το δεξί σας χέρι και να επιλέγετε με το αριστερό.
#Living room Keyboards Onboard strings end

# MX-Vertical-mini
ONBOARD_ERGO_BENEFITS_TITLE: Εργονομική σχεδίαση
ONBOARD_ERGO_BENEFITS_DESCRIPTION: Το LIFT είναι ένα κατακόρυφο εργονομικό ποντίκι που έχει σχεδιαστεί για να εξασφαλίζετε πολύωρη εργασία με άνεση και να νιώθετε καλύτερα στο τέλος μιας δύσκολης ημέρας στο γραφείο.
ONBOARD_ERGO_BENEFITS_DESCRIPTION_1: "Η όμορφη κατακόρυφη σχεδίαση με σχήμα που ταιριάζει στα χέρια σας, ανασηκώνει τον καρπό σας σε πιο φυσική θέση και σάς βοηθά να παραμένετε χαλαροί κατά τη διάρκεια της ημέρας, ώστε να επικεντρώνεστε σε ό,τι έχει πραγματικά σημασία!"
ONBOARD_SETUP_DPI_SWITCH_TITLE: Εναλλαγή SmartWheel και DPI
ONBOARD_SETUP_SMART_WHEEL_DESCRIPTION: Κάντε κύλιση με ακρίβεια γραμμής ή περιηγηθείτε γρήγορα σε πολλές σελίδες.
ONBOARD_SETUP_DPI_SWITCH_DESCRIPTION: Κάντε κλικ στο κουμπί εναλλαγής DPI για εναλλαγή μεταξύ δύο επιπέδων ευαισθησίας. Κινηθείτε ταχύτερα ή με μεγαλύτερη ακρίβεια με το πάτημα ενός κουμπιού.
ONBOARD_SETUP_DPI_SWITCH_HOTSPOT: Εναλλαγή DPI

#MX Ergo
# MX Ergo Onboarding strings start
ONBOARD_MX_ERGO_BENEFITS_TITLE: "Λιγότερη κίνηση, καλύτερη στάση."
ONBOARD_MX_ERGO_BENEFITS_DESCRIPTION: "Επειδή δεν χρειάζεται να κινείτε το χέρι σας για να μετακινείτε τον δείκτη, μπορείτε να ελαχιστοποιήσετε τις κινήσεις και να μεγιστοποιήσετε την απόδοσή σας. Το trackball προκαλεί 20% λιγότερη κόπωση των μυών στο χέρι, τον καρπό και το αντιβράχιο σε σχέση με ένα συνηθισμένο ποντίκι."
ONBOARD_PRECISION_MODE_TITLE: Λειτουργία ακριβείας
ONBOARD_PRECISION_MODE_DESCRIPTION: Το κουμπί της λειτουργίας ακριβείας (DPI) σάς επιτρέπει να αλλάζετε απρόσκοπτα μεταξύ της ακριβούς και της γρήγορης λειτουργίας ανίχνευσης κίνησης.
# MX Ergo Onboarding strings end

ONBOARD_ERGO_M570_BENEFITS_DESCRIPTION: "Το ERGO M570 έχει σχεδιαστεί και κατασκευαστεί με γνώμονα την εργονομία, ώστε να ταιριάζει τέλεια στο σχήμα του χεριού σας. Επειδή δεν χρειάζεται να κινείτε τον βραχίονα για να μετακινείτε τον δείκτη, μειώνεται η κούραση που νιώθετε στο χέρι και τον βραχίονα."

## POP MOUSE
ONBOARD_SMART_WHEEL_DESCRIPTION_1: Ακρίβεια κατά απαίτηση ή κύλιση υψηλής ταχύτητας. Περιηγηθείτε σε μεγάλα έγγραφα χωρίς κόπο.
ONBOARD_ONE_TOUCH_EMOJI: Emoji με ένα άγγιγμα
ONBOARD_ONE_TOUCH_EMOJI_DESCRIPTION: Προσαρμόστε το κουμπί Emoji με την αγαπημένη σας συντόμευση.
ONBOARD_EMOJI_HELLO: Γεια σας!
ONBOARD_EMOJI_Hi: Γεια!
ONBOARD_APP_SPECIFIC_SETTINGS_DESCRIPTION_FOR_POP_MOUSE: "Μπορείτε να αναθέσετε διαφορετικά emoji για τις διάφορες εφαρμογές που χρησιμοποιείτε. Βελτιστοποιημένο για WeChat, Zoom και Teams"
ONBOARD_APP_SPECIFIC_SETTINGS_DESCRIPTION_1: Μπορείτε να αναθέσετε διαφορετικά emoji για τις διάφορες εφαρμογές που χρησιμοποιείτε. Βελτιστοποιημένο για WeChat.
ONBOARD_APP_SPECIFIC_SETTINGS_KEYBOARD_DESCRIPTION: Προσαρμόστε το πληκτρολόγιο για οποιαδήποτε εφαρμογή χρησιμοποιείτε. Εργαστείτε ταχύτερα με μερικές από τις προκαθορισμένες προσαρμογές μας.
ONBOARD_POP_MOUSE_INTRODUCTION_TITLE: "Γεια σας, λάτρη των POP!"
ONBOARD_POP_MOUSE_INTRODUCTION_DESCRIPTION: "Εξατομικεύστε τα κουμπιά σας με συντομεύσεις για τα εργαλεία AI, τις εφαρμογές εργασίας και κοινωνικής δικτύωσης και άλλα για να κάνετε τη ζωή σας πιο εύκολη."
ONBOARD_SMART_POSSIBILITIES_TITLE: "Ανακαλύψτε ή δημιουργήστε συντομεύσεις για μεγιστοποίηση %0"
ONBOARD_FEATURE_AI_TITLE: Ανοίξτε άμεσα τα εργαλεία AI
ONBOARD_FEATURE_AI_DESCRIPTION: "Αντιστοιχίστε τα εργαλεία AI ή τις συντομεύσεις του Logi AI Prompt Builder στο Κουμπί ενεργειών για άμεση βοήθεια με απαντήσεις, γραμματικούς ελέγχους, περιλήψεις και άλλα."
ONBOARD_FEATURE_AI_PORTAL_DESCRIPTION: "Αντιστοιχίστε τα εργαλεία AI ή τις συντομεύσεις της Πύλης Logi AI στο Κουμπί ενεργειών για άμεση βοήθεια με απαντήσεις, γραμματικούς ελέγχους, περιλήψεις και άλλα."
