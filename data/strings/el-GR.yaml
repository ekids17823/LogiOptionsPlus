WHATSNEW_TAB3_CONTENT2: "Η ενέργεια \"Αλλαγή προφίλ\" έχει βελτιωθεί και επιτρέπει πλέον τη μετάβαση σε προφίλ για διαφορετικές εφαρμογές (και την τοποθέτηση της εφαρμογής στο επίκεντρο αν είναι ανοιχτή), καθώς και στο Γενικό προφίλ."
