## LITRA GLOW START
ONBOARD_INTRO_TITLE_LITRA_TRUESOFT: Litra glow με TrueSoft
ONBOARD_LITRA_TRUESOFT_DESCRIPTION: "Το Litra Glow είναι ο πιο γρήγορος τρόπος για να έχετε μια εξαιρετική εμπειρία φωτισμού από οποιονδήποτε φορητό ή σταθερό υπολογιστή. Με την τεχνολογία TrueSoft της Logitech και ένα καινοτόμο φωτιστικό σώμα χωρίς άκρα, το {DEVICE_NAME} τυλίγει το θέμα σας με ένα απαλό, κολακευτικό φως, για μια επαγγελματική εμφάνιση σε οποιοδήποτε περιβάλλον."
ONBOARD_SET_UP_MANUAL_LIGHT_SETTINGS: Ρυθμίσεις μη αυτόματου φωτισμού
ONBOARD_SET_UP_LIGHT_MANUAL_SETTINGS_DESCRIPTION: "Προσαρμογή των ρυθμίσεων θερμοκρασίας και φωτεινότητας χρώματος, για την επίτευξη της ιδανικής εμφάνισης."
ONBOARD_SET_UP_VIDEO_APP_SPECIFIC_SETTINGS: Ρυθμίσεις για συγκεκριμένες εφαρμογές - Βιντεοκλήσεις
ONBOARD_SET_UP_BROWSER_APP_SPECIFIC_SETTINGS: Ρυθμίσεις για συγκεκριμένες εφαρμογές - Πρόγραμμα περιήγησης
ONBOARD_SET_UP_EDITING_APP_SPECIFIC_SETTINGS: Ρυθμίσεις για συγκεκριμένες εφαρμογές - Παραγωγικότητα
ONBOARD_SET_UP_VIDEO_APP_SPECIFIC_DESCRIPTION: "Το {DEVICE_NAME} μπορεί να έχει διαφορετικές ρυθμίσεις για τις αγαπημένες σας εφαρμογές, όπως το Zoom® ή το Microsoft Teams®. Μπορείτε να προσαρμόσετε το {DEVICE_NAME} σας για κάθε μία από τις εφαρμογές που ξεκινάτε ή σταματάτε το βίντεο Zoom σας."
ONBOARD_SET_UP_BROWSER_APP_SPECIFIC_DESCRIPTION: "Το {DEVICE_NAME} σας μπορεί να έχει διαφορετικές ρυθμίσεις για τις αγαπημένες σας εφαρμογές. Μπορείτε να προσαρμόσετε το {DEVICE_NAME} όταν πλοηγείστε."
ONBOARD_SET_UP_EDITING_APP_SPECIFIC_DESCRIPTION: "Το {DEVICE_NAME} σας μπορεί να έχει διαφορετικές ρυθμίσεις για τις αγαπημένες σας εφαρμογές, όπως το Photoshop ή το Final Cut Pro. Μπορείτε να προσαρμόσετε το {DEVICE_NAME} σας σε φωτεινό ψυχρό μπλε ή σε ζεστό φως κεριού, όταν δημιουργείτε ή επεξεργάζεστε βίντεο."
ONBOARD_SET_UP_APP_SPECIFIC_SETTINGS_VIDEO_CALLS: Βιντεοκλήσεις
ONBOARD_SET_UP_APP_SPECIFIC_SETTINGS_BROWSER: Πρόγραμμα περιήγησης
ONBOARD_SET_UP_APP_SPECIFIC_SETTINGS_EDITING: Επεξεργασία
ONBOARD_SET_UP_LIGHT_PRESET: Προεπιλογές φωτισμού
ONBOARD_SET_UP_LIGHT_PRESET_SETTINGS_DESCRIPTION: "Ανακαλύψτε την προεπιλογή με ένα κλικ ή χρησιμοποιήστε τις ως σημείο εκκίνησης, για να δημιουργήσετε την δική σας."
ONBOARD_SET_UP_LIGHT_ACTION_TITLE: Επιλέξτε τη συσκευή σας για εργασίες φωτισμού
ONBOARD_SET_UP_LIGHT_ACTION_DESCRIPTION: "Επιλέξτε ένα από τα πλήκτρα ή τα κουμπιά της συσκευής σας ως εργασίες φωτισμού. Μάθετε πώς, στη διεύθυνση {SUPPORT_LINK}"
LIGHT_ACTION_SUPPORT_LINK: logi.com/support
## LITRA GLOW END

##LITRA BEAM START
ONBOARD_INTRO_TITLE_LITRA_BEAM_TRUESOFT: Litra beam με TrueSoft
ONBOARD_LITRA_BEAM_TRUESOFT_DESCRIPTION: "Το {DEVICE_NAME} είναι ο πιο γρήγορος τρόπος για να έχετε μια εξαιρετική εμπειρία φωτισμού από οποιονδήποτε φορητό ή σταθερό υπολογιστή. Με την τεχνολογία TrueSoft της Logitech και ένα καινοτόμο φωτιστικό σώμα χωρίς άκρα, το {DEVICE_NAME} τυλίγει το θέμα σας με ένα απαλό, κολακευτικό φως, για μια επαγγελματική εμφάνιση σε οποιοδήποτε περιβάλλον."
ONBOARD_SET_UP_LITRA_BEAM_FEATURING: Σας βοηθάμε να δείξετε τον καλύτερο εαυτό σας
ONBOARD_LITRA_BEAM_FEATURING_DESCRIPTION: "Ένα βασικό στοιχείο για να σας βοηθήσουμε να δείξετε τον καλύτερο εαυτό σας στην οθόνη, είναι η θέση του φωτισμού Litra Beam. Το μοναδικό σχήμα και η βάση στήριξης σας επιτρέπουν να τοποθετήσετε το φως σας, ώστε να επιτύχετε τον ιδανικό φωτισμό ανάλογα με τη διάθεσή σας. Μάθετε περισσότερα στη διεύθυνση {SUPPORT_LINK}"
SUPPORT_LINK_DESCRIPTION: logi.com/support
##LITRA BEAM END

##K840 START
ONBOARD_MECHANICAL_SWITCH_TITLE: Σώμα αλουμινίου και μαλακό πληκτρολόγιο
ONBOARD_MECHANICAL_SWITCH_DESCRIPTION: "Το K840 λειτουργεί με λειτουργικά συστήματα Windows, το μηχανικό του πληκτρολόγιο έχει στιβαρή κατασκευή αλουμινίου με έξυπνα σχεδιασμένους μηχανικούς διακόπτες Romer-G™."
##K840 END

##k370 for Business START
ONBOARD_DUAL_LAYOUT_TITLE: Διπλή διάταξη
ONBOARD_DUAL_LAYOUT_DESCRIPTION: "Το {DEVICE_NAME} είναι συμβατή με λειτουργικά συστήματα Windows και Mac και σας επιτρέπει να κάνετε εναλλαγή μεταξύ όλων των συσκευών που έχετε συνδέσει."
ONBOARD_CUSTOMIZE_KEYS_FOR_K370: "Ελέγξτε τη ροή εργασίας σας με το Logi Options+. Έχουμε ορίσει έτοιμες συντομεύσεις, αλλά μπορείτε να δημιουργήσετε και δικές σας."
ONBOARD_SET_YOUR_HOT_KEYS: Ρυθμίστε τα πλήκτρα συντομεύσεων
ONBOARD_SET_YOUR_HOT_KEYS_DESCRIPTION: "Χρησιμοποιήστε τις έτοιμες συντομεύσεις εξοικονόμησης χρόνου ή δημιουργήστε τις δικές σας, για να εργάζεστε πιο αποτελεσματικά."
ONBOARD_SET_YOUR_FN_KEYS: Ορίστε τα πλήκτρα F
ONBOARD_SET_YOUR_FN_KEYS_DESCRIPTION: Προσαρμόστε τις προεπιλεγμένες ενέργειες των πλήκτρων Fn από τις προτεινόμενες ενέργειες ή εξερευνήστε περισσότερες ενέργειες.
ONBOARD_SET_YOUR_FN_KEY_NOTE: "{SLOTS_NAME}: Τα προσαρμοσμένα πλήκτρα Fn μπορούν να επαναπροσδιοριστούν, ώστε να λειτουργούν όπως τα προεπιλεγμένα πλήκτρα Fn, αντιστοιχώντας την προεπιλεγμένη λειτουργία (π.χ. F1, F2, κ.λπ.)."
ONBOARD_SET_YOUR_CONNECTIVITY_KEYS: Πλήκτρο συνδεσιμότητας
ONBOARD_SET_YOUR_CONNECTIVITY_DESCRIPTION: "Μπορείτε να συνδέσετε εύκολα το {DEVICE_NAME} σας, χρησιμοποιώντας τον δέκτη Logi Bolt ή μέσω Bluetooth."
ONBOARD_NOTE: Σημείωση
##k370 for Business END

##K400 START
ONBOARD_GESTURE_CONTROL: Έλεγχος με κινήσεις
ONBOARD_LIVING_ROOM_GESTURE_CONTROL_DESCRIPTION: Ο έλεγχος με κινήσεις αναγνωρίζει τις κινήσεις του χεριού σας και διευκολύνει τον έλεγχο του υπολογιστή.
ONBOARD_LEFT_MOUSE_CLICK: Αριστερό κουμπί ποντικιού
ONBOARD_LEFT_MOUSE_CLICK_DESCRIPTION: Το αριστερό κουμπί ποντικιού στην επάνω αριστερή πλευρά του πληκτρολογίου. Σας επιτρέπει να χρησιμοποιείτε το touchpad με το δεξί σας χέρι και να επιλέγετε με το αριστερό.
ONBOARD_BATTERY_DESCRIPTION_18: Το πληκτρολόγιο δεν θα χρειαστεί αλλαγή μπαταρίας για 18 μήνες.
##K400 END

ONBOARD_VC_CONTROL_TITLE: Πλήκτρα ελέγχου συσκέψεων
ONBOARD_VC_CONTROL_DESCRIPTION: Πραγματοποιήστε σίγαση/κατάργηση σίγασης ή ενεργοποίηση/απενεργοποίηση του βίντεο με τα πλήκτρα ελέγχου μικροφώνου και βίντεο κατά τη διάρκεια των συσκέψεων μέσω του Zoom ή του Microsoft Teams.
ONBOARD_VC_APP_SPECIFIC_SETTINGS_DESCRIPTION: "Η διαμόρφωση των πλήκτρων ελέγχου συσκέψεων ολοκληρώθηκε, ώστε να υποστηρίζουν το Zoom και το Microsoft Teams. Τώρα μπορείτε να χρησιμοποιήσετε άμεσα αυτές τις λειτουργίες."
ONBOARD_SLOT_VC_PROFILE_ACTIONS: "Κοινή χρήση οθόνης Έναρξη/διακοπή βίντεο Σίγαση/κατάργηση σίγασης μικροφώνου"
ONBOARD_AI_KEY_TITLE: Πλήκτρο εκκίνησης AI
ONBOARD_AI_KEY_DESCRIPTION: "Έτοιμο για χρήση, το πλήκτρο εκκίνησης AI ανοίγει το Copilot στα Windows ή το Gemini για το ChromeOS, αν είναι διαθέσιμο στη συσκευή σας. Εναλλακτικά, έχετε την επιλογή να προσαρμόσετε το πλήκτρο ή να επαναφέρετε στο δεξί πλήκτρο ελέγχου (Control)."
ONBOARD_KB_LAYOUT_SWITCH_TITLE: Διακόπτης διάταξης πληκτρολογίου
ONBOARD_KB_LAYOUT_SWITCH_DESCRIPTION: "Τώρα, απλώς αλλάξτε τη διάταξη του πληκτρολογίου, ώστε να ταιριάζει με το λειτουργικό σύστημα που χρησιμοποιείτε."
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_V2: "Δοκιμάστε το κουμπί υπαγόρευσης για να αρχίσετε την υπαγόρευση για οτιδήποτε εμφανίζεται σε ένα ενεργό πεδίο κειμένου. Μπορείτε, επίσης, να αποκτήσετε γρήγορη πρόσβαση στα emoji χρησιμοποιώντας το πλήκτρο emoji."
ONBOARD_SET_YOUR_F_KEYS_V2: Ορίστε τα πλήκτρα F
ONBOARD_SET_YOUR_F_KEYS_DESCRIPTION_V2: "Κάντε εναλλαγή μεταξύ των πλήκτρων πολυμέσων και Fn ανά πάσα στιγμή πατώντας Fn+Esc. Χρησιμοποιήστε ελεύθερα τα πλήκτρα F, δεν χρειάζεται να κρατάτε το Fn."

##Spotlight
ONBOARD_SET_UP_PRESENTER_INTRO: "%0 Τηλεχειριστήριο παρουσιάσεων"
ONBOARD_SET_UP_PRESENTER_INTRO_DESCRIPTION: "Περιηγηθείτε εύκολα στις διαφάνειες με εύχρηστα κουμπιά. Επισημάνετε και μεγεθύνετε περιεχόμενο εύκολα. Διατηρήστε τον έλεγχο μέχρι την τελευταία διαφάνεια, με χρονοδιακόπτη και ειδοποιήσεις με δόνηση."
ONBOARD_SET_UP_PRESENTER_NEXT_BUTTON: Κουμπί «Επόμενο»
ONBOARD_SET_UP_PRESENTER_NEXT_BUTTON_DESCRIPTION: "Κάντε κλικ στο κουμπί «Επόμενο» για να μεταβείτε στην επόμενη διαφάνεια. Μπορείτε, επιπλέον, να προσαρμόσετε ενέργειες όπως το «Έναρξη παρουσίασης», ώστε να εκτελούνται με παρατεταμένο πάτημα του επόμενου κουμπιού."
ONBOARD_SET_UP_PRESENTER_BACK_BUTTON: Κουμπί «Πίσω»
ONBOARD_NEXT_DESCRIPTION: "%0 ΚΑΝΤΕ ΠΑΡΟΥΣΙΑΣΕΙΣ ΟΠΩΣ ΠΟΤΕ ΑΛΛΟΤΕ"
ONBOARD_SET_UP_PRESENTER_BACK_BUTTON_DESCRIPTION: "Κάντε κλικ στο κουμπί «Πίσω» για να μεταβείτε στην πίσω διαφάνεια. Μπορείτε, επιπλέον, να προσαρμόσετε ενέργειες, όπως η εμφάνιση μαύρης οθόνης, ώστε να εκτελούνται με παρατεταμένο πάτημα του κουμπιού «Πίσω»."
ONBOARD_SET_UP_PRESENTER_POINTER_BUTTON: Προσαρμόστε τα εφέ δείκτη
ONBOARD_SET_UP_SPOTLIGHT_POINTER_BUTTON_DESCRIPTION: "Κάντε διπλό κλικ στο κουμπί του δείκτη για να μεταβείτε στις επιλογές Επισήμανση, Μεγέθυνση, να δείξετε με ψηφιακό λέιζερ και να ελέγξετε τον δρομέα στην οθόνη."
ONBOARD_SET_UP_HIGHLIGHT_TITLE: ΚΙΝΗΣΤΕ ΤΟ %0 ΚΑΙ ΠΙΕΣΤΕ ΤΟ ΚΟΥΜΠΙ «ΕΠΟΜΕΝΟ» ΓΙΑ ΝΑ ΣΥΝΕΧΙΣΕΤΕ
ONBOARD_POINTER_BUTTON_DESCRIPTION: "Το Spotlight έχει τρία προηγμένα εφέ κατάδειξης που μπορείτε να προσαρμόσετε χρησιμοποιώντας το κουμπί δείκτη:"
ONBOARD_SPOTLIGHT_POINTER_HIGHLIGHT: Η Επισήμανση δημιουργεί ένα εφέ προβολέα
ONBOARD_SPOTLIGHT_POINTER_MAGNIFY: Η Μεγέθυνση επιτρέπει τη μεγέθυνση σε λεπτομέρειες
ONBOARD_SPOTLIGHT_POINTER_LASER: Το Ψηφιακό λέιζερ συμβάλλει στην ακριβή κατάδειξη πληροφοριών
ONBOARD_SPOTLIGHT_TIMER_ALERTS: Ειδοποιήσεις χρονόμετρου
ONBOARD_SPOTLIGHT_EMOJI_ALERTS: Ειδοποιήσεις!
ONBOARD_NEXT_BUTTON: Πατήστε για την επόμενη διαφάνεια
ONBOARD_BACK_BUTTON: Πατήστε για την προηγούμενη διαφάνεια
ONBOARD_POINTER_BUTTON: Πιέστε παρατεταμένα για επισήμανση
ONBOARD_SPOTLIGHT_TIMER_ALERTS_DESCRIPTION: "Ρυθμίστε τις ειδοποιήσεις χρονοδιακόπτη ώστε να είναι σε λειτουργία μέχρι την τελευταία σας διαφάνεια. Το {DEVICE_NAME} θα δονείται επίσης για να σας ειδοποιεί για την ώρα της παρουσίασης και στο τέλος της."
ONBOARD_PRESENTER_END_SLIDE_DESCRIPTION: "Πατήστε το επόμενο κουμπί παρακάτω για να συνεχίσετε την προσαρμογή του {DEVICE_NAME},"
SLOT_NAME_NEXT_BUTTON: Κουμπί «Επόμενο»
SLOT_NAME_TIMER: Χρονόμετρο
SLOT_NAME_VIBRATION: Δόνηση
CONFIGURATION_COPY_OF_BATTERY_ALERT: Η συσκευή θα δονείται όταν η φόρτιση που απομένει είναι ελάχιστη.
CONFIGURATION_COPY_OF_TIMER_ALERT: "Όταν είναι ενεργοποιημένο, μπορείτε να παρακολουθείτε τον χρόνο της παρουσίασης και να ορίζετε ειδοποιήσεις δόνησης"
TIMER_TAB_TOOLTIP: "Προς το παρόν, αυτή η λειτουργία δεν είναι διαθέσιμη"

CONFIGURATION_COPY_CURSOR_CONTROL_DESCRIPTION: Σας επιτρέπει να αλληλεπιδράτε με βίντεο και συνδέσμους κατά τη διάρκεια των παρουσιάσεων.
CONFIGURATION_COPY_FREEZE_DESCRIPTION: Το εφέ δείκτη παραμένει στην οθόνη όταν αφήνετε το κουμπί
CONFIGURATION_COPY_RECENTER_DESCRIPTION: Επαναφέρετε τον δείκτη στο κέντρο της οθόνης όταν αλλάζετε διαφάνειες.
CONFIGURATION_COPY_POINTER_DESCRIPTION: Πιέστε παρατεταμένα το πάνω κουμπί στο Spotlight για να ενεργοποιήσετε τα εφέ δείκτη στην οθόνη.
PRESENTATION_TIMER_DESCRIPTION: Ρυθμίστε την αντίστροφη μέτρηση όταν θέλετε η συσκευή σας να δονείται
TIMER_ALERT_CUSTOM_TIME: Προσαρμοσμένο
TIMER_ALERT_CLOCK: Ρολόι
TIMER_EDIT_CONFIGURATION: Κάντε κλικ για επεξεργασία
TIMER_CUSTOM_TIME_CONFIGURATION: Πληκτρολογήστε προσαρμοσμένη ώρα
CONFIGURATION_TITLE_PRESENTATION_COUNTDOWN: ΔΙΑΡΚΕΙΑ ΠΑΡΟΥΣΙΑΣΗΣ
INPUT_HOUR_FORMAT: ΩΩ
INPUT_MINUTE_FORMAT: ΛΛ
TIMER_CONFIGURATION_CUSTOM_ALERT: ΠΡΟΣΑΡΜΟΣΜΕΝΗ ΕΙΔΟΠΟΙΗΣΗ
CONFIGURATION_COPY_TIMER_DESCRIPTION: Παρακολουθήστε την ώρα της παρουσίασης και ρυθμίστε τις ειδοποιήσεις δόνησης.
TIMER_SETTINGS_CLOCK: Ρολόι
MIN_LEFT: λεπτά απομένουν
MINUTES: λεπτά
CONFIGURATION_TITLE_HOLD_NEXT_BUTTON_TITLE: Κρατήστε πατημένο το κουμπί Επόμενο
CONFIGURATION_TITLE_HOLD_BACK_BUTTON_TITLE: Κρατήστε πατημένο το κουμπί Πίσω
CONFIGURATION_COPY_SPOTLIGHT_MOUSE_EFFECTS: "{PRESS_AND_HOLD_DEVICE} το κουμπί του ποντικιού για να μετακινήσετε τα εφέ δείκτη στην οθόνη. Ενώ κρατάτε τη συσκευή σταθερή, {DOUBLE_CLICK} για εναλλαγή μεταξύ πολλαπλών εφέ."
PRESS_AND_HOLD_DEVICE: Πατήστε παρατεταμένα
DOUBLE_CLICK: διπλό κλικ
SPOTLIGHT_EFFECT_NOTE: Μπορείτε να κάνετε διπλό κλικ για εναλλαγή μεταξύ πολλών εφέ.
