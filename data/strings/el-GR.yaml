EULA_TEXT_1: "{openingTag} Η ΠΑΡΟΥΣΑ ΑΔΕΙΑ ΧΡΗΣΗΣ ΤΕΛΙΚΟΥ ΧΡΗΣΤΗ («ΣΥΜΒΑΣΗ EULA») ΕΙΝΑΙ ΜΙΑ ΝΟΜΙΚΗ ΣΥΜΦΩΝΙΑ ΑΝΑΜΕΣΑ ΣΕ ΕΣΑΣ ΚΑΙ ΤΗ LOGITECH EUROPE S.A. («Logitech»). ΔΙΑΒΑΣΤΕ ΠΡΟΣΕΚΤΙΚΑ ΑΥΤΗΝ ΤΗ ΣΥΜΒΑΣΗ ΠΡΟΤΟΥ ΚΑΝΕΤΕ ΕΓΚΑΤΑΣΤΑΣΗ ΤΟΥ ΛΟΓΙΣΜΙΚΟΥ Ή ΠΡΟΤΟΥ ΧΡΗΣΙΜΟΠΟΙΗΣΕΤΕ ΤΟ ΠΡΟΪΟΝ ΣΑΣ LOGITECH. ΚΑΝΟΝΤΑΣ ΕΓΚΑΤΑΣΤΑΣΗ ΤΟΥ ΛΟΓΙΣΜΙΚΟΥ Η’ ΚΑΝΟΝΤΑΣ ΧΡΗΣΗ ΤΟΥ ΠΡΟΪΟΝΤΟΣ ΤΗΣ LOGITECH ΣΥΜΦΩΝΕΙΤΕ ΟΤΙ ΔΕΣΜΕΥΕΣΤΕ ΑΠΟ ΤΟΥΣ ΟΡΟΥΣ ΤΗΣ ΠΑΡΟΥΣΑΣ ΣΥΜΒΑΣΗ EULA. ΕΑΝ ΔΕΝ ΣΥΜΦΩΝΕΙΤΕ ΜΕ ΤΟΥΣ ΟΡΟΥΣ ΤΗΣ ΠΑΡΟΥΣΑΣ ΣΥΜΒΑΣΗΣ EULA, ΜΠΟΡΕΙΤΕ ΝΑ ΕΠΙΣΤΡΕΨΕΤΕ ΤΟ ΠΡΟΪΟΝ ΓΙΑ ΝΑ ΛΑΒΕΤΕ ΕΠΙΣΤΡΟΦΗ ΧΡΗΜΑΤΩΝ, ΣΥΜΦΩΝΑ ΜΕ ΤΟΥΣ ΟΡΟΥΣ ΚΑΙ ΤΙΣ ΠΡΟΫΠΟΘΕΣΕΙΣ ΤΗΣ ΙΣΧΥΟΥΣΑΣ ΠΟΛΙΤΙΚΗΣ ΕΠΙΣΤΡΟΦΩΝ ΤΟΥ ΣΗΜΕΙΟΥ ΑΓΟΡΑΣ.{closingTag}{openingTag}ΕΑΝ ΕΙΣΤΕ ΚΑΤΩ ΑΠΟ ΤΟ ΝΟΜΙΜΟ ΟΡΙΟ ΗΛΙΚΙΑΣ ΣΤΗ ΧΩΡΑ Ή ΣΤΗΝ ΠΕΡΙΟΧΗ ΚΑΤΟΙΚΙΑΣ ΣΑΣ, Ο ΓΟΝΕΑΣ Ή Ο ΝΟΜΙΜΟΣ ΚΗΔΕΜΟΝΑΣ ΣΑΣ ΠΡΕΠΕΙ ΝΑ ΔΙΑΒΑΣΕΙ ΚΑΙ ΝΑ ΑΠΟΔΕΧΤΕΙ ΤΟΥΣ ΟΡΟΥΣ ΤΗΣ ΠΑΡΟΥΣΑΣ ΣΥΜΒΑΣΗΣ EULA.{closingTag}{openingTag} ΕΑΝ ΖΕΙΤΕ (Ή Η ΚΥΡΙΑ ΕΠΑΓΓΕΛΜΑΤΙΚΗ ΕΔΡΑ ΣΑΣ ΒΡΙΣΚΕΤΑΙ) ΣΤΙΣ ΗΝΩΜΕΝΕΣ ΠΟΛΙΤΕΙΕΣ ΑΜΕΡΙΚΗΣ ΚΑΙ ΧΡΗΣΙΜΟΠΟΙΕΙΤΕ ΤΟ ΛΟΓΙΣΜΙΚΟ Ή ΤΟ ΠΡΟΪΟΝ ΑΠΟΚΛΕΙΣΤΙΚΑ ΓΙΑ ΠΡΟΣΩΠΙΚΗ Η’ ΟΙΚΙΑΚΗ ΧΡΗΣΗ, ΔΙΑΒΑΣΤΕ ΤΟ ΑΡΘΡΟ 17 ΠΑΡΑΚΑΤΩ, ΚΑΘΩΣ ΣΥΜΦΩΝΑ ΜΕ ΑΥΤΟ ΟΠΟΙΕΣΔΗΠΟΤΕ ΔΙΑΦΟΡΕΣ ΘΑ ΕΠΙΛΥΟΝΤΑΙ ΒΑΣΕΙ ΔΙΑΙΤΗΣΙΑΣ ΣΥΜΦΩΝΑ ΜΕ ΤΟΥΣ ΚΑΝΟΝΕΣ ΔΙΑΙΤΗΣΙΑΣ ΠΕΡΙ ΚΑΤΑΝΑΛΩΤΙΚΩΝ ΔΙΑΦΟΡΩΝ.{closingTag}{openingTag} ΟΠΩΣ ΠΕΡΙΓΡΑΦΕΤΑΙ ΠΙΟ ΚΑΤΩ ΣΤΟ ΑΡΘΡΟ 4, ΣΥΜΦΩΝΕΙΤΕ ΣΤΗΝ ΠΡΑΓΜΑΤΟΠΟΙΗΣΗ ΑΥΤΟΜΑΤΩΝ ΕΝΗΜΕΡΩΣΕΩΝ ΤΟΥ ΛΟΓΙΣΜΙΚΟΥ. ΣΕ ΠΕΡΙΠΤΩΣΗ ΠΟΥ ΔΕΝ ΣΥΜΦΩΝΕΙΤΕ, ΔΕΝ ΠΡΕΠΕΙ ΝΑ ΧΡΗΣΙΜΟΠΟΙΗΣΕΤΕ ΤΟ ΠΡΟΪΟΝ ΟΥΤΕ ΝΑ ΕΓΚΑΤΑΣΤΗΣΕΤΕ ΤΟ ΛΟΓΙΣΜΙΚΟ. {closingTag}{openingTag} ΤΟ ΠΑΡΑΚΑΤΩ ΑΡΘΡΟ ΓΙΑ ΤΟΥΣ ΠΕΡΙΟΡΙΣΜΟΥΣ ΣΕ ΣΧΕΣΗ ΜΕ ΤΟ ΠΡΟΪΟΝ ΠΡΟΣΔΙΟΡΙΖΕΙ ΤΟΥΣ ΣΗΜΑΝΤΙΚΟΥΣ ΠΕΡΙΟΡΙΣΜΟΥΣ ΠΟΥ ΙΣΧΥΟΥΝ ΩΣ ΠΡΟΣ ΤΟ ΛΟΓΙΣΜΙΚΟ ΚΑΙ ΤΙΣ ΣΥΝΑΦΕΙΣ ΥΠΗΡΕΣΙΕΣ ΣΕ ΣΧΕΣΗ ΜΕ ΘΕΜΑΤΑ ΑΣΦΑΛΕΙΑΣ ΤΗΣ ΖΩΗΣ ΚΑΙ ΣΗΜΑΝΤΙΚΟΥΣ ΤΡΟΠΟΣ ΧΡΗΣΗΣ ΑΥΤΩΝ. ΔΙΑΒΑΣΤΕ ΠΡΟΣΕΚΤΙΚΑ ΑΥΤΟ ΤΟ ΑΡΘΡΟ ΚΑΘΩΣ ΠΡΕΠΕΙ ΝΑ ΑΝΑΓΝΩΡΙΣΕΤΕ ΚΑΙ ΝΑ ΣΥΜΦΩΝΗΣΕΤΕ ΜΕ ΤΟ ΠΕΡΙΕΧΟΜΕΝΟ ΤΟΥ. {closingTag}{openingTag} «Λογισμικό» σημαίνει (i) καθένα και όλα τα προγράμματα ή οι εφαρμογές λογισμικού, συμπεριλαμβανομένων των εφαρμογών λογισμικού που λαμβάνονται και εγκαθίστανται σε επιτραπέζια ή κινητή συσκευή, (ii) καθένα και όλο το λογισμικό στη μορφή ενσωματωμένου λογισμικού σε ένα προϊόν της Logitech, (iii) όλη η σχετική τεκμηρίωση, οι τροποποιημένες εκδόσεις, αναβαθμίσεις ή βελτιώσεις αυτού του λογισμικού (εκτός εάν παρέχεται ρητώς υπό διαφορετικούς όρους κατά τη στιγμή της αναβάθμισης ή λήψης), όλες οι μεταγενέστερες εκδόσεις, αντίγραφα αυτού του λογισμικού.{closingTag}{openingTag} Οι παρόντες όροι σάς παρέχουν συγκεκριμένα νομικά δικαιώματα, ενώ ενδέχεται να έχετε και άλλα νομικά δικαιώματα που μπορεί να διαφέρουν ανάλογα με τη δικαιοδοσία.{closingTag}"
EULA_LICENSE: "Σύμφωνα με τους όρους και τις προϋποθέσεις της παρούσας σύμβασης EULA, η Logitech σάς παραχωρεί μια περιορισμένη, μη αποκλειστική άδεια για τη χρήση του Λογισμικού, μόνο σε συνδυασμό με το προϊόν της Logitech που έχετε αγοράσει ή την υπηρεσία της Logitech που χρησιμοποιείτε. Εξαιρουμένου του ενσωματωμένου λογισμικού σε ένα προϊόν της Logitech, επιτρέπεται η αντιγραφή του Λογισμικού μόνο για τη διατήρηση εφεδρικού αντιγράφου ή για το αρχείο σας στο πλαίσιο υποστήριξης της χρήσης του Λογισμικού από εσάς κατά το επιτρεπτό σύμφωνα με την παρούσα σύμβαση, καθώς και για να διαθέσετε το Λογισμικό σε έναν εσωτερικό διακομιστή της οικίας ή της επιχείρησής σας αποκλειστικά και μόνο προκειμένου να καταφορτωθεί σε συσκευές υπό την κατοχή ή τον έλεγχό σας εντός της οικίας ή της επιχείρησής σας και αποκλειστικά και μόνο για να χρησιμοποιείτε το Λογισμικό κατά τα προβλεπόμενα στην παρούσα. Κάθε αντίγραφο πρέπει να περιλαμβάνει όλες τις ανακοινώσεις περί δικαιωμάτων αναπαραγωγής και λοιπών δικαιωμάτων ιδιοκτησίας που εμπεριέχονται στο πρωτότυπο. Για κατοχή ή έλεγχο ενσωματωμένου Λογισμικού ή με την υπηρεσία Logitech που χρησιμοποιείτε. Μπορείτε να προβείτε σε μόνιμη μεταβίβαση του Λογισμικού σε άλλο πρόσωπο κατόπιν μόνιμης μεταβίβασης του προϊόντος της Logitech επί του οποίου χρησιμοποιείται το Λογισμικό, εφόσον το εν λόγω πρόσωπο συμφωνεί ότι θα δεσμεύεται από την παρούσα σύμβαση EULA και εφόσον μετά τη μεταβίβαση εσείς παύετε να χρησιμοποιείτε το προϊόν και το Λογισμικό."
EULA_RESTRICTIONS: "Δεν σας επιτρέπεται να προβείτε (και δεν θα επιτρέψετε σε τρίτα πρόσωπα) τις εξής ενέργειες: (Α) παραχώρηση άδειας χρήσης, πώληση, ενοικίαση, μίσθωση, μεταβίβαση (παρά μόνο στις περιπτώσεις που επιτρέπονται από το Άρθρο 1), διανομή, φιλοξενία, εξωπορισμό, γνωστοποίηση ή άλλου είδους εμπορική εκμετάλλευση του Λογισμικού ή διάθεση του Λογισμικού σε τρίτους, (Β) αντιγραφή του Λογισμικού (παρά μόνο όπως επιτρέπεται ρητώς στο Άρθρο 1), (Γ) αποσυμπίληση, διάσπαση, αντίστροφο μηχανικό σχεδιασμό ή απόπειρα εξαγωγής του πηγαίου κώδικα ή δημιουργία παράγωγων έργων ή εγκατάσταση αυτού του Λογισμικού ή οποιουδήποτε μέρους του (με εξαίρεση την περίπτωση που αυτές οι δραστηριότητες επιτρέπονται ρητά από το ισχύον δίκαιο), (Δ) αφαίρεση ή τροποποίηση οποιουδήποτε εμπορικού σήματος, λογότυπου, δικαιώματος αναπαραγωγής ή άλλης ανακοίνωσης περί δικαιωμάτων ιδιοκτησίας, λεζάντας, συμβόλου ή ετικέτας που υπάρχουν επί του Λογισμικού."
EULA_OWNERSHIP: Η Logitech και οι δικαιοπάροχοί της έχουν και παρακρατούν όλα τα δικαιώματα και τους τίτλους κυριότητας επί του Λογισμικού καθώς και όλα τα δικαιώματα αναπαραγωγής και τα λοιπά δικαιώματα πνευματικής ιδιοκτησίας επί του Λογισμικού. Η Logitech δεν σας πωλεί αλλά μόνο σας παραχωρεί άδεια χρήσης του Λογισμικού και επιφυλάσσεται όλων των δικαιωμάτων τα οποία δεν σας παραχωρούνται ρητά.
EULA_AUTOMATIC_SOFTWARE_UPDATES: "Η Logitech ενδέχεται κατά καιρούς να παρέχει διορθώσεις σφαλμάτων, ενημερώσεις, αναβαθμίσεις και λοιπές τροποποιήσεις επί του Λογισμικού («Ενημερώσεις»). Οι ενημερώσεις αυτές ενδέχεται να εγκαθίστανται αυτόματα χωρίς την παροχή πρόσθετης ειδοποίησης ή τη λήψη πρόσθετης συναίνεσης. Βάσει της παρούσας σύμβασης συναινείτε στις αυτόματες Ενημερώσεις. Εάν δεν επιθυμείτε Ενημερώσεις αυτού του είδους, θα πρέπει να σταματήσετε να χρησιμοποιείτε το Προϊόν. Οι όροι της παρούσας σύμβασης EULA θα διέπουν τυχόν Ενημερώσεις που παρέχονται από τη Logitech και αντικαθιστούν ή/και συμπληρώνουν το αρχικό Λογισμικό, εκτός εάν αυτές οι Ενημερώσεις συνοδεύονται από ξεχωριστή άδεια χρήσης, στην οποία περίπτωση θα ισχύουν οι όροι της συγκεκριμένης άδειας χρήσης."
EULA_APPLICATION_STORE: "Εάν έχετε καταφορτώσει το Λογισμικό από μια αγορά ή κατάστημα εφαρμογών, όπως το Apple App Store, το Apple Mac Store ή το Google Play («Κατάστημα Εφαρμογών»), υπόκεισθε επίσης στους όρους χρήσης του εν λόγω Καταστήματος Εφαρμογών. Εάν η χρήση του Λογισμικού από εσάς διέπεται από τους όρους χρήσης ενός Καταστήματος Εφαρμογών, σε περίπτωση σύγκρουσης ή αμφισημίας μεταξύ των όρων χρήσης του Καταστήματος Εφαρμογών και των όρων της παρούσας σύμβασης EULA, θα κατισχύουν οι όροι χρήσης του Καταστήματος Εφαρμογών αλλά μόνο στον βαθμό που είναι απαραίτητοι για την επίλυση της εν λόγω σύγκρουσης ή αμφισημίας και ως προς τα λοιπά, οι όροι της παρούσας σύμβασης EULA θα εξακολουθήσουν να παραμένουν σε πλήρη ισχύ και εφαρμογή. Αναγνωρίζετε ότι (i) η παρούσα σύμβαση EULA συνάπτεται ανάμεσα στη Logitech και σε εσάς και όχι με το App Store, (ii) το App Store δεν έχει καμία υποχρέωση να παρέχει οποιαδήποτε υποστήριξη ή συντήρηση σε σχέση με το Λογισμικό που λαμβάνετε από την τοποθεσία του, (iii) η Logitech και όχι το App Store θα φέρει την ευθύνη, σύμφωνα με τις διατάξεις της παρούσας σύμβασης EULA και στον βαθμό που δεν υφίσταται αποποίηση ευθύνης, για οποιαδήποτε εγγύηση προϊόντος, ισχυρισμούς για το προϊόν και ισχυρισμούς για δικαιώματα πνευματικής ιδιοκτησίας σε σχέση με το Λογισμικό που λαμβάνετε από ένα App Store. Σε κάθε περίπτωση, η απώτατη ευθύνη του App Store αναφορικά με οποιαδήποτε εγγύηση θα συνίσταται στην επιστροφή του τιμήματος αγοράς (εάν υφίσταται) του Λογισμικού, (iv) η Apple και οι θυγατρικές της είναι τρίτοι δικαιούχοι της παρούσας σύμβασης EULA για το Λογισμικό που λαμβάνετε από το Apple App Store και το Mac Store."
EULA_PRIVACY: "Οι πολιτικές προστασίας απορρήτου της εταιρείας μας περιγράφονται στην {link}, καθώς και σε ξεχωριστές δηλώσεις περί προστασίας απορρήτου (συνολικά, η «Πολιτική Προστασίας Απορρήτου») που παρέχονται όταν ένα λογισμικό, μια εφαρμογή, ένα προϊόν ή μια υπηρεσία αγοράζεται, λαμβάνεται ή χρησιμοποιείται. Κάνοντας εγκατάσταση του Λογισμικού ή χρήση των προϊόντων της Logitech ή παρέχοντας στην εταιρεία μας δεδομένα προσωπικού χαρακτήρα σχετικά με εσάς, αποδέχεστε και δίνετε τη συγκατάθεσή σας στις πρακτικές, στους όρους και στις προϋποθέσεις που περιγράφονται στην Πολιτική Προστασίας Απορρήτου και σε τυχόν ξεχωριστές δηλώσεις περί προστασίας απορρήτου. Η Πολιτική Προστασίας Απορρήτου της εταιρείας μας ενσωματώνεται στην παρούσα σύμβαση EULA δια παραπομπής."
EULA_OPEN_SOURCE: "Η παρούσα σύμβαση EULA δεν εφαρμόζεται σε οποιοδήποτε λογισμικό ανοιχτού κώδικα που ενδεχομένως εμπεριέχεται στο Λογισμικό («Στοιχεία ανοιχτού κώδικα»). Τα Στοιχεία ανοιχτού κώδικα που ισχύουν για το Λογισμικό και οι σχετικές ισχύουσες άδειες χρήσης παραθέτονται στη δικτυακή τοποθεσία: {link}. Η χρήση εκ μέρους σας κάθε Στοιχείου Ανοιχτού Κώδικα υπόκειται στους όρους κάθε ισχύουσας άδειας τελικού χρήστη που συνοδεύει το εν λόγω Στοιχείο Ανοιχτού Κώδικα. Θα πρέπει να συμφωνήσετε με του όρους κάθε ισχύουσας αδείας. Διαφορετικά, δεν θα πρέπει να χρησιμοποιήσετε το Λογισμικό. Καμία διάταξη στην παρούσα σύμβαση EULA δεν περιορίζει τα δικαιώματά σας στο πλαίσιο κάθε ισχύουσας άδειας τελικού χρήστη σε σχέση με τα Στοιχεία Ανοιχτού Κώδικα ούτε σας παραχωρεί δικαιώματα που κατισχύουν των όρων και προϋποθέσεων της εν λόγω άδειας τελικού χρήστη."
EULA_THIRD_PARTY_SOFTWARE: "Το Λογισμικό και το Προϊόν ενδέχεται να χρησιμοποιούνται σε σχέση με άλλα προϊόντα και λογισμικό και να εμπεριέχουν συνδέσμους ή διεπαφές, καθώς και περιεχόμενο και δεδομένα, από λογισμικό τρίτου μέρους («Λογισμικό Τρίτου»). Η χρήση Λογισμικού Τρίτου διέπεται από τους όρους του δικαιοπαρόχου του εν λόγω Λογισμικού Τρίτου που συμπεριλαμβάνουν την πολιτική προστασίας απορρήτου του τρίτου μέρους. Αποκτώντας πρόσβαση ή κάνοντας χρήση του Λογισμικού Τρίτου, συμφωνείτε ότι θα συμμορφώνεστε με τους ισχύοντες όρους του τρίτου μέρους. H Logitech δεν προχωρά σε καμία δήλωση και δεν παρέχει καμία εγγύηση σχετικά με τη λειτουργία ή τη διαθεσιμότητα του εν λόγω Λογισμικού Τρίτου. H Logitech και οι δικαιοπάροχοί της δεν θα ευθύνονται για τη μη διαθεσιμότητα ή την αφαίρεση του εν λόγω Λογισμικού Τρίτου."
EULA_TERMINATION: "Η παρούσα σύμβαση EULA θα παραμείνει σε ισχύ μέχρι τη λύση της. Κάθε συμβαλλόμενος μπορεί να λύσει την παρούσα σύμβαση EULA για οποιονδήποτε λόγο και ανά πάσα στιγμή. Το δικαίωμα χρήσης σας επί του Λογισμικού θα λύεται αυτόματα χωρίς ειδοποίηση από τη Logitech σε περίπτωση που αθετήσατε οποιουσδήποτε όρους της παρούσας σύμβασης EULA. Με τη λύση της παρούσας σύμβασης, θα πρέπει να διακόψετε τη χρήση του Λογισμικού και να αφαιρέσετε τυχόν αντίγραφα του Λογισμικού που βρίσκονται υπό τον έλεγχο ή την κατοχή σας. Οι διατάξεις των άρθρων 6, 7, 8, 9 10, 11, 12, 16, 17 και 18 θα παραμείνουν σε ισχύ ακόμη και μετά τη λύση της παρούσας σύμβασης. Η Logitech δεν προχωρά σε καμιά δήλωση σχετικά με τη μελλοντική διαθεσιμότητα του Λογισμικού ή των Ενημερώσεων και δεν θα ευθύνεται για τη μη διαθεσιμότητα ή την αφαίρεση του Λογισμικού ή των Ενημερώσεων. Η Logitech δεν θα έχει καμία ευθύνη για την παροχή υπηρεσιών συντήρησης ή υποστήριξης σε σχέση με το Λογισμικό."
EULA_WARRANTY_DISCLAIMER: 'ΣΤΟN ΜΕΓΙΣΤΟ ΒΑΘΜΟ ΠΟΥ ΕΠΙΤΡΕΠΕΤΑΙ ΑΠΟ ΤΟ ΙΣΧΥΟΝ ΔΙΚΑΙΟ, ΤΟ ΛΟΓΙΣΜΙΚΟ ΚΑΙ ΟΙ ΥΠΗΡΕΣΙΕΣ ΤΗΣ LOGITECH ΠΑΡΕΧΟΝΤΑΙ «ΩΣ ΕΧΟΥΝ», ΜΕ ΤΥΧΟΝ ΣΦΑΛΜΑΤΑ ΚΑΙ ΧΩΡΙΣ ΟΠΟΙΟΥΔΗΠΟΤΕ ΕΙΔΟΥΣ ΕΓΓΥΗΣΗ. ΑΝΑΓΝΩΡΙΖΕΤΕ ΚΑΙ ΑΠΟΔΕΧΕΣΤΕ ΡΗΤΑ ΟΤΙ, ΣΤΟΝ ΒΑΘΜΟ ΠΟΥ ΕΠΙΤΡΕΠΕΤΑΙ ΑΠΟ ΤΟ ΙΣΧΥΟΝ ΔΙΚΑΙΟ, Η ΣΥΝΟΛΙΚΗ ΕΥΘΥΝΗ ΟΣΟΝ ΑΦΟΡΑ ΣΤΗ ΧΡΗΣΗ ΤΟΥ ΛΟΓΙΣΜΙΚΟΥ ΚΑΙ ΤΩΝ ΥΠΗΡΕΣΙΩΝ ΤΗΣ LOGITECH ΚΑΘΩΣ ΚΑΙ Η ΣΥΝΟΛΙΚΗ ΕΥΘΥΝΗ ΟΣΟΝ ΑΦΟΡΑ ΤΗΝ ΙΚΑΝΟΠΟΙΗΤΙΚΗ ΠΟΙΟΤΗΤΑ, ΤΗΝ ΑΠΟΔΟΣΗ, ΤΗΝ ΑΚΡΙΒΕΙΑ ΚΑΙ ΤΙΣ ΕΠΙΔΟΣΕΙΣ ΒΑΡΥΝΕΙ ΕΣΑΣ. Η LOGITECH ΚΑΙ ΟΙ ΔΙΚΑΙΟΠΑΡΟΧΟΙ ΤΗΣ ΔΙΑ ΤΟΥ ΠΑΡΟΝΤΟΣ ΑΠΟΠΟΙΟΥΝΤΑΙ ΟΛΕΣ ΤΙΣ ΕΓΓΥΗΣΕΙΣ ΚΑΙ ΤΟΥΣ ΟΡΟΥΣ ΣΕ ΣΧΕΣΗ ΜΕ ΤΟ ΛΟΓΙΣΜΙΚΟ ΚΑΙ ΤΙΣ ΥΠΗΡΕΣΙΕΣ ΤΗΣ LOGITECH, ΡΗΤΕΣ, ΣΙΩΠΗΡΕΣ Ή ΠΡΟΒΛΕΠΟΜΕΝΕΣ ΑΠΟ ΝΟΜΟ, ΣΥΜΠΕΡΙΛΑΜΒΑΝΟΜΕΝΩΝ ΕΝΔΕΙΚΤΙΚΑ ΟΠΟΙΩΝΔΗΠΟΤΕ ΣΙΩΠΗΡΩΝ ΕΓΓΥΗΣΕΩΝ Ή ΟΡΩΝ ΕΜΠΟΡΕΥΣΙΜΟΤΗΤΑΣ, ΙΚΑΝΟΠΟΙΗΤΙΚΗΣ ΠΟΙΟΤΗΤΑΣ, ΚΑΤΑΛΛΗΛΟΤΗΤΑΣ ΓΙΑ ΣΥΓΚΕΚΡΙΜΕΝΟ ΣΚΟΠΟ, ΑΚΡΙΒΕΙΑΣ, ΑΔΙΑΤΑΡΑΚΤΗΣ ΝΟΜΗΣ, ΚΑΙ ΜΗ ΠΑΡΑΒΙΑΣΗΣ ΠΝΕΥΜΑΤΙΚΩΝ ΔΙΚΑΙΩΜΑΤΩΝ ΤΡΙΤΩΝ. Η LOGITECH ΔΕΝ ΕΓΓΥΑΤΑΙ ΕΝΑΝΤΙ ΠΑΡΕΜΒΑΣΗΣ ΣΤΗΝ ΕΠΙΚΑΡΠΙΑ ΣΑΣ ΣΧΕΤΙΚΑ ΜΕ ΤΟ ΛΟΓΙΣΜΙΚΟ Ή ΤΙΣ ΥΠΗΡΕΣΙΕΣ ΤΗΣ LOGITECH, ΟΤΙ ΟΙ ΛΕΙΤΟΥΡΓΙΕΣ ΠΟΥ ΠΕΡΙΕΧΟΝΤΑΙ ΣΤΟ ΛΟΓΙΣΜΙΚΟ Ή ΤΙΣ ΥΠΗΡΕΣΙΕΣ ΤΗΣ LOGITECH ΘΑ ΠΛΗΡΟΥΝ ΤΙΣ ΑΠΑΙΤΗΣΕΙΣ ΣΑΣ, ΟΤΙ Η ΛΕΙΤΟΥΡΓΙΑ ΤΟΥ ΛΟΓΙΣΜΙΚΟΥ ΚΑΙ ΤΩΝ ΥΠΗΡΕΣΙΩΝ ΤΗΣ LOGITECH ΘΑ ΕΙΝΑΙ ΣΥΝΕΧΗΣ ΚΑΙ ΧΩΡΙΣ ΣΦΑΛΜΑΤΑ Ή ΟΤΙ ΘΑ ΔΙΟΡΘΩΘΟΥΝ ΤΥΧΟΝ ΕΛΑΤΤΩΜΑΤΑ ΣΤΟ ΛΟΓΙΣΜΙΚΟ Ή ΤΙΣ ΥΠΗΡΕΣΙΕΣ ΤΗΣ LOGITECH. ΚΑΝΕΝΑΣ ΕΜΠΟΡΟΣ, ΑΝΤΙΠΡΟΣΩΠΟΣ Ή ΥΠΑΛΛΗΛΟΣ ΤΗΣ LOGITECH ΔΕΝ ΕΙΝΑΙ ΕΞΟΥΣΙΟΔΟΤΗΜΕΝΟΣ ΝΑ ΠΡΟΒΕΙ ΣΕ ΤΡΟΠΟΠΟΙΗΣΕΙΣ, ΕΠΕΚΤΑΣΕΙΣ Ή ΠΡΟΣΘΗΚΕΣ ΣΤΗΝ ΠΑΡΟΥΣΑ ΑΠΟΠΟΙΗΣΗ ΕΥΘΥΝΩΝ ΕΓΓΥΗΣΗΣ.'
EULA_WARRANTY_DISCLAIMER_ADDON: "Σε ορισμένες περιοχές δικαιοδοσίας δεν επιτρέπονται εξαιρέσεις σιωπηρών εγγυήσεων ή περιορισμοί ως προς τα ισχύοντα νομικά δικαιώματα των καταναλωτών, επομένως οι παραπάνω εξαιρέσεις και περιορισμοί ενδέχεται να μην ισχύουν για εσάς."
EULA_LIMITATION_OF_LIABILITY: "ΣΤΟΝ ΒΑΘΜΟ ΠΟΥ ΔΕΝ ΑΠΑΓΟΡΕΥΕΤΑΙ ΑΠΟ ΤΟ ΙΣΧΥΟΝ ΔΙΚΑΙΟ, Η LOGITECH Ή ΟΙ ΔΙΚΑΙΟΠΑΡΟΧΟΙ ΤΗΣ ΣΕ ΚΑΜΙΑ ΠΕΡΙΠΤΩΣΗ ΔΕΝ ΘΑ ΘΕΩΡΗΘΟΥΝ ΥΠΕΥΘΥΝΟΙ ΓΙΑ ΤΥΧΟΝ ΚΟΣΤΗ ΑΠΟ ΤΗΝ ΠΡΟΜΗΘΕΙΑ ΥΠΟΚΑΤΑΣΤΑΤΩΝ ΠΡΟΪΟΝΤΩΝ, ΛΟΓΙΣΜΙΚΟΥ Ή ΥΠΗΡΕΣΙΩΝ, ΓΙΑ ΔΙΑΦΥΓΟΝΤΑ ΚΕΡΔΗ, ΓΙΑ ΤΗΝ ΑΠΩΛΕΙΑ ΠΛΗΡΟΦΟΡΙΩΝ Ή ΔΕΔΟΜΕΝΩΝ Ή ΓΙΑ ΟΠΟΙΕΣΔΗΠΟΤΕ ΑΛΛΕΣ ΕΙΔΙΚΕΣ, ΑΠΟΘΕΤΙΚΕΣ, ΠΕΡΙΣΤΑΣΙΑΚΕΣ Ή ΠΑΡΕΠΟΜΕΝΕΣ ΖΗΜΙΕΣ, ΠΟΥ ΑΠΟΡΡΕΟΥΝ ΜΕ ΟΠΟΙΟΝΔΗΠΟΤΕ ΤΡΟΠΟ ΑΠΟ ΤΗΝ ΠΩΛΗΣΗ, ΤΗ ΧΡΗΣΗ Ή ΤΗΝ ΑΔΥΝΑΜΙΑ ΧΡΗΣΗΣ ΟΠΟΙΟΥΔΗΠΟΤΕ ΠΡΟΪΟΝΤΟΣ, ΛΟΓΙΣΜΙΚΟΥ Ή ΥΠΗΡΕΣΙΑΣ ΤΗΣ LOGITECH, ΑΝΕΞΑΡΤΗΤΑ ΑΠΟ ΤΥΧΟΝ ΘΕΩΡΙΑ ΠΕΡΙ ΕΥΘΥΝΗΣ (ΕΝΔΟΣΥΜΒΑΤΙΚΗ, ΑΔΙΚΟΠΡΑΚΤΙΚΗ Η' ΑΛΛΗ ΕΥΘΥΝΗ), ΑΚΟΜΗ ΚΑΙ ΣΤΗΝ ΠΕΡΙΠΤΩΣΗ ΚΑΤΑ ΤΗΝ ΟΠΟΙΑ Η LOGITECH ΕΧΕΙ ΕΝΗΜΕΡΩΘΕΙ ΓΙΑ ΤΗΝ ΠΙΘΑΝΟΤΗΤΑ ΤΕΤΟΙΩΝ ΖΗΜΙΩΝ. ΣΕ ΚΑΜΙΑ ΠΕΡΙΠΤΩΣΗ Η ΣΥΝΟΛΙΚΗ ΕΥΘΥΝΗ ΤΗΣ LOGITECH ΚΑΙ ΤΩΝ ΔΙΚΑΙΟΠΑΡΟΧΩΝ ΤΗΣ ΔΕΝ ΘΑ ΥΠΕΡΒΕΙ ΤΟ ΠΡΑΓΜΑΤΙΚΟ ΧΡΗΜΑΤΙΚΟ ΠΟΣΟ ΠΟΥ ΔΑΠΑΝΗΘΗΚΕ ΓΙΑ ΤΟ ΠΡΟΪΟΝ, ΤΟ ΛΟΓΙΣΜΙΚΟ Ή ΤΗΝ ΥΠΗΡΕΣΙΑ ΤΗΣ LOGITECH ΑΠΟ ΤΑ ΟΠΟΙΑ ΠΡΟΚΥΠΤΕΙ Η ΕΥΘΥΝΗ. Οι ανωτέρω περιορισμοί θα ισχύουν ακόμη και αν η προαναφερόμενη αποζημίωση δεν εκπληρώσει τον ουσιώδη σκοπό της. Σε ορισμένες δικαιοδοσίες δεν επιτρέπεται η εξαίρεση ή ο περιορισμός των περιστασιακών ή των παρεπόμενων ζημιών. Επομένως, ο παραπάνω περιορισμός ή εξαίρεση ενδέχεται να μην ισχύει για εσάς. Οι παραπάνω περιορισμοί δεν ισχύουν σε περίπτωση σωματικής βλάβης, όπου και σε όποιο βαθμό το ισχύον δίκαιο προβλέπει τέτοια ευθύνη."
EULA_PRODUCT_LIMITATIONS: "ΤΟ ΛΟΓΙΣΜΙΚΟ ΔΕΝ ΠΡΟΟΡΙΖΕΤΑΙ ΓΙΑ ΧΡΗΣΗ ΣΤΙΣ ΛΕΙΤΟΥΡΓΙΕΣ ΠΥΡΗΝΙΚΩΝ ΕΓΚΑΤΑΣΤΑΣΕΩΝ, ΣΕ ΣΥΣΤΗΜΑΤΑ ΑΕΡΟΠΛΟΪΑΣ Ή ΕΠΙΚΟΙΝΩΝΙΩΝ, ΣΕ ΣΥΣΤΗΜΑΤΑ ΕΛΕΓΧΟΥ ΕΝΑΕΡΙΑΣ ΚΥΚΛΟΦΟΡΙΑΣ, ΣΕ ΙΑΤΡΙΚΕΣ ΣΥΣΚΕΥΕΣ Ή ΣΕ ΑΛΛΟ ΕΞΟΠΛΙΣΜΟ ΣΤΟΝ ΟΠΟΙΟ ΕΝΔΕΧΟΜΕΝΗ ΔΥΣΛΕΙΤΟΥΡΓΙΑ ΤΟΥ ΛΟΓΙΣΜΙΚΟΥ ΘΑ ΜΠΟΡΟΥΣΕ ΝΑ ΟΔΗΓΗΣΕΙ ΣΕ ΘΑΝΑΤΟ, ΣΩΜΑΤΙΚΗ ΒΛΑΒΗ Ή ΣΟΒΑΡΗ ΦΥΣΙΚΗ Ή ΠΕΡΙΒΑΛΛΟΝΤΙΚΗ ΚΑΤΑΣΤΡΟΦΗ. ΣΥΜΦΩΝΕΙΤΕ ΟΤΙ ΤΟ ΛΟΓΙΣΜΙΚΟ ΔΕΝ ΔΙΑΘΕΤΕΙ ΠΙΣΤΟΠΟΙΗΣΗ ΓΙΑ ΤΗ ΧΡΗΣΗ ΤΟΥ ΣΕ ΠΕΡΙΠΤΩΣΕΙΣ ΕΚΤΑΚΤΗΣ ΑΝΑΓΚΗΣ ΚΑΙ ΟΤΙ ΔΕΝ ΘΑ ΠΡΕΠΕΙ ΝΑ ΧΡΗΣΙΜΟΠΟΙΕΙΤΑΙ ΓΙΑ ΑΥΤΟΝ ΤΟΝ ΣΚΟΠΟ. Η LOGITECH ΔΕΝ ΠΑΡΑΚΟΛΟΥΘΕΙ ΤΙΣ ΕΙΔΟΠΟΙΗΣΕΙΣ/ΑΝΑΚΟΙΝΩΣΕΙΣ ΕΚΤΑΚΤΗΣ ΑΝΑΓΚΗΣ ΚΑΙ ΔΕΝ ΕΙΝΑΙ ΥΠΕΥΘΥΝΗ ΓΙΑ ΤΗΝ ΑΠΟΣΤΟΛΗ ΥΠΗΡΕΣΙΩΝ ΕΚΤΑΚΤΗΣ ΑΝΑΓΚΗΣ ΣΤΗΝ ΟΙΚΙΑ ΣΑΣ."
EULA_US_GOVERNMENT_END_USERS: 'Το Λογισμικό αποτελεί «Εμπορικό στοιχείο», όπως αυτός ο όρος ορίζεται στο 48 C.F.R. 2.101, αποτελούμενο από «Εμπορικό λογισμικό υπολογιστή» και «Τεκμηρίωση εμπορικού λογισμικού υπολογιστή» και η άδεια χρήσης του παρέχεται σε Τελικούς χρήστες της Κυβέρνησης των Η.Π.Α. (α) μόνο ως Εμπορικό στοιχείο και (β) μόνο με τα δικαιώματα εκείνα που εκχωρούνται σε όλους τους άλλους τελικούς χρήστες σύμφωνα με τους όρους και τις προϋποθέσεις της παρούσας σύμβασης EULA. Με επιφύλαξη μη δημοσιευμένων δικαιωμάτων σύμφωνα με τους νόμους περί πνευματικών δικαιωμάτων των Ηνωμένων Πολιτειών.'
EULA_EXPORT_LAW_ASSURANCES: "Συμφωνείτε ότι δεν θα εξαγάγετε ή επανεξαγάγετε το Λογισμικό κατά παράβαση οποιουδήποτε ισχύοντος νόμου ή κανονισμού, συμπεριλαμβανομένων, χωρίς περιορισμό, των νόμων ή κανονισμών των Ηνωμένων Πολιτειών Αμερικής, της Ευρωπαϊκής Ένωσης, της Ελβετίας ή/και των νόμων ή κανονισμών των δικαιοδοσιών στις οποίες αποκτήθηκε το παρόν Λογισμικό."
EULA_AGENTS: "Σε περίπτωση που αποκτάτε το λογισμικό εκ μέρους άλλου φυσικού ή νομικού προσώπου, φέρετε την ευθύνη και εγγυάστε ότι έχετε τη δυνατότητα να δεσμεύσετε το φυσικό ή νομικό πρόσωπο για το οποίο αποκτάτε το λογισμικό ως προς τους όρους και τις προϋποθέσεις της παρούσας σύμβασης EULA. Δηλώνετε ότι έχετε συμπληρώσει επαρκώς το όριο νόμιμης ηλικίας που ορίζεται στη δικαιοδοσία σας προκειμένου να μπορείτε να χρησιμοποιήσετε ή να έχετε πρόσβαση στο λογισμικό και να συνάψετε την παρούσα σύμβαση EULA."
EULA_CONTROLLING_LAW_1: "Εάν βρίσκεστε στις Η.Π.Α., η παρούσα σύμβαση EULA διέπεται από και ερμηνεύεται αποκλειστικά σύμφωνα με τη νομοθεσία των Ηνωμένων Πολιτειών και της Πολιτείας της Καλιφόρνιας, χωρίς να λαμβάνεται υπόψη ή να έχει εφαρμογή η δυνατότητα επιλογής των εφαρμοστέων νομικών διατάξεων ή αρχών. Εάν βρίσκεστε εκτός των Η.Π.Α., η παρούσα σύμβαση EULA διέπεται αποκλειστικά από τη νομοθεσία της Ελβετίας. Εάν διαπιστωθεί ότι οποιαδήποτε από τις διατάξεις της παρούσας σύμβασης EULA δεν είναι έγκυρη, τα μέρη αποδέχονται ότι οι προθέσεις των μερών, όπως αυτές αντικατοπτρίζονται στη διάταξη και οι άλλες διατάξεις της παρούσας σύμβασης EULA, θα παραμείνουν σε πλήρη ισχύ και εφαρμογή."
EULA_CONTROLLING_LAW_2: "Εάν κατοικείτε στις Ηνωμένες Πολιτείες Αμερικής και χρησιμοποιείτε το Λογισμικό ή το Προϊόν αποκλειστικά για προσωπική ή οικιακή χρήση, ισχύει για εσάς το Άρθρο 17:"
EULA_ARBITRATION: "Οποιαδήποτε διαφορά η οποία προκύπτει ανάμεσα σε εσάς και τη Logitech θα επιλύεται μέσω οριστικής και δεσμευτικής διαιτησίας η οποία θα διεξάγεται σύμφωνα με τους Κανόνες Διαιτησίας περί Καταναλωτικών Διαφορών («Κανόνες») της Αμερικανικής Ένωσης Διαιτησίας, με εξαίρεση τις διαφορές που διαφορετικά θα ενέπιπταν στη δικαιοδοσία του δικαστηρίου μικροδιαφορών και μπορούν, κατ'επιλογή οποιουδήποτε μέρους, να εκδικαστούν στο δικαστήριο μικροδιαφορών της αρμόδιας δικαιοδοσίας πριν από τον ορισμό διαιτητή. Η διαιτησία θα διεξάγεται από ένα διαιτητή που θα επιλέγεται κατόπιν αμοιβαίας συμφωνίας των μερών ή σύμφωνα με τη διαδικασία επιλογής που προβλέπεται στους Κανόνες. Τα κόστη της διαιτησίας θα διανέμονται αναλογικά ανάμεσα στους αντιδίκους, όπως ορίζεται από τους Κανονισμούς. Η απόφαση του διαιτητή θα είναι τελεσίδικη και δεσμευτική για τους αντιδίκους. ΠΡΟΚΕΙΜΕΝΟΥ ΝΑ ΑΠΟΦΥΓΕΤΕ ΤΗΝ ΑΠΩΛΕΙΑ ΑΠΟΔΕΙΚΤΙΚΩΝ ΣΤΟΙΧΕΙΩΝ ΚΑΙ ΝΑ ΔΙΑΣΦΑΛΙΣΕΤΕ ΤΗΝ ΑΜΕΣΗ ΕΠΙΛΥΣΗ ΤΩΝ ΑΞΙΩΣΕΩΝ ΠΟΥ ΠΡΟΚΥΠΤΟΥΝ ΣΤΟ ΠΛΑΙΣΙΟ ΤΗΣ ΠΑΡΟΥΣΑΣ ΣΥΜΒΑΣΗΣ, ΤΟ ΜΕΡΟΣ ΠΟΥ ΕΓΕΙΡΕΙ ΑΞΙΩΣΗ ΣΤΟ ΠΛΑΙΣΙΟ ΤΗΣ ΠΑΡΟΥΣΑΣ ΣΥΜΒΑΣΗΣ EULA ΠΡΕΠΕΙ ΝΑ ΠΑΡΕΧΕΙ ΣΤΟ ΕΤΕΡΟ ΜΕΡΟΣ ΓΡΑΠΤΗ ΕΙΔΟΠΟΙΗΣΗ ΣΧΕΤΙΚΑ ΜΕ ΤΗ ΒΑΣΗ ΤΗΣ ΑΞΙΩΣΗΣ ΤΟΥ ΕΝΤΟΣ ΕΝΟΣ (1) ΕΤΟΥΣ Ή ΕΝΤΟΣ ΤΟΥ ΕΛΑΧΙΣΤΟΥ ΧΡΟΝΟΥ ΠΟΥ ΑΠΑΙΤΕΙΤΑΙ ΑΠΟ ΤΟ ΙΣΧΥΟΝ ΔΙΚΑΙΟ ΕΑΝ ΕΙΝΑΙ ΜΕΓΑΛΥΤΕΡΗΣ ΔΙΑΡΚΕΙΑΣ ΤΟΥ ΕΝΟΣ (1) ΕΤΟΥΣ, ΑΠΟ ΤΗΝ ΗΜΕΡΟΜΗΝΙΑ ΤΗΣ ΕΠΕΛΕΥΣΗΣ ΤΟΥ ΠΕΡΙΣΤΑΤΙΚΟΥ Ή ΤΩΝ ΓΕΓΟΝΟΤΩΝ ΠΟΥ ΑΠΟΤΕΛΟΥΝ ΤΗ ΒΑΣΗ ΤΗΣ ΑΞΙΩΣΗΣ Ή ΤΟ ΕΝ ΛΟΓΩ ΜΕΡΟΣ ΠΑΡΑΙΤΕΙΤΑΙ ΤΟΥ ΔΙΚΑΙΩΜΑΤΟΣ ΝΑ ΕΓΕΙΡΕΙ ΟΠΟΙΑΔΗΠΟΤΕ ΑΞΙΩΣΗ ΒΑΣΕΙ ΑΥΤΟΥ ΤΟΥ ΠΕΡΙΣΤΑΤΙΚΟΥ Ή ΤΩΝ ΓΕΓΟΝΟΤΩΝ."
EULA_ENTIRE_AGREEMENT: "Η παρούσα σύμβαση συνιστά την πλήρη σύμβαση ανάμεσα σε εσάς και τη Logitech και κατισχύει όλων των προηγούμενων συμφωνιών, γραπτών ή προφορικών, αναφορικά με το Λογισμικό. Οποιαδήποτε μετάφραση της παρούσας σύμβασης EULA πραγματοποιείται λόγω τοπικών απαιτήσεων και στην περίπτωση διαφοράς ανάμεσα στην Αγγλική και τη μη Αγγλική έκδοση κατισχύει η Αγγλική έκδοση της παρούσας σύμβασης EULA."

