EXPOSURE_COMPENSATION_TOOLTIP_INFO: 露出補正によって、自動露出設定の輝度を変更することができます。
HDR_TOOLTIP_INFO: HDR は複数の露出を組み合わせてより広い範囲の光をキャプチャし、画像の暗い部分と明るい部分のコントラストを強化します。
ENHANCED_VIDEO_STABILIZATION: ビデオの安定性を向上
