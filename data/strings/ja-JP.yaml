SHUTTER_SPEED_TOOLTIP: シャッター速度は、露出とモーションブラーに影響を与えます。遅いほど明るく見えますが、モーションブラーが増加します。高速に設定すると、画像はよりくっきりしますが、暗くなります。モーションブラーに満足したら、ISO コントロールを使って輝度をさらに調整します。
