ONBOARD_ERGO_BENEFITS_DESCRIPTION: LIFT は、長時間デスクで快適に作業ができるように設計された縦型エルゴノミックマウスです。
ONBOARD_ERGO_BENEFITS_DESCRIPTION_1: 手にフィットするように作られた快適な縦型デザインにより、手首をより自然な位置に高めることができ、重要なことに集中しながら、1 日中リラックスして作業ができます。
ONBOARD_SETUP_DPI_SWITCH_TITLE: SmartWheel および DPI スイッチ
ONBOARD_SETUP_SMART_WHEEL_DESCRIPTION: 1 行毎のスクロール、または一度に数ページを移動。
ONBOARD_SETUP_DPI_SWITCH_DESCRIPTION: DPI スイッチボタンをクリックして、2 つの感度レベルを切り替えます。ボタンをクリックして、高速移動または精確な操作を切り替え。
ONBOARD_SETUP_DPI_SWITCH_HOTSPOT: DPI スイッチ

#MX Ergo
# MX Ergo Onboarding strings start
ONBOARD_MX_ERGO_BENEFITS_TITLE: 動きを減らして、姿勢を改善
ONBOARD_MX_ERGO_BENEFITS_DESCRIPTION: カーソルを移動させる際に手を動かす必要がないため、動きを最小限に抑え、パフォーマンスを最大限に引き出すことができます。トラックボールは、通常のマウスに比べて手、手首、前腕の筋緊張を20％軽減します。
ONBOARD_PRECISION_MODE_TITLE: 精密モード
ONBOARD_PRECISION_MODE_DESCRIPTION: 精密モードボタンにより、精密モードと高速トラッキングモ゙ードをシームレスに切り替えることができます。
# MX Ergo Onboarding strings end

ONBOARD_ERGO_M570_BENEFITS_DESCRIPTION: ERGO M570 は、手の形状に合わせて人間工学的に設計および開発されています。カーソルを移動させる際に腕を動かす必要がないため、手と腕の疲れが減少。

