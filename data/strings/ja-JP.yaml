ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: Craftキーボードの最上段にはデフォルトのショートカットが割り当てられていますが、独自のショートカットを作成することもできます。
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "メディアコントロールが搭載されていても、F1、F2などへのアクセスも必要ですか？<strong>Esc+Fn</strong>を押すと、標準のファンクションキーとしての使用に切り替えられます。これはトグルとして機能し、毎回Fnキーを保持する必要がありません。"
ONBOARD_CRAFT_BASED_ACTIONS_RING: 新しいコントロールホイル体験
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Craft における当社のミッションは、<strong>クリエイティブなワークフローを効率化</strong>することでした。コントロールホイルは、タップ、押す、回すといった操作で必要なツールに即時にアクセスできるようにするための、当社の最初の一歩でした。ロジクールではこの構想に基づいて Craft と コントロールホイルの<strong>機能を拡張しました</strong>。その仕組みをぜひご覧ください。"
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: カーソルの先端で熟達
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "<strong>コントロールホイルを押す</strong>と、カスタマイズ可能なオンスクリーンオーバーレイである <strong>Actions Ring</strong> が起動し、必要に応じて Ring 上でツール、フィルター、調整、プラグインなどに直接アクセスできます。"
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: アクションを起動
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: Actions Ring が開いたら、カーソルを使って<strong>実行したいアクションを選択</strong>し、クリックします。
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: 調整
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "素早く調整したい場合は、<strong>アクションにマウスカーソルを合わせてコントロールホイルを回転</strong>させるだけで調整できます。カーソルを使ってアクションを<strong>クリックして左または右にドラッグ</strong>することで、アクションを調節することもできます。"
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: お使いのアプリに適応
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring は、<strong>お使いのアプリケーションに適応</strong>し、デバイスの機能を自動で切り替えて効率を良くします。デフォルトのアプリケーションプロファイルを使うことも、独自に作成してワークフローを効率化することもできます。"
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: 下のボタンを押すと、Options+にアップグレードしてからのCraftキーボードの新機能を確認できます。
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: どこにいても、仕事に必要なすべてのものを。
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "{DEVICE_NAME} は、作業場所に関係なく、生産性を高め、姿勢を改善するように設計されています。"
ONBOARD_SET_UP_EMOJI_KEY: 絵文字キー
ONBOARD_SET_UP_EMOJI_DESCRIPTION_V2: 絵文字キーを使って、メッセージにパーソナルな雰囲気を瞬時に追加 - 楽しみへの近道です！
ONBOARD_SET_UP_PRINT_SCREEN_TITLE: プリントスクリーン
ONBOARD_SET_UP_PRINT_SCREEN_DESCRIPTION_V2: プリントスクリーンキーを押して画面全体を素早くキャプチャし、スクリーンショットを保存します。

