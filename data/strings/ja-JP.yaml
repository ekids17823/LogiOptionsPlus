TINT: 色かぶり補正
WHITE_BALANCE_TEMPERATURE_COMPENSATION_TOOLTIP_INFO: 温度補正によって、自動ホワイトバランス設定の色温度を変更することができます。
COLOR_TEMPERATURE_TOOLTIP_INFO: 温度によって、カラーバランスを手動で調整し、さまざまな照明条件に合わせて画像を暖かく、または冷たくすることができます。
TINT_TOOLTIP_INFO: 色かぶり補正によって、映像内の緑と赤紫の色を手動で調整することができます。
VIBRANCE_TOOLTIP_INFO: 「自然な彩度」によって色の強度を調整することができます。「彩度」と似ていますが、これはシーン内のより落ち着いた色を特に対象にした、より微細な方法で行われます。
BRIGHTNESS_TOOLTIP_INFO: センサーが画像をキャプチャした後、画像の全体的な輝度を調節することができます。画像が暗すぎる場合は、光源の追加も検討してください。
CONTRAST_TOOLTIP_INFO: コントラストは、画像内の明るい領域と暗い領域の差です。
SATURATION_TOOLTIP_INFO: 彩度によって、色の強度を調節することができます。モノクロ画像の場合は、彩度を 0 に設定します。
SHARPNESS_TOOLTIP_INFO: 鮮明さの設定では、ソフトな画像（より滑らか）と、エッジがはっきりした画像（より鮮明）の間で調整することができます。鮮明さを上げると、画像内のノイズも増加します。
BRIGHTNESS: 輝度
