EULA_AUTOMATIC_SOFTWARE_UPDATES: "Logitech puede proporcionar de vez en cuando correcciones de errores, actualizaciones, nuevas versiones y otras modificaciones para el Software (\"Actualizaciones\"). Las Actualizaciones pueden instalarse automáticamente sin proporcionar ningún aviso adicional ni recibir consentimiento adicional. Usted acepta estas Actualizaciones automáticas. Si no desea tales Actualizaciones, debe dejar de usar el Producto. Los términos de este CLUF regirán todas las Actualizaciones proporcionadas por Logitech que sustituyan y/o complementen el Software original a menos que dichas Actualizaciones se acompañen con una licencia independiente, en cuyo caso regirán los términos de esa licencia."
