EULA_LIMITATION_OF_LIABILITY: "EN LA MEDIDA EN LA QUE NO LO PROHÍBA LA LEY APLICABLE, EN NINGÚN CASO SE PODRÁ CONSIDERAR A LOGITECH NI A SUS OTORGANTES DE LICENCIAS RESPONSABLES POR NINGÚN COSTE INCURRIDO DURANTE EL ABASTECIMIENTO O LA SUSTITUCIÓN DE PRODUCTOS, SOFTWARE O SERVICIOS, NI POR LA PÉRDIDA DE BENEFICIOS, INFORMACIÓN NI DATOS, NI POR NINGÚN OTRO DAÑO ESPECIAL, INDIRECTO, RESULTANTE O FORTUITO DERIVADO EN CUALQUIER FORMA DE LA VENTA, LICENCIA O USO, O LA NO DISPONIBILIDAD DEL USO DE UN PRODUCTO, SOFTWARE O SERVICIO DE LOGITECH, SEA CUAL SEA LA CAUSA, INDEPENDIENTEMENTE DE LA TEORÍA DE RESPONSABILIDAD (CONTRACTUAL, EXTRACONTRACTUAL O DE OTRO TIPO), INCLUSO CUANDO SE HAYA NOTIFICADO A LOGITECH LA POSIBILIDAD DE TALES DAÑOS. LA RESPONSABILIDAD TOTAL DE LOGITECH Y SUS OTORGANTES DE LICENCIAS NO SUPERARÁ EN NINGÚN CASO EL IMPORTE REAL ABONADO POR LOS PRODUCTOS, SOFTWARE O SERVICIOS DE LOGITECH MOTIVO DE LA RESPONSABILIDAD. Las limitaciones anteriores se aplicarán incluso si el recurso estipulado no cumpliera su propósito esencial. Dado que en algunas jurisdicciones no se permiten las exclusiones o limitaciones de responsabilidad por daños resultantes o fortuitos, puede que las limitaciones o exclusiones expuestas arriba no le sean aplicables. Así, la limitación anterior carecerá de validez en caso de lesiones personales, en que y en la medida en la que la ley vigente considere responsable al fabricante."
EULA_PRODUCT_LIMITATIONS: "EL SOFTWARE NO SE HA CONCEBIDO PARA SU USO EN EL CONTROL DE INSTALACIONES NUCLEARES, NAVEGACIÓN AÉREA O SISTEMAS DE COMUNICACIONES, SISTEMAS DE CONTROL AÉREO, DISPOSITIVOS MÉDICOS U OTROS EQUIPOS EN LOS QUE EL FALLO DEL SOFTWARE PUDIERA RESULTAR EN MUERTE, LESIONES PERSONALES O DAÑOS FÍSICOS O MEDIOAMBIENTALES GRAVES. USTED ADMITE QUE EL SOFTWARE NO POSEE CERTIFICACIÓN PARA FINES DE EMERGENCIA Y QUE NO DEBE USARSE CON TAL PROPÓSITO. LOGITECH NO SUPERVISA LAS NOTIFICACIONES DE EMERGENCIA, Y NO ES RESPONSABLE DE ENVIAR SERVICIOS DE EMERGENCIA A SU HOGAR."
