EULA_PRIVACY: "Nuestras prácticas de privacidad se describen en nuestra {link}, así como en declaraciones de privacidad específicas de producto (colectivamente, la \"Política de privacidad\") suministradas cuando se compra, descarga o utiliza un programa de software, un producto o un servicio. Al instalar el Software, utilizar productos Logitech o suministrarnos sus datos personales, usted acepta las prácticas, los términos y las condiciones que se describen en la Política de privacidad y en las declaraciones de privacidad individuales. Nuestra Política de privacidad se da por reproducida en este CLUF."
EULA_OPEN_SOURCE: "Este CLUF no se aplica a software de código abierto que pueda incluirse en el Software (\"Componentes de código abierto\"). Los Componentes de código abierto aplicables al Software y las licencias aplicables asociadas, pueden citarse en:{link} Su uso de cada Componente de código abierto está sujeto a los términos de cada licencia para el usuario final que acompañe a dicho Componente de código abierto. Si no acepta los términos de cada licencia aplicable, no debería usar el Software. Nada en este CLUF limita sus derechos según, ni le otorga derechos que anulen, los términos y condiciones de cualquier licencia para el usuario final aplicables para esos Componentes de código abierto."
EULA_THIRD_PARTY_SOFTWARE: "El Software y el Producto se pueden usar junto con otros productos y software, y pueden contener vínculos o interfaces a, además de contenido y datos de, software de terceros (\"Software de terceros\"). El uso de dicho Software de terceros se rige por los términos proporcionados por el otorgante de la licencia de dicho Software de terceros, incluida la política de privacidad de los terceros. Al acceder o utilizar Software de terceros, usted se compromete a cumplir los términos de terceros aplicables. Logitech no garantiza ni hace representaciones del funcionamiento o disponibilidad del Software de terceros. Ni Logitech ni sus otorgantes de licencias son responsables de la indisponibilidad o eliminación del Software de terceros."
EULA_TERMINATION: "Este CLUF continuará hasta su extinción. Cualquiera de las partes puede extinguir este CLUF en cualquier momento por la razón que fuera. Su derecho para usar el Software se extinguirá automáticamente sin previo aviso de Logitech si usted infringe alguno de los términos de este CLUF. En el momento de la extinción, deberá dejar de usar el Software y eliminar todas las copias del Software en su poder o bajo su control. Las disposiciones estipuladas en las secciones 6, 7, 8, 9, 10, 11, 12, 16, 17 y 18 seguirán siendo aplicables incluso después de la extinción. Logitech no hace ninguna representación sobre la futura disponibilidad del Software o de Actualizaciones y no será responsable por la falta de disponibilidad o por la eliminación del Software o las Actualizaciones. Logitech no tendrá ninguna responsabilidad de proporcionar servicios de mantenimiento o asistencia con respecto al Software."
