##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "La fila superior del teclado Craft ya tiene asignados algunos accesos directos predeterminados, pero puedes crear los tuyos propios."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "¿Te gusta disponer de los controles multimedia, pero seguir teniendo acceso a las teclas F1, F2, etc.? Alterna entre las teclas de función estándar y las teclas multimedia pulsando <strong>Esc+Fn.</strong> El botón actúa como conmutador, sin necesidad de mantener pulsada la tecla Fn cada vez."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Una nueva experiencia con la rueda del teclado
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Nuestro objetivo con Craft era <strong>agilizar los procesos creativos</strong>. La rueda del teclado era el primer paso para obtener acceso instantáneo a herramientas esenciales con tan solo tocar, pulsar o girar el accesorio. Nos hemos inspirado en esta visión para <strong>ampliar las capacidades</strong> de Craft y la rueda del teclado, y estamos encantados de mostrarte cómo funcionan."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Profesionalidad al alcance de la mano
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Al pulsar la <strong>rueda del teclado</strong>, se activa <strong>Actions Ring</strong>, una superposición en pantalla personalizable que te da acceso a herramientas, filtros, ajustes, complementos y demás, directamente en el anillo de acciones, justo cuando los necesitas."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Ejecutar acciones
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Cuando Actions Ring esté abierto, usa el cursor para <strong>seleccionar la acción que deseas</strong> ejecutar y haz clic."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Hacer ajustes
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Para hacer ajustes rápidos, <strong>sitúa el cursor sobre la acción y gira la rueda</strong> para modificarla. También puedes modificar la acción <strong>haciendo clic sobre ella y arrastrándola hacia la izquierda o hacia la derecha</strong> con el cursor."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Se adapta a tus aplicaciones
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>se adapta a las aplicaciones que usas</strong> y cambia automáticamente las funciones del dispositivo para aumentar la eficiencia. Puedes usar los perfiles de aplicación predeterminados o crear los tuyos propios para agilizar el flujo de trabajo."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Pulsa el botón que aparece a continuación para ver las novedades del teclado Craft tras la actualización a Options+.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Todo lo que necesitas para trabajar, estés donde estés."
