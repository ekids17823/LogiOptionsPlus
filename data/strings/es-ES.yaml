WHITE_BALANCE_TEMPERATURE_COMPENSATION_TOOLTIP_INFO: La compensación de temperatura permite modificar la temperatura de color de la configuración automática de equilibrio de blanco.
COLOR_TEMPERATURE_TOOLTIP_INFO: "La temperatura permite ajustar manualmente el equilibrio de color, haciendo que las imágenes sean más cálidas o más frías para adaptarse a diferentes condiciones de iluminación."
TINT_TOOLTIP_INFO: El tinte permite ajustar manualmente los colores verde y magenta del vídeo.
VIBRANCE_TOOLTIP_INFO: "La intensidad permite ajustar la intensidad del color de forma similar a la saturación, pero de formas más sutiles, centrándose específicamente en los colores más apagados de la escena."
BRIGHTNESS_TOOLTIP_INFO: "Permite ajustar el brillo general de la imagen después de que el sensor la haya capturado. Si la imagen es demasiado oscura, considera agregar una fuente de luz."
CONTRAST_TOOLTIP_INFO: El contraste es la variación entre las áreas claras y oscuras de la imagen.
SATURATION_TOOLTIP_INFO: La saturación permite ajustar la intensidad del color. Configura la saturación en 0 para una imagen en blanco y negro.
SHARPNESS_TOOLTIP_INFO: La nitidez permite ajustar entre una imagen más suave (más uniforme) y una imagen con bordes más definidos (más nítida). El aumento de la nitidez también puede aumentar el ruido en la imagen.
