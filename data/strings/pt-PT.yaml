SWITCH_APPLICATION_MODAL_TITLE: Modo Options Antigas
SWITCH_APPLICATION_MODAL_DESCRIPTION: "O modo Opções Antigas permite-lhe continuar a utilizar o seu teclado Craft na aplicação Logitech Options desatualizada, mas não terá acesso ao Actions Ring nem à experiência melhorada da Coroa, juntamente com outras funcionalidades como Smart Actions, Marketplace e AI Prompt Builder, disponíveis exclusivamente no Logi Options+."
