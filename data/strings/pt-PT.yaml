EULA_TERMINATION: "Este EULA continuará até ser rescindido.  Cada uma das partes pode rescindir este EULA, por qualquer motivo, em qualquer momento.  O direito do utilizador de utilização do Software será automaticamente rescindido sem aviso da Logitech, em caso de violação de quaisquer termos deste EULA.  Após a referida rescisão, o utilizador deverá deixar de utilizar o Software e remover quaisquer cópias do mesmo de que seja proprietário ou controle. As disposições das secções 6, 7, 8, 9 10, 11, 12, 16, 17 e 18 permanecerão em vigor, após qualquer rescisão.  A Logitech não presta quaisquer garantias acerca da futura disponibilidade do Software ou de quaisquer Actualizações e não será responsável para qualquer indisponibilidade ou remoção do Software ou das Actualizações.  A Logitech não terá qualquer responsabilidade de fornecer serviços de manutenção ou suporte no que diz respeito ao Software."
