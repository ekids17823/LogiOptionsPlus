TINT_TOOLTIP_INFO: A tonalidade permite-lhe ajustar manualmente as cores verde e magenta no seu vídeo.
VIBRANCE_TOOLTIP_INFO: "A vibração permite-lhe ajustar a intensidade da cor de forma semelhante à saturação, mas de forma mais subtil, ao visar especificamente as cores mais suaves na sua cena."
BRIGHTNESS_TOOLTIP_INFO: "Permite-lhe ajustar a luminosidade geral da imagem após esta ter sido captada pelo sensor. Se a imagem estiver demasiado escura, considere também a possibilidade de adicionar uma fonte de luz."
