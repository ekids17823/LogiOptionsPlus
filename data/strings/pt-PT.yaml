EULA_TEXT_1: "{openingTag} ESTE CONTRATO DE LICENÇA DO UTILIZADOR FINAL (\"EULA\") É UM ACORDO JURÍDICO ENTRE O UTILIZADOR E A LOGITECH EUROPE S.A. (\"Logitech\"). LEIA ESTE CONTRATO ATENTAMENTE ANTES DE INSTALAR O SOFTWARE OU UTILIZAR O SEU PRODUTO LOGITECH. AO INSTALAR O SOFTWARE OU UTILIZAR O SEU PRODUTO LOGITECH, ESTÁ A CONCORDAR EM VINCULAR-SE AOS TERMOS DESTE CONTRATO EULA. SE NÃO CONCORDAR COM OS TERMOS DESTE EULA, PODE DEVOLVER O PRODUTO E OBTER UM REEMBOLSO, SUJEITO AOS TERMOS E CONDIÇÕES DA POLÍTICA DE DEVOLUÇÃO APLICÁVEL DO PONTO DE COMPRA.{closingTag}{openingTag}SE NÃO TIVER ATINGIDO A MAIORIDADE NO SEU PAÍS OU REGIÃO DE RESIDÊNCIA, DEVE PEDIR AOS SEUS PAIS OU TUTOR LEGAL QUE LEIAM E ACEITEM OS TERMOS DESTE EULA.{closingTag}{openingTag} SE RESIDIR (OU SE O PAÍS PRINCIPAL DA SUA ATIVIDADE FOR) NOS ESTADOS UNIDOS E ESTIVER A UTILIZAR O SOFTWARE OU O PRODUTO APENAS PARA USO PESSOAL OU DOMÉSTICO, LEIA A SECÇÃO 17 EM BAIXO, VISTO QUE ABORDA LITÍGIOS E ARBITRAGENS DE ACORDO COM AS REGRAS DE ARBITRAGEM DO CONSUMIDOR.{closingTag}{openingTag} CONFORME DESCRITO EM BAIXO NA SECÇÃO 4, O UTILIZADOR CONCORDA COM AS ACTUALIZAÇÕES AUTOMÁTICAS DO SOFTWARE. SE NÃO CONCORDAR, NÃO DEVERÁ UTILIZAR O PRODUTO OU INSTALAR O SOFTWARE. {closingTag}{openingTag} A SECÇÃO EM BAIXO RELATIVA ÀS LIMITAÇÕES DO PRODUTO ESPECIFICA LIMITAÇÕES IMPORTANTES ACERCA DO SOFTWARE E SERVIÇOS RELACIONADOS EM MATÉRIAS DE SEGURANÇA E DE UTILIZAÇÕES CRÍTICAS. LEIA ESTA SECÇÃO ATENTAMENTE, DADO QUE ESTÁ A RECONHECER E SUBSCREVER A MESMA. {closingTag}{openingTag} “Software” significa (i) qualquer programa ou aplicação de software, incluindo aplicações de software transferidas e instaladas num computador ou dispositivo móvel; (ii) qualquer software na forma de software integrado num produto Logitech; (iii) qualquer documentação, versões modificadas, actualizações ou melhorias ao referido software (excepto fornecido expressamente segundo termos diferentes no momento da actualização ou transferência), todas as versões posteriores e cópias do referido software.{closingTag}{openingTag} Estes termos conferem-lhe direitos legais específicos. Além disso, poderá ter direito a outros direitos legais, que podem variar conforme a jurisdição.{closingTag}"
EULA_LICENSE: "Sujeito aos termos deste EULA, a Logitech concede-lhe uma licença limitada e não exclusiva para utilizar o Software apenas com o produto Logitech que comprou ou o serviço Logitech utilizado por si. Excepto para os casos de software integrado num produto Logitech, o Software poderá ser copiado com fins de cópia de segurança ou de arquivo como apoio à sua utilização do Software, conforme permitido em baixo, e de modo a disponibilizá-lo num servidor interno de rede doméstica ou empresarial, apenas para transferência para dispositivos de que seja proprietário ou que controle no seu domicílio ou na sua empresa; mas exclusivamente para a sua utilização do Software conforme aqui indicada. Todas as cópias devem incluir todos os avisos de direitos de autor ou de propriedade incluídos no original.  Se estiver na posse ou controlo do Software integrado ou do serviço da Logitech utilizado por si. O utilizador pode transferir permanentemente o Software para outra pessoa, mediante uma transferência permanente do produto Logitech que utiliza o Software, contanto que a pessoa concorde ficar vinculada a este EULA e, após tal transferência, o utilizador deixe de utilizar o produto e o Software."
