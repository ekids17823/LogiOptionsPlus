ENABLE_OPTIONS_MODE_CANCEL_BUTTON: "NÃO, MANTER %0 NO LOGI OPTIONS+"

# Logi Options+

ENABLE_OPTIONS_PLUS_MODE_TITLE: "Desbloqueie a experiência %0 melhorada com o Logi Options+"
ENABLE_OPTIONS_PLUS_MODE_DESCRIPTION: "Atualmente, o seu teclado do Craft é apenas personalizável no Logitech Options. Faça o upgrade para o Logi Options+ para aceder ao Actions Ring e à experiência melhorada da Coroa, juntamente com outras funcionalidades como Smart Actions, Marketplace e AI Prompt Builder, disponíveis exclusivamente no Logi Options+"
ENABLE_OPTIONS_PLUS_MODE_ENABLE_BUTTON: "SIM, PERSONALIZAR COM O LOGI OPTIONS+"
