ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Com o Craft, pretendemos <strong>agilizar o seu fluxo de trabalho criativo</strong>. A Coroa foi o nosso primeiro passo para lhe dar acesso imediato às ferramentas essenciais ao tocar, premir e rodar. Trabalhámos com base nesta visão para <strong>alargar as capacidades</strong> do Craft e da Coroa e é com enorme prazer que lhe iremos mostrar como funciona."
