ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Ao <strong>premir a Coroa</strong>, agora aciona o <strong>Actions Ring,</strong> uma sobreposição personalizável no ecrã, que lhe dá acesso direto a ferramentas, filtros, ajustes, plugins e muito mais, diretamente no Ring, exatamente quando precisa."
