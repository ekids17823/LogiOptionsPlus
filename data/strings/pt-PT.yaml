ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Efetuar ajustes
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Para efetuar ajustes rápidos, basta <strong>colocar o cursor sobre a ação e rodar a Coroa</strong> para ajustar. Também pode ajustar a ação ao <strong>clicar e arrastar para a esquerda ou para a direita</strong> na ação com o cursor."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Adapta-se às suas aplicações
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "O Actions Ring <strong>adapta-se às aplicações que está a utilizar</strong>, alterando automaticamente as funções do dispositivo para maior eficiência. Pode utilizar os perfis da aplicação predefinidos ou criar os seus para agilizar o fluxo de trabalho."
