# Legacy Options
ENABLE_OPTIONS_MODE_TITLE: Tem a certeza de que pretende ativar o modo Opções Antigas?
ENABLE_OPTIONS_MODE_DESCRIPTION: "Esta ação irá transferir o seu teclado Craft de volta para a aplicação Logitech Options antiga. Apesar de poder continuar a utilizar o Logitech Options, <strong>não vamos fazer mais atualizações </strong>ao mesmo."
ENABLE_OPTIONS_MODE_DESCRIPTION1: "Também <strong>não terá acesso</strong> ao Actions Ring nem à experiência melhorada da Coroa, juntamente com outras funcionalidades como Smart Actions, Marketplace e AI Prompt Builder, disponíveis exclusivamente no Logi Options+."
ENABLE_OPTIONS_MODE_NOTE: Pode voltar ao Logi Options+ a qualquer momento.
