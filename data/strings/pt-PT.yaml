SATURATION_TOOLTIP_INFO: A saturação permite-lhe ajustar a intensidade da cor. Defina a saturação para 0 para obter uma imagem a preto e branco.
SHARPNESS_TOOLTIP_INFO: A nitidez permite-lhe ajustar entre uma imagem mais suave (mais suavização) e uma imagem com margens mais definidas (mais nitidez). Aumentar a nitidez pode também aumentar o ruído na imagem.
