ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "A linha superior do seu teclado Craft já tem alguns atalhos padrão atribuídos, mas você também pode criar os seus."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Gostaria de ter os controles de mídia, mas continuar a ter acesso a F1, F2 etc.? Você pode alternar entre usá-las como teclas de função padrão pressionando <strong>Esc+Fn.</strong> Funciona como um botão de alternância; não é necessário manter a tecla Fn pressionada todas as vezes."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Uma nova experiência com o Crown
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Nossa missão com o Craft era <strong>agilizar seu fluxo de trabalho criativo</strong>. O Crown foi o nosso primeiro passo para dar a você acesso instantâneo às ferramentas essenciais com tocar, pressionar e girar. Usamos essa visão como base para <strong>ampliar os recursos</strong> do Craft e do Crown, e estamos animados para mostrar a você como funciona."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Domínio ao alcance do cursor do mouse
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Ao <strong>pressionar o Crown</strong>, você aciona o <strong>Actions Ring</strong>, uma sobreposição personalizável na tela que fornece acesso direto a ferramentas, filtros, ajustes, plug-ins e muito mais, diretamente no Ring, exatamente quando você precisa."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Iniciar ações
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Assim que o Actions Ring estiver aberto, use o cursor para <strong>selecionar a ação que deseja</strong> executar e clique."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Faça ajustes
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Para ajustes rápidos, basta <strong>passar o mouse e girar o Crown</strong> para ajustar. Você também pode ajustar <strong>clicando e arrastando para a esquerda ou direita</strong> a ação com o cursor."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Adapta-se aos seus aplicativos
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "O Actions Ring <strong>se adapta aos aplicativos que você usa</strong> e altera automaticamente as funções do dispositivo para garantir maior eficiência. Você pode usar os perfis de aplicativos padrão ou criar seus perfis para otimizar o fluxo de trabalho."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Pressione o botão abaixo para ver o que há de novo no seu teclado Craft desde a atualização para o Options+.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Tudo que você precisa para trabalhar, onde quer que esteja."
