ONBOARD_SET_UP_SMART_BACKLIGHTING: Podświetlenie
ONBOARD_SMART_BACKLIGHTING_DESCRIPTION: "Czujnik natężenia światła otoczenia dostosowuje jasność podświetlenia, by oszczędzać energię w sytuacjach, gdy naturalnego światła jest pod dostatkiem. Możesz też ręcznie wyregulować podświetlenie za pomocą dwóch zaznaczonych klawiszy."
ONBOARD_SET_UP_SMART_BACKLIGHTING_TITLE: Inteligentne podświetlenie
ONBOARD_SET_UP_SMART_BACKLIGHTING_DESCRIPTION: "Wybierz pomiędzy różnymi efektami podświetlenia klawiatury, naciskając klawisze „Fn + ikonę żarówki” lub wybierz z poniższej listy"
