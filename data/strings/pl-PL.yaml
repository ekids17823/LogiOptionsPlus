ONBOARD_PRECISION_MODE_TITLE: Tryb precyzyjny
ONBOARD_PRECISION_MODE_DESCRIPTION: Przycisk trybu precyzyjnego umożliwia płynne przełączanie się pomiędzy precyzyjnym i szybkim trybem śledzenia.
