ONBOARD_BATTERY_NOTIFICATION_DESCRIPTION: "Podświetlenie wyłącza się, gdy poziom naładowania baterii spadnie poniżej 10%. Dioda LED zamiga na czerwono oraz otrzymasz powiadomienie na ekranie. Użyj załączonego kabla USB-C, by naładować urządzenie."
ONBOARD_EASY_SWITCH: Easy-Switch
ONBOARD_SET_UP_CUSTOMIZE_KEYS: Dostosuj klawisze
ONBOARD_CUSTOMIZE_KEYS_DESCRIPTION: "Skonfigurowaliśmy kilka domyślnych skrótów, ale możesz też stworzyć własne."
ONBOARD_SET_YOUR_F_KEYS: Ustaw klawisze funkcyjne
ONBOARD_SET_YOUR_F_KEYS_DESCRIPTION: "Przełączaj się między klawiszami multimediów i funkcyjnymi w dowolnej chwili, naciskając skrót Fn + Esc. Używaj klawiszy funkcyjnych swobodnie, bez potrzeby trzymania klawisza Fn."
ONBOARD_SET_UP_MUTE_UNMUTE: Wycisz/wyłącz wyciszenie
ONBOARD_MUTE_UNMUTE_DESCRIPTION: "Naciśnij przycisk wyciszenia, aby wyciszyć/wyłączyć wyciszenie siebie podczas spotkań."
ONBOARD_MUTE_UNMUTE_DESCRIPTION_1: "Naciśnij przycisk, aby wyciszyć lub wyłączyć wyciszenie mikrofonu w celu prowadzenia rozmów bez zakłóceń."
ONBOARD_SET_UP_DICTATION_AND_EMOJI: Dyktowanie i Emoji
ONBOARD_SET_UP_DICTATION_AND_EMOJI_SCREENSHOT: "Klawisz dyktowania, emoji i zrzutu ekranu"
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION: "Naciśnij klawisz dyktowania, aby zamienić mowę na tekst w dowolnym polu tekstowym. Szybko uzyskaj dostęp do emoji za pomocą klawisza emoji."
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_SCREENSHOT: "Wypróbuj przycisk dyktowania, aby rozpocząć dyktowanie wszystkiego na aktywnym polu tekstowym. Za pomocą klawisza emoji można również szybko uzyskać dostęp do emoji. Z łatwością wykonuj zrzut ekranu na ekranie za pomocą klawisza zrzutu ekranu."
ONBOARD_SET_UP_DO_NOT_DISTURB: Nie przeszkadzać
ONBOARD_DO_NOT_DISTURB_DESCRIPTION: "Aktywuj tryb „Nie przeszkadzać” na swoim komputerze Mac, aby nic nie przeszkadzało Ci w pracy, gdy potrzebujesz skupienia."
ONBOARD_NEXT_TRACK: Następny utwór
