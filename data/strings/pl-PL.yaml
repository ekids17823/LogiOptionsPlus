ONBOARD_LANGUAGE_SWITCH_DESCRIPTION: "Naciśnij przycisk przełączania języka, aby zmienić preferencje pisania na klawiaturze."
ONBOARD_KEYS_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Sparuj klawiaturę z maksymalnie 2 urządzeniami i przełączaj się między nimi jednym naciśnięciem przycisku Easy-Switch™. Użyj jednego {DEVICE_NAME} dla laptopa, komputera stacjonarnego lub tabletu."
ONBOARD_MICE_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Sparuj mysz z maksymalnie 2 urządzeniami i przełączaj się między nimi jednym naciśnięciem przycisku Easy-Switch™. Użyj jednego {DEVICE_NAME} dla laptopa, komputera stacjonarnego lub tabletu."
