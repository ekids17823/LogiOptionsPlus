PIPL_PAGE: Prywatność w Logitech
PIPL_PAGE_DESC: "Logitech dba o Twoją prywatność, więc zwiększamy przejrzystość działania naszych aplikacji. Aby zapewnić normalne działanie Options+, Logitech musi zbierać ograniczone dane osobowe. Aby uzyskać więcej informacji na temat zbieranych danych, zapoznaj się z naszą {LOGITECH_PRIVACY_POLICY}. Możesz w każdej chwili przeglądać i modyfikować te uprawnienia w ustawieniach."
PIPL_PAGE_POLICY_PROCESS: "Wyrażam zgodę na przetwarzanie moich danych osobowych zgodnie z opisem w {LOGITECH_PRIVACY_POLICY}"
PIPL_PAGE_POLICY_TRANSFER: "Zgadzam się na transgraniczny transfer moich danych osobowych w sposób opisany w {LOGITECH_PRIVACY_POLICY}"
PIPL_PAGE_POLICY_SHARE: "Zgadzam się na udostępnianie moich danych osobowych zaufanymi partnerom i innym podmiotom Logitech w sposób opisany w {LOGITECH_PRIVACY_POLICY}"
PIPL_PAGE_LOGITECH_PRIVACY_POLICY: Polityka prywatności Logitech
PIPL_PAGE_OPEN_OPTIONS: OTWÓRZ OPTIONS+

PIPL_SETTINGS: Analiza i wykorzystanie danych
PIPL_SETTINGS_DESC: "Pamiętaj, że zbieranie ograniczonych danych osobowych jest niezbędne do właściwego działania tego oprogramowania. Modyfikacja tych ustawień może spowodować, że oprogramowanie nie będzie działać prawidłowo."
PIPL_SETTINGS_MODAL_TITLE: Chcesz wycofać swoją zgodę?
PIPL_SETTINGS_MODAL_DESC: "Wycofanie zgody nie będzie mieć wpływu na jakiekolwiek istniejące konfiguracje, ale nie będziesz w stanie tworzyć nowych konfiguracji w Options+."
PIPL_SETTINGS_POLICY_PROCESS: "Zgadzam się na przetwarzanie moich danych osobowych w sposób opisany w {LOGITECH_PRIVACY_POLICY}."
PIPL_SETTINGS_POLICY_TRANSFER: "Zgadzam się na transgraniczny transfer moich danych osobowych w sposób opisany w {LOGITECH_PRIVACY_POLICY}."
PIPL_SETTINGS_POLICY_SHARE: "Zgadzam się na udostępnianie moich danych osobowych zaufanymi partnerom i innym podmiotom Logitech w sposób opisany w {LOGITECH_PRIVACY_POLICY}."
