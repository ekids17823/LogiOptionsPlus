ONBOARD_ERGO_BENEFITS_DESCRIPTION_1: "Doskonała, pionowa konstrukcja dopasowana do kształtu dłoni unosi nadgarstek do bardziej naturalnej pozycji i zmniejsza zmęczenie dłoni w ciągu dnia, pozwalając skupić się na tym, co naprawdę ważne!"
ONBOARD_SETUP_DPI_SWITCH_TITLE: Kółko SmartWheel i przełącznik DPI
ONBOARD_SETUP_SMART_WHEEL_DESCRIPTION: Przewijaj pojedyncze wiersze lub całe strony na raz.
ONBOARD_SETUP_DPI_SWITCH_DESCRIPTION: "Kliknij przełącznik DPI, aby błyskawicznie ustawić jeden z dwóch trybów czułości. Wybierz szybkość lub precyzję jednym naciśnięciem przycisku."
