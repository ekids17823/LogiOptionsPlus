ONBOARD_SMART_BACKLIGHT_DESCRIPTION: "Czujnik natężenia światła otoczenia dostosowuje jasność podświetlenia, by oszczędzać energię w sytuacjach, gdy naturalnego światła jest pod dostatkiem. Użyj podświetlonego klawisza do ręcznej zmiany podświetlenia."
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_TITLE: Lewy i prawy przycisk myszy
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_DESCRIPTION: Lewy i prawy przycisk myszy w lewym górnym rogu klawiatury. Dzięki temu możesz nawigować po touchpadzie prawą ręką i wybierać lewą.
