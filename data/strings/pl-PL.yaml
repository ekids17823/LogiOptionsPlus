ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION_V2: "Sparuj mysz z maksymalnie trzema urządzeniami i przełączaj się między nimi jednym naciśnięciem przycisku Easy-Switch™. Użyj jednego urządzenia {DEVICE_NAME} do telefonu, laptopa lub komputera stacjonarnego."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION: "Sparuj mysz z maksymalnie 3 urządzeniami i przełączaj się między nimi jednym naciśnięciem przycisku Easy-Switch™. Użyj jednego {DEVICE_NAME} dla laptopa, komputera stacjonarnego lub tabletu."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION_V2: "Sparuj mysz z maksymalnie 3 urządzeniami i przełączaj się między nimi jednym naciśnięciem przycisku Easy-Switch™. Użyj jednego {DEVICE_NAME} dla laptopa, komputera stacjonarnego lub tabletu."
ONBOARD_KEYS_K480_EASY_SWITCH_DESCRIPTION: "Sparuj klawiaturę z maksymalnie 3 urządzeniami i przełączaj się między nimi za pomocą pokrętła wyboru. Użyj jednego {DEVICE_NAME} dla laptopa, komputera stacjonarnego lub tabletu."
