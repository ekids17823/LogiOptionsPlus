EULA_LIMITATION_OF_LIABILITY: "W MAKSYMALNYM ZAKRESIE DOPUSZCZONYM PRZEZ OBOWIĄZUJĄCE PRAWO FIRMA LOGITECH ANI JEJ LICENCJODAWCY W ŻADNYM PRZYPADKU NIE SĄ ODPOWIEDZIALNI ZA JAKIEKOLWIEK KOSZTY PONIESIONE PRZY ZAKUPIE PRODUKTÓW ZASTĘPCZYCH, OPROGRAMOWANIA CZY USŁUG, ZA UTRATĘ ZYSKÓW LUB UTRATĘ INFORMACJI ALBO DANYCH ANI ZA ŻADNE INNE NADZWYCZAJNE, WTÓRNE, WYNIKOWE LUB PRZYPADKOWE SZKODY POWSTAŁE W JAKIKOLWIEK SPOSÓB W WYNIKU SPRZEDAŻY, UDZIELENIA LICENCJI, UŻYTKOWANIA LUB NIEMOŻNOŚCI UŻYTKOWANIA DOWOLNEGO PRODUKTU, OPROGRAMOWANIA LUB USŁUGI FIRMY LOGITECH, NIEZALEŻNIE OD RODZAJU ODPOWIEDZIALNOŚCI (KONTRAKTOWEJ, DELIKTOWEJ LUB INNEJ), NAWET JEŚLI FIRMA LOGITECH ZOSTAŁA POWIADOMIONA O MOŻLIWOŚCI WYSTĄPIENIA TAKICH SZKÓD. W ŻADNYM PRZYPADKU CAŁKOWITA ODPOWIEDZIALNOŚĆ FIRMY LOGITECH I JEJ LICENCJODAWCÓW NIE PRZEKROCZY KOSZTÓW ZAKUPU PRODUKTU, OPROGRAMOWANIA LUB USŁUGI FIRMY LOGITECH, W ZWIĄZKU Z KTÓRYM POWSTAŁA SZKODA. Powyższe ograniczenia mają zastosowanie, nawet jeśli wyrażone wyżej oświadczenie straci swoją celowość. Niektóre prawodawstwa nie zezwalają na wyłączanie lub ograniczanie odpowiedzialności za szkody przypadkowe lub wtórne, w związku z czym powyższe ograniczenie lub wykluczenie może nie mieć zastosowania dla konkretnego użytkownika. W miejscach, w których prawo wymaga takiej odpowiedzialności, i w zakresie wymaganym przez prawo wymienione ograniczenia nie dotyczą przypadków uszkodzenia ciała."
EULA_PRODUCT_LIMITATIONS: "NINIEJSZE OPROGRAMOWANIE NIE JEST PRZEZNACZONE DO UŻYTKU W ZAKŁADACH JĄDROWYCH, W SYSTEMACH NAWIGACJI LUB KOMUNIKACJI LOTNICZEJ, SYSTEMACH KONTROLI RUCHU POWIETRZNEGO, URZĄDZENIACH MEDYCZNYCH ANI W ŻADNYM INNYM SPRZĘCIE, W PRZYPADKU KTÓREGO AWARIA OPROGRAMOWANIA MOŻE PROWADZIĆ DO ŚMIERCI, OBRAŻEŃ CIAŁA LUB POWAŻNYCH ZNISZCZEŃ ŚRODKÓW TRWAŁYCH LUB ŚRODOWISKA. UŻYTKOWNIK PRZYJMUJE DO WIADOMOŚCI, ŻE OPROGRAMOWANIE NIE JEST CERTYFIKOWANE DO WYKORZYSTANIA W CELACH RATUNKOWYCH I NIE NALEŻY UŻYWAĆ GO W TAKICH CELACH. FIRMA LOGITECH NIE MONITORUJE POWIADOMIEŃ RATUNKOWYCH ANI NIE ODPOWIADA ZA WYSŁANIE SŁUŻB RATUNKOWYCH DO DOMU UŻYTKOWNIKA."
EULA_US_GOVERNMENT_END_USERS: 'Oprogramowanie stanowi „Towar komercyjny” w rozumieniu punktu 48 § 2.101 Kodeksu Przepisów Federalnych obowiązującego w Stanach Zjednoczonych, obejmującego „Komercyjne oprogramowanie komputerowe” oraz „Dokumentację komercyjnego oprogramowania komputerowego”, a licencja na Oprogramowanie jest udzielana użytkownikom końcowym będącym podmiotami rządu Stanów Zjednoczonych Ameryki Północnej (a) jedynie jako Towary komercyjne oraz (b) jedynie z takimi prawami, jakie są udzielane wszystkim innym użytkownikom końcowym na podstawie postanowień i warunków niniejszej Umowy. Prawa do utworu nieopublikowanego podlegają ochronie na podstawie przepisów prawa autorskiego obowiązującego w Stanach Zjednoczonych Ameryki Północnej.'
EULA_EXPORT_LAW_ASSURANCES: "Użytkownik zgadza się, że nie może eksportować ani reeksportować Oprogramowania z naruszeniem jakichkolwiek obowiązujących przepisów prawa lub regulacji, w tym między innymi przepisów Stanów Zjednoczonych Ameryki, Unii Europejskiej, Szwajcarii i/lub przepisów prawa lub regulacji jurysdykcji, w których Oprogramowanie zostało uzyskane."
EULA_AGENTS: "Jeśli nabywający Oprogramowanie robi to w imieniu innej osoby lub podmiotu, oświadcza i gwarantuje, że ma pełnomocnictwo do związania strony bądź podmiotu, dla którego nabywa Oprogramowanie, warunkami i postanowieniami niniejszej Umowy. Użytkownik oświadcza, że przekroczył wiek wymagany przez swoje prawodawstwo w celu korzystania z oprogramowania i uzyskiwania do niego dostępu oraz do przystąpienia do niniejszej Umowy."
EULA_CONTROLLING_LAW_1: "Jeśli użytkownik znajduje się na terenie Stanów Zjednoczonych, niniejsza Umowa podlega wyłącznie prawom Stanów Zjednoczonych oraz stanu Kalifornia i będzie interpretowana zgodnie z nimi, bez względu na jego przepisy odnoszące się do wyboru prawa właściwego. Jeśli użytkownik znajduje się poza terenem Stanów Zjednoczonych, niniejsza Umowa podlega wyłącznie prawu szwajcarskiemu. Jeśli którekolwiek z postanowień niniejszej Umowy okaże się nieważne, strony zgadzają się, że ich intencje odzwierciedlone w postanowieniach oraz pozostałe postanowienia niniejszej Umowy pozostają w pełnej mocy."
EULA_CONTROLLING_LAW_2: "Jeżeli miejscem zamieszkania użytkownika są Stany Zjednoczone i użytkownik korzysta z Oprogramowania lub Produktu wyłącznie do użytku osobistego lub w gospodarstwie domowym, stosuje się do niego paragraf 17:"
EULA_ARBITRATION: "Wszelkie spory między użytkownikiem a firmą Logitech będą rozstrzygane w drodze ostatecznego i wiążącego arbitrażu przeprowadzanego zgodnie z Zasadami arbitrażu konsumenckiego („Zasady”) Amerykańskiego Stowarzyszenia Arbitrażowego (American Arbitration Association). Nie obejmuje to wszelkich sporów podlegających w innym przypadku jurysdykcji sądu ds. drobnych roszczeń cywilnych, które jedna ze stron może zgłosić do właściwego sądu ds. drobnych roszczeń cywilnych przed wyznaczeniem arbitra. Arbitraż zostanie przeprowadzony przez jednego arbitra wybranego wspólnie przez strony lub w ramach procesu wyboru określonego w Zasadach. Koszt arbitrażu zostanie podzielony między strony zgodnie z Zasadami. Decyzja arbitra będzie końcowa i wiążąca dla obu stron bez prawa do odwołania. W CELU UNIKNIĘCIA UTRATY MATERIAŁU DOWODOWEGO I ZAPEWNIENIA SZYBKIEGO ROZSTRZYGNIĘCIA ROSZCZEŃ WYNIKAJĄCYCH Z NINIEJSZEJ UMOWY STRONA WYSTĘPUJĄCA Z ROSZCZENIEM NA PODSTAWIE NINIEJSZEJ UMOWY MUSI PRZEKAZAĆ DRUGIEJ STRONIE PISEMNE ZAWIADOMIENIE O PODSTAWIE ROSZCZENIA W CIĄGU JEDNEGO (1) ROKU LUB W CIĄGU MINIMALNEGO OKRESU WYMAGANEGO PRZEZ PRAWO WŁAŚCIWE, JEŻELI JEST ON DŁUŻSZY NIŻ JEDEN (1) ROK, OD DATY ZAISTNIENIA ZDARZENIA LUB FAKTÓW STANOWIĄCYCH PODSTAWĘ ROSZCZENIA, LUB TEŻ ZRZEKA SIĘ ONA PRAWA DO DOCHODZENIA ROSZCZEŃ NA PODSTAWIE TAKIEGO ZDARZENIA LUB FAKTÓW."
EULA_ENTIRE_AGREEMENT: Niniejsza Umowa stanowi całość umowy między Użytkownikiem a firmą Logitech i zastępuje wszelkie wcześniejsze umowy pisemne lub ustne związane z Oprogramowaniem. Jakiekolwiek tłumaczenie niniejszej Umowy dokonywane jest w celu spełnienia wymogów lokalnych. W przypadku niezgodności między wersją angielską a dowolną inną wersją decydująca jest wersja angielska niniejszej Umowy.

