WHATSNEW_TAB3_CONTENT2: "Ulepszono działanie „Przełącz profil”, które pozwala teraz przechodzić do profili różnych aplikacji (oraz przywoływać daną aplikację na pierwszy plan, jeśli jest już otwarta), a także do profilu ogólnego."
