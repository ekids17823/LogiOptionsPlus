ONBOARD_LIVING_ROOM_KB_D_PAD_DESCRIPTION: Konsola D-pad do prostego poruszania się po menu ekranowym i interfejsach aplikacji na Twoim Smart TV. Możesz nawet użyć konsoli D-Pad do sterowania odtwarzaczami multimedialnymi w swoich ulubionych aplikacjach streamingowych.
