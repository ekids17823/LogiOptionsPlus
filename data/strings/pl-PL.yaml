ONBOARD_FEATURE_AI_PORTAL_DESCRIPTION: "Przypisz swoje narzędzia AI lub skróty Logi AI Portal do przycisku akcji, aby uzyskać natychmiastową pomoc w odpowiedziach, sprawdzaniu gramatyki, podsumowaniach i nie tylko."
