##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Do górnego rzędu klawiatury Craft przypisano już kilka domyślnych skrótów, ale możesz też utworzyć własne."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Podoba Ci się sterowanie multimediami, ale nadal chcesz mieć dostęp do klawiszy F1, F2 itd.? Możesz przełączać między używaniem ich jako standardowych klawiszy funkcyjnych, naciskając kombinację klawiszy <strong>Esc+Fn.</strong> Wszystko odbywa się na zasadzie przełącznika – nie musisz przytrzymywać za każdym razem klawisza Fn."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Pokrętło Korona w nowym wydaniu
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Podczas projektowania klawiatury Craft przyświecał nam jeden cel: <strong>chcieliśmy usprawnić przepływ zadań podczas Twojej kreatywnej pracy</strong> Pierwszym krokiem na drodze do jego osiągnięcia było stworzenie pokrętła Korona, dzięki któremu masz natychmiastowy dostęp do niezbędnych narzędzi takich jak dotknięcie, naciśnięcie i obrócenie. Rozwinęliśmy tę wizję, aby <strong>rozszerzyć możliwości</strong> klawiatury Craft i pokrętła Korona. Cieszymy się, że możemy pokazać wam, jak to działa."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Mistrzostwo na wyciągnięcie kursora
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "<strong>Naciśnięcie pokrętła Korona</strong> spowoduje teraz aktywację pierścienia <strong>Actions Ring</strong>, konfigurowalnej nakładki ekranowej, która zapewnia bezpośredni dostęp do narzędzi, filtrów, regulacji, wtyczek i innych elementów bezpośrednio na pierścieniu – dokładnie wtedy, gdy ich potrzebujesz."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Uruchom działania
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Po otwarciu pierścienia Actions Ring <strong>zaznacz kursorem działanie, które chcesz</strong> wykonać, a następnie kliknij."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Dokonywanie regulacji
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "W celu szybkiego dostosowania wystarczy wskazać myszą <strong>dane działanie i obrócić pokrętło Korona</strong>. Możesz też dostosować działanie, <strong>klikając i przeciągając kursor w lewo lub w prawo</strong> na danym działaniu."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Dostosowuje się do Twoich aplikacji
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Pierścień Actions Ring <strong>dostosowuje się do używanych aplikacji,</strong> automatycznie zmieniając funkcje urządzenia w celu zwiększenia jego wydajności. Możesz użyć domyślnych profili aplikacji lub utworzyć własne, co pozwoli zoptymalizować pracę."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: "Aby zobaczyć, jakie nowe funkcje wprowadzono w klawiaturze Craft od czasu aktualizacji do oprogramowania Options+, naciśnij poniższy przycisk."
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Wszystko, czego potrzebujesz do pracy, gdziekolwiek jesteś."
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "Urządzenie {DEVICE_NAME} zostało zaprojektowane tak, aby zachęcać do lepszej produktywności i lepszej postawy, bez względu na to, gdzie pracujesz."
ONBOARD_SET_UP_EMOJI_KEY: Klawisz emoji
ONBOARD_SET_UP_EMOJI_DESCRIPTION_V2: Błyskawicznie nadaj swoim wiadomościom osobistego charakteru za pomocą klawisza Emoji – Twojego skrótu do zabawy!
ONBOARD_SET_UP_PRINT_SCREEN_TITLE: Print Screen
ONBOARD_SET_UP_PRINT_SCREEN_DESCRIPTION_V2: "Szybko rejestruj cały ekran i zapisuj zrzut ekranu, naciskając klawisz Print Screen."

