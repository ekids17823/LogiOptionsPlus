TINT: TINT
WHITE_BALANCE_TEMPERATURE_COMPENSATION_TOOLTIP_INFO: Temperature Compensation allows you to modify the color temperature of your automatic white balance settings.
COLOR_TEMPERATURE_TOOLTIP_INFO: Temperature lets you manually adjust the color balance, making images warmer or cooler to suit different lighting conditions.
TINT_TOOLTIP_INFO: Tint allows you to manually adjust the green and magenta colors in your video.
VIBRANCE_TOOLTIP_INFO: Vibrance lets you adjust the intensity of color similar to saturation, but in more subtle ways specifically targeting the more muted colors in your scene.
BRIGHTNESS_TOOLTIP_INFO: Lets you adjust the overall brightness of the image after its been captured by the sensor. If your image is too dark, also consider adding a source of light.
CONTRAST_TOOLTIP_INFO: Contrast is the variation between light and dark areas in the image.
SATURATION_TOOLTIP_INFO: Saturation lets you adjust the intensity of color. Set Saturation to 0 for a black & white image.
SHARPNESS_TOOLTIP_INFO: Sharpness lets you adjust between a softer image (smoother), and an image with more defined edges (more sharpness). Increasing sharpness can also increase noise in the image.
