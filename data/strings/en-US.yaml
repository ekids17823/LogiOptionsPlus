LOW_LIGHT_COMPENSATION_TOOLTIP: If enabled, allow the webcam to dynamically vary the frame rate to compensate for low lighting conditions.
EXPOSURE_COMPENSATION: EXPOSURE COMPENSATION
HDR: HDR
EXPOSURE_COMPENSATION_TOOLTIP_INFO: Exposure compensation allows you to modify the brightness of your automatic exposure settings.
HDR_TOOLTIP_INFO: HDR combines multiple exposures to capture a broader range of light, enhancing contrast for dark and light areas of the image.
ENHANCED_VIDEO_STABILIZATION: Enhanced Video Stabilization
