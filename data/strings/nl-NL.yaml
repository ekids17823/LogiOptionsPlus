##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Aan de bovenste rij van je Craft-toetsenbord zijn al enkele standaardsneltoetsen toegewezen, maar je kunt ook je eigen sneltoetsen maken."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Vind je het leuk om de mediaknoppen te hebben, maar wil je toch toegang houden tot F1, F2 enz.? Je kunt ze als standaard functietoetsen omschakelen door op <strong>Esc+Fn</strong> te drukken. Dit werkt als een schakelaar: je hoeft niet elke keer de Fn-toets ingedrukt te houden."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Een nieuwe Crown-ervaring
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Onze missie met Craft was <strong>om je creatieve workflow te stroomlijnen.</strong> De Crown was onze eerste stap om je direct toegang te geven tot essentiële tools met tikken, drukken en draaien. We hebben voortgebouwd op deze visie om <strong>de mogelijkheden van Craft en de Crown uit te breiden</strong>."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Perfectie op het puntje van je cursor
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Wanneer je op de<strong> Crown drukt</strong>, activeer je nu <strong>Actions Ring</strong>, een aanpasbare overlay op het scherm die je directe toegang geeft tot tools, filters, aanpassingen, invoegtoepassingen en meer, rechtstreeks op de Ring, precies wanneer je ze nodig hebt."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Acties starten
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Zodra Actions Ring is geopend, gebruik je de cursor om <strong>de actie te selecteren die je wilt</strong> uitvoeren en klik je erop."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Aanpassingen aanbrengen
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Voor snelle aanpassingen plaats je <strong>de muisaanwijzer op de actie en draai je aan de Crown</strong> om de actie aan te passen. Je kunt de actie ook aanpassen door met je cursor op de actie <strong>te klikken en naar links of rechts te slepen</strong>."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Past zich aan je apps aan
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>past zich aan de toepassingen die je gebruikt aan en</strong> wijzigt automatisch de functies van het apparaat voor efficiëntie. Je kunt de standaardtoepassingsprofielen gebruiken of je eigen profielen maken om je workflow te stroomlijnen."
