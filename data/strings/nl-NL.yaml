EULA_ARBITRATION: "Elk geschil dat ontstaat tussen u en Logitech zal door definitieve en bindende arbitrage worden beslecht volgens de regels voor arbitrage in consumentenzaken ('Regels') van de American Arbitration Association, zij het dat enig geschil dat anders onder de bevoegdheid van een kantongerecht zou vallen, naar keuze van een van de partijen voor een kantonrechter van een bevoegd gerecht kan worden gebracht, voorafgaand aan benoeming van de arbiter.  Het arbitrageproces zal worden uitgevoerd door één arbiter die door de partijen in onderling overleg is gekozen of volgens de selectieprocedure uiteengezet in de Regels.  De kosten van de arbitrage zullen worden verdeeld tussen de partijen zoals uiteengezet in de Regels. De arbitragebeslissing is definitief en bindend voor de partijen en hiertegen kan geen beroep worden aangetekend. OM HET VERLIES VAN BEWIJSMATERIAAL TEGEN TE GAAN EN TIJDIGE AFHANDELING TE VERZEKEREN VAN CLAIMS DIE UIT DEZE OVEREENKOMST VOORTVLOEIEN, DIENT ELKE PARTIJ DIE ONDER DEZE GEBRUIKSRECHTOVEREENKOMST EEN CLAIM INSTELT DE ANDERE PARTIJ BINNEN EEN (1) JAAR SCHRIFTELIJK OP DE HOOGTE TE STELLEN VAN DE REDEN VAN DE CLAIM, OF BINNEN DE MINIMAAL VEREISTE PERIODE VOLGENS DE WETGEVING ALS DEZE LANGER IS DAN EEN (1) JAAR, VANAF DE DATUM VAN DE GEBEURTENIS OF FEITEN DIE TOT DE CLAIM HEBBEN GELEID. INDIEN GEEN SCHRIFTELIJKE KENNISGEVING WORDT GEGEVEN, ZIET DEZE PARTIJ AF VAN HET RECHT EEN CLAIM IN TE DIENEN OP BASIS VAN DEZE GEBEURTENIS OF FEITEN."
