EULA_PRODUCT_LIMITATIONS: "DE SOFTWARE IS NIET BEDOELD VOOR GEBRUIK BIJ DE BEDIENING VAN NUCLEAIRE FACILITEITEN, NAVIGATIE- OF COMMUNICATIESYSTEMEN VOOR VLIEGTUIGEN, SYSTEMEN VOOR LUCHTVERKEERSCONTROLE, MEDISCHE APPARATEN OF ANDERE APPARATUUR WAARBIJ HET FALEN VAN DE SOFTWARE TOT DE DOOD, PERSOONLIJK LETSEL OF ERNSTIGE FYSIEKE OF OMGEVINGSSCHADE ZOU KUNNEN LEIDEN.  U ERKENT DAT DE SOFTWARE NIET GECERTIFICEERD IS VOOR GEBRUIK IN NOODGEVALLEN EN NIET VOOR DERGELIJKE DOELEINDEN MAG WORDEN GEBRUIKT.  LOGITECH HOUDT GEEN TOEZICHT OP NOODMELDINGEN, EN IS ER NIET VERANTWOORDELIJK VOOR OM HULPDIENSTEN NAAR UW HUIS TE STUREN."
EULA_US_GOVERNMENT_END_USERS: 'De Software is een ''Commercieel item'', zoals gedefinieerd in 48 C.F.R. 2.101, en bestaat uit ''Commercial Computer Software'' en ''Commercial Computer Software Documentation'' en wordt aan eindgebruikers van de Amerikaanse overheid in licentie gegeven (a) uitsluitend als ''Commercieel item'' en (b) uitsluitend met dezelfde rechten die worden verleend aan alle andere eindgebruikers conform de voorwaarden en bepalingen van deze Gebruiksrechtovereenkomst. Ongepubliceerde rechten voorbehouden krachtens de auteurswetgeving van de Verenigde Staten.'
