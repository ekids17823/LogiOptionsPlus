EULA_TEXT_1: "{openingTag}CE CONTRAT DE LICENCE UTILISATEUR FINAL (\"CLUF\") EST UN CONTRAT DE LICENCE UTILISATEUR FINAL ENTRE VOUS ET LOGITECH EUROPE S.A. (\"Logitech\"). VEUILLEZ LIRE ATTENTIVEMENT CE CONTRAT AVANT D'INSTALLER LE LOGICIEL OU D'UTILISER VOTRE PRODUIT LOGITECH. EN INSTALLANT LE LOGICIEL OU EN UTILISANT VOTRE PRODUIT LOGITECH, VOUS VOUS ENGAGEZ À RESPECTER LES CONDITIONS DE CE CLUF. SI VOUS N'APPROUVEZ PAS LES CONDITIONS DU PRÉSENT CLUF, VOUS AUREZ LA POSSIBILITÉ DE RETOURNER LE PRODUIT POUR REMBOURSEMENT, SOUS RÉSERVE QUE LES TERMES ET CONDITIONS DE LA POLITIQUE DE RENVOIS DE VOTRE POINT D'ACHAT SOIENT RESPECTÉS.{closingTag}{openingTag}SI VOUS N'AVEZ PAS L'ÂGE MINIMUM LÉGAL DANS VOTRE PAYS OU VOTRE RÉGION DE RÉSIDENCE, VOUS DEVEZ INFORMER VOS PARENTS OU TUTEURS LÉGAUX POUR LIRE ET ACCEPTER LES CONDITIONS DE CE CLUF.{closingTag}{openingTag} SI VOUS RÉSIDEZ AUX ÉTATS-UNIS (OU QUE LE PRINCIPAL SITE DE VOTRE SOCIÉTÉ SE TROUVE DANS CE PAYS) ET QUE VOUS UTILISEZ LE LOGICIEL OU LE PRODUIT UNIQUEMENT À TITRE PERSONNEL OU AU SEIN DE VOTRE FOYER, VEUILLEZ CONSULTER LA SECTION 17 CI-DESSOUS : LA RÉSOLUTION DES DIFFÉRENDS SERA ASSUJETTIE AUX RÈGLES D'ARBITRAGE DE L'ASSOCIATION AMÉRICAINE D'ARBITRAGE DE PROTECTION DU CONSOMMATEUR (CONSUMER ARBITRATION RULES).{closingTag}{openingTag} COMME DÉCRIT DANS LA SECTION 4, VOUS ACCEPTEZ LES MISES À JOUR AUTOMATIQUES DU LOGICIEL. SI VOUS NE LES ACCEPTEZ PAS, VOUS NE DEVEZ PAS UTILISER CE PRODUIT NI INSTALLER LE LOGICIEL. {closingTag}{openingTag} LA SECTION RELATIVE AUX RESTRICTIONS DU PRODUIT CI-DESSOUS SPÉCIFIE LES RESTRICTIONS IMPORTANTES DU LOGICIEL ET DES SERVICES ASSOCIÉS CONCERNANT LA SÉCURITÉ ET LES UTILISATIONS CRITIQUES. VEUILLEZ LIRE ATTENTIVEMENT CETTE SECTION, ELLE CONTIENT LES CONDITIONS QUE VOUS RECONNAISSEZ ET ACCEPTEZ. {closingTag}{openingTag} \"Logiciel\" désigne : (i) tous les programmes ou applications logiciels, y compris les applications logicielles téléchargées et installées sur un ordinateur de bureau ou un appareil mobile ; (ii) tous les logiciels sous forme de logiciels intégrés à un produit Logitech ; (iii) toutes les documentations, versions modifiées, mises à niveau ou améliorations d'un tel logiciel (sauf indication contraire expresse dans d'autres conditions au moment de la mise à niveau ou du téléchargement), toutes les versions ultérieures et copies d'un tel logiciel.{closingTag}{openingTag} Ces conditions vous donnent des droits spécifiques et vous pouvez obtenir d'autres droits, susceptibles de varier en fonction de la juridiction.{closingTag}"
EULA_LICENSE: "Conformément aux termes et conditions du présent CLUF, Logitech vous accorde une licence limitée non exclusive d'utilisation du Logiciel uniquement avec le produit Logitech acheté ou le service Logitech utilisé. À l'exception des logiciels intégrés à un produit Logitech, le Logiciel peut être copié uniquement à des fins de sauvegarde ou d'archive pour compléter votre utilisation du Logiciel, conformément aux présentes, et pour être mis à disposition sur le serveur d'un réseau interne domestique ou d'entreprise pour le téléchargement sur des dispositifs en votre possession ou sous votre contrôle dans votre foyer ou entreprise ; mais uniquement pour votre utilisation du Logiciel selon les conditions des présentes. Toutes les copies doivent inclure tous les avis de copyright et autres propriétés contenus dans le Logiciel d'origine, pour posséder ou contrôler le Logiciel intégré ou avec le service Logitech que vous utilisez. Vous pouvez transférer le Logiciel de façon définitive à une autre personne en cas de transfert définitif du produit Logitech utilisant le Logiciel, tant que la personne accepte d'être liée par ce CLUF et, après ledit transfert, vous devez arrêter d'utiliser le produit et le Logiciel."
EULA_RESTRICTIONS: "Vous n'êtes pas autorisé à (et vous n'autoriserez personne à) : (A) octroyer sous licence, vendre, louer, mettre en location, transférer (sauf indication expresse dans la Section 1), distribuer, héberger, externaliser, divulguer ou exploiter de toute autre façon commerciale le Logiciel ou mettre le Logiciel à la disposition d'un tiers ; (B) copier le Logiciel (sauf indication expresse dans la Section 1) ; (C) décompiler, démonter, analyser par rétro-ingénierie ou tenter d'extraire le code source, ou créer des œuvres dérivées ou un programme d'installation du Logiciel ou d'une partie du Logiciel (sauf autorisation expresse de la loi en vigueur) ; (D) supprimer ou altérer une marque, un logo, un copyright ou tout autre avis propriétaire, une légende, un symbole ou une étiquette du Logiciel."
EULA_OWNERSHIP: "Logitech et ses donneurs de licence détiennent et conservent tous les droits, titres et intérêts dans et liés au Logiciel et tous les copyrights et autres droits de propriété intellectuelle à cet égard. Le Logiciel vous est octroyé sous licence, et non vendu, par Logitech et Logitech conserve tous les droits qui ne vous sont pas expressément accordés."
EULA_AUTOMATIC_SOFTWARE_UPDATES: "Logitech peut parfois apporter des correctifs de bug, des mises à jour, des mises à niveau et d'autres modifications au Logiciel (\"Mises à jour\"). L'installation de ces Mises à jour s'effectue automatiquement et ne s'accompagne pas nécessairement d'une autre notification particulière ou d'une autorisation supplémentaire. Vous autorisez ces mises à jour automatiques. Si vous ne souhaitez pas de telles mises à jour, nous vous conseillons d'arrêt d'utiliser le Produit. Les termes du présent CLUF régissent toutes les mises à jour du Logiciel fournies par Logitech pour remplacer et/ou compléter le Logiciel d'origine, à moins que de telles mises à jour ne soient accompagnées d'une licence distincte, auquel cas les termes de cette licence s'appliquent."
EULA_APPLICATION_STORE: "Si vous avez téléchargé le Logiciel sur un marché ou une boutique d'applications, comme l'Apple App Store, l'Apple Mac Store ou Google Play (\"App Store\"), vous êtes également soumis aux conditions d'utilisation dudit App Store. Si votre utilisation du Logiciel est soumise aux conditions d'utilisation d'un App Store, en cas de conflit ou d'ambiguïté entre les conditions d'utilisation de l'App Store et le présent CLUF, les conditions d'utilisation de l'App Store prévaudront, mais uniquement dans la mesure du nécessaire pour résoudre un tel conflit ou ambigüité, et les conditions du présent CLUF resteront pleinement applicables. Vous reconnaissez que (i) le présent CLUF est conclu entre Logitech et Vous, non avec l'App Store ; (ii) l'App Store n'a aucune obligation de fournir un support ou une maintenance de quelle sorte que ce soit en relation avec tout Logiciel y étant téléchargé ; (iii) Logitech, et non l'App Store, est responsable comme indiqué par le présent CLUF, sauf dans la mesure où cela est exclue, de toute garantie produit, toute réclamation produit et toute réclamation de propriété intellectuelle pour le Logiciel téléchargé depuis tout App Store. Dans tous les cas, la responsabilité maximale de l'App Store pour toute garantie sera le remboursement du prix d'achat (le cas échéant) du Logiciel ; (iv) Apple et ses concédants sont des bénéficiaires tiers du présent CLUF pour le Logiciel téléchargé depuis l'Apple App Store et le Mac Store."
EULA_PRIVACY: "Nos pratiques en matière de confidentialité sont décrites dans notre {link}, mais aussi dans des déclarations de confidentialité distinctes (collectivement dénommées \"Politique de confidentialité\") fournies lors de l'achat, du téléchargement ou de l'utilisation d'un logiciel, d'une application ou d'un service. L'installation du Logiciel, l'utilisation de produits Logitech ainsi que la communication d'informations personnelles valent approbation des pratiques, termes et conditions décrits dans la Politique de confidentialité et toute déclaration de confidentialité séparée. Notre Politique de confidentialité est intégrée au présent CLUF à titre indicatif."
EULA_OPEN_SOURCE: "Le présent CLUF ne s'applique à aucun logiciel Open Source pouvant être inclus dans le Logiciel (\"Composants Open Source\"). Les Composants Open Source applicables au Logiciel, ainsi que les licences afférentes applicables, peuvent être répertoriés sur le site : {link}. Votre utilisation de chaque Composant Open Source est soumise aux conditions de chaque licence utilisateur final applicable accompagnant ledit Composant Open Source. Vous devez respecter les termes de chaque licence applicable, ou cesser d'utiliser le Logiciel. Le présent CLUF ne limite en rien les droits dont vous disposez en vertu des termes et conditions de toute licence d'utilisateur final en vigueur pour ces Composants Open Source, ni ne vous octroie de droits qui remplaceraient ces dernières."
EULA_THIRD_PARTY_SOFTWARE: "Le Logiciel et le Produit peuvent être utilisés en lien avec d'autres produits et logiciels et peuvent contenir des liens ou des interfaces redirigeant vers des logiciels tiers, ainsi que du contenu et des données associés (\"Logiciels tiers\"). L'utilisation de tels Logiciels tiers est régie par les conditions fournies par le concédant de tels Logiciels tiers, y compris la politique de confidentialité du tiers. En accédant à ou en utilisant des Logiciels tiers, vous vous engagez à respecter les conditions tierces applicables. Logitech ne fournit aucune représentation ou garantie concernant le fonctionnement ou la disponibilité des Logiciels tiers susmentionnés. Logitech et ses concédants de licence ne sauraient être tenus pour responsables de toute indisponibilité ou suppression des Logiciels tiers."
EULA_TERMINATION: "Le présent CLUF restera en vigueur jusqu'à sa résiliation. Chacune des parties peut résilier le présent CLUF pour une raison quelconque, à tout moment. Vous perdrez automatiquement vos droits d'utilisation du Logiciel, et ce, sans préavis de la part de Logitech, en cas de non-respect des termes du présent CLUF. Vous devrez cesser toute utilisation du Logiciel dès la résiliation du présent accord et devrez également supprimer toutes les copies du Logiciel que vous possédez ou contrôlez. Les dispositions des sections 6, 7, 8, 9, 10, 11, 12, 16, 17 et 18 resteront en vigueur après ladite résiliation. Logitech ne fournit aucune représentation concernant la disponibilité du Logiciel ou des Mises à jour et ne saura être tenu responsable en cas d'indisponibilité ou de retrait du Logiciel ou des Mises à jour. Logitech n'est en aucun cas tenu d'assurer des services de maintenance et d'assistance par rapport au Logiciel."
EULA_WARRANTY_DISCLAIMER: 'LE LOGICIEL ET LES SERVICES DE LOGITECH SONT FOURNIS "EN L''ÉTAT", AVEC OU SANS DÉFAUT ET SANS AUCUNE GARANTIE, CONFORMÉMENT AUX CONDITIONS PRÉVUES PAR LA LOI EN VIGUEUR. VOUS ACCEPTEZ EXPRESSÉMENT, DANS LES LIMITES PRÉVUES PAR LA LOI EN VIGUEUR, D''ASSUMER TOUS LES RISQUES LIÉS À VOTRE UTILISATION DU LOGICIEL ET DES SERVICES LOGITECH AINSI QU''À LA QUALITÉ, AUX PERFORMANCES ET À LA FIABILITÉ DU PRODUIT. LOGITECH DÉCLINE PAR LE PRÉSENT ACCORD TOUTES LES GARANTIES ET CONDITIONS RELATIVES AU LOGICIEL ET AUX SERVICES DE LOGITECH, DE NATURE EXPRESSE, IMPLICITE OU STATUTAIRE, Y COMPRIS SANS QUE CETTE ÉNUMERATION SOIT LIMITATIVE, TOUTE GARANTIE IMPLICITE DU CARACTÈRE ADÉQUAT POUR LA COMMERCIALISATION OU UN USAGE PARTICULIER, AINSI QUE LES GARANTIES DE SATISFACTION, DE FIABILITÉ, DE FONCTIONNEMENT PARFAIT ET DE NON-VIOLATION DE DROITS DE TIERS. LOGITECH N''OFFRE AUCUNE GARANTIE CONCERNANT LE FONCTIONNEMENT SANS FAILLE DU LOGICIEL ET DES SERVICES LOGITECH FOURNIS, LA CONFORMITÉ DES FONCTIONS INCLUSES DANS LE LOGICIEL OU L’ADÉQUATION DES SERVICES DE LOGITECH A VOS EXIGENCES, OU ENCORE LE FONCTIONNEMENT ININTERROMPU ET SANS ERREUR DU LOGICIEL OU DES SERVICES DE LOGITECH ET LA RÉSOLUTION DES ÉVENTUELS PROBLÈMES RENCONTRÉS LORS DE L''UTILISATION DU LOGICIEL ET DES SERVICES DE LOGITECH. AUCUN DISTRIBUTEUR, AGENT OU EMPLOYÉ DE LOGITECH N''EST AUTORISÉ À EFFECTUER DES MODIFICATIONS, DES EXTENSIONS OU DES AJOUTS DANS CETTE EXCLUSION DE GARANTIE.'
