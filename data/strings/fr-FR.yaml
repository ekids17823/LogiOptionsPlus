##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "La rangée supérieure de votre clavier Craft dispose déjà de quelques raccourcis par défaut, mais vous pouvez également créer les vôtres."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Vous aimez les commandes multimédia mais vous voulez toujours avoir accès aux touches F1, F2, etc. ? Vous pouvez passer de l’utilisation de ces touches aux touches de fonction standard en appuyant sur <strong>Échap+Fn.</strong> Cela fonctionne comme un interrupteur : il n’est pas nécessaire de maintenir la touche Fn enfoncée à chaque fois."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Une nouvelle expérience avec la molette
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Avec Craft, notre mission était de <strong>simplifier votre flux de travail créatif</strong>. La molette a été notre premier pas pour vous offrir un accès instantané aux outils essentiels par simple tapotement, pression ou rotation. Nous avons développé cette vision pour<strong>étendre les capacités</strong> de Craft et de la molette, et nous sommes impatients de vous montrer comment cela fonctionne."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Maîtrise au bout de votre curseur
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Lorsque vous <strong>appuyez sur la molette</strong>, vous déclenchez désormais <strong>Actions Ring</strong>, une superposition plein écran personnalisable qui vous donne un accès direct aux outils, filtres, réglages, plugins et bien plus encore, directement sur le Ring, exactement quand vous en avez besoin."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Lancer des actions
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Une fois Actions Ring ouvert, utilisez le curseur pour <strong>sélectionner l’action</strong> à exécuter et cliquez dessus."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Effectuer des ajustements
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Pour des réglages rapides, il suffit de <strong>survoler l’action et de tourner la molette</strong> pour l’ajuster. Vous pouvez également régler l’action en <strong>cliquant sur l’action et en la faisant glisser vers la gauche ou la droite </strong>avec votre curseur."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: S’adapte à vos applications
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>s’adapte aux applications que vous utilisez</strong> et modifie automatiquement les fonctions du dispositif pour plus d’efficacité. Vous pouvez utiliser les profils d’application par défaut ou créer les vôtres pour rationaliser votre flux de travail."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Appuyez sur le bouton ci-dessous pour découvrir les nouveautés de votre clavier Craft depuis la mise à niveau vers Options+.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Tout ce dont vous avez besoin pour travailler, où que vous soyez."
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "{DEVICE_NAME} est conçu pour favoriser une meilleure productivité et une meilleure posture, quel que soit l'endroit où vous passez votre journée de travail."
ONBOARD_SET_UP_EMOJI_KEY: Touche Émoji
ONBOARD_SET_UP_EMOJI_DESCRIPTION_V2: "Ajoutez instantanément une touche personnelle à vos messages avec la touche Émoji, votre raccourci vers le fun !"
ONBOARD_SET_UP_PRINT_SCREEN_TITLE: Print Screen
ONBOARD_SET_UP_PRINT_SCREEN_DESCRIPTION_V2: "Capturez rapidement l'intégralité de votre écran et enregistrez votre capture d'écran en appuyant sur la touche Print Screen."

