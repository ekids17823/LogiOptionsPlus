EULA_LIMITATION_OF_LIABILITY: "DANS LES LIMITES PRÉVUES PAR LA LOI EN VIGUEUR, EN AUCUN CAS LOGITECH OU SES CONCÉDANTS NE SAURAIENT ÊTRE TENUS RESPONSABLES À L'ÉGARD DES COÛTS D'APPROVISIONNEMENT EN PRODUITS, LOGICIELS OU SERVICES DE REMPLACEMENT, DU MANQUE À GAGNER, DE LA PERTE D'INFORMATIONS OU DE DONNÉES, OU DE TOUT AUTRE DOMMAGE PARTICULIER, INDIRECT, ACCESSOIRE OU SECONDAIRE DÉCOULANT DE QUELQUE FAÇON QUE CE SOIT DE LA VENTE, DE L'UTILISATION OU DE L'IMPOSSIBILITÉ D'UTILISER UN PRODUIT OU UN SERVICE LOGITECH, QUELLE QUE SOIT LA THÉORIE DE LA RESPONSABILITÉ (RESPONSABILITÉ CONTRACTUELLE, PRÉJUDICE OU AUTRE) ET CE MÊME SI LOGITECH A ÉTÉ INFORMÉ DE L'ÉVENTUALITÉ DE TELS DOMMAGES. LA RESPONSABILITÉ DE LOGITECH ET DE SES CONCÉDANTS NE SAURAIT EN AUCUN CAS DÉPASSER LE MONTANT DÉBOURSÉ POUR L'ACQUISITION DES PRODUITS, LOGICIELS OU SERVICES LOGITECH MIS EN CAUSE. Les limitations susmentionnées s'appliquent même en cas d'échec du recours décrit précédemment. Certaines juridictions n'autorisent pas l'exclusion ou la limitation des dommages accessoires ou consécutifs ; il est donc possible que la limitation ou l'exclusion susmentionnée ne s'applique pas à votre cas. En outre, il est possible que les limitations susmentionnées ne s'appliquent pas en cas de blessures corporelles là où les juridictions n'autorisent pas de telles limitations."
EULA_PRODUCT_LIMITATIONS: "CE LOGICIEL N'EST PAS PRÉVU POUR ETRE UTILISÉ DANS LE CADRE D'INFRASTRUCTURES NUCLÉAIRES, DE SYSTÈMES DE NAVIGATION OU DE COMMUNICATION AÉRONAUTIQUE, DE SYSTÈMES DE CONTRÔLE DU TRAFIC AÉRIEN, D'APPAREILS MÉDICAUX OU D'AUTRES ÉQUIPEMENTS POUR LESQUELS L'INCAPACITÉ DU LOGICIEL À PRODUIRE LE RÉSULTAT ESCOMPTÉ POURRAIT ENTRAÎNER LA MORT, DES BLESSURES OU D'AUTRES GRAVES DÉGÂTS PHYSIQUES OU ENVIRONNEMENTAUX. VOUS RECONNAISSEZ QUE LE LOGICIEL N'EST PAS CERTIFIÉ POUR DES CAS D'URGENCE ET NE DOIT PAS ÊTRE UTILISÉ À CETTE FIN. LOGITECH N'ENVOIE PAS DE NOTIFICATIONS D'URGENCE ET N'EST PAS TENU DE VOUS PROPOSER DES SERVICES D'URGENCE CHEZ VOUS."
EULA_US_GOVERNMENT_END_USERS: 'Le logiciel est un "Objet commercial", tel que défini dans l’article 48 du CFR 2.101, composé d’un "Logiciel informatique commercial" et de la "Documentation du logiciel informatique commercial", et concédé sous licence aux utilisateurs finaux du gouvernement des États-Unis (a) seulement sous forme d’Objets commerciaux, et (b) uniquement assortis des droits qui sont concédés à tous les utilisateurs finaux, conformément aux conditions générales du présent CLUF. Droits non publiés réservés conformément aux lois de copyright des États-Unis.'
EULA_EXPORT_LAW_ASSURANCES: "Vous acceptez de ne pas exporter ou réexporter le Logiciel en enfreignant les lois ou réglementations applicables, y compris et sans que cette énumération soit limitative, les lois des États-Unis d'Amérique, de l'Union européenne, de la Suisse et/ou les lois ou réglementations des juridictions dans lesquelles le Logiciel a été obtenu."
EULA_AGENTS: "Si vous faites l'acquisition du Logiciel pour le compte d'une autre personne physique ou morale, vous affirmez et garantissez que vous détenez l'autorité qui lie la personne physique ou morale pour laquelle vous avez acheté le Logiciel selon les termes et conditions du présent CLUF. Vous certifiez avoir l'âge légal exigé par votre juridiction pour utiliser ou accéder à ce logiciel et pour signer le présent CLUF."
EULA_CONTROLLING_LAW_1: "Si vous vous trouvez aux États-Unis, le présent CLUF est régi exclusivement par et doit être interprété conformément aux lois des États-Unis et de l’État de Californie, quelle que soit la nature ou l’application des dispositions ou principes légaux choisis. Si vous vous trouvez hors des États-Unis, le présent CLUF est régi exclusivement par les lois de la Suisse. Si une clause de ce CLUF s'avère être non valide, les parties acceptent néanmoins que leurs intentions, telles que définies dans la clause en question et le reste du présent CLUF, resteront en vigueur."
EULA_CONTROLLING_LAW_2: "Si vous résidez aux États-Unis et que vous utilisez le logiciel ou le produit uniquement à titre personnel ou au sein de votre foyer, la section 17 s'applique à votre cas :"
EULA_ARBITRATION: "Tout litige survenant entre vous et Logitech sera résolu par le biais d'un arbitrage définitif et obligatoire mené selon les règles d'arbitrage de l'association américaine d'arbitrage de protection du consommateur (Consumer Arbitration Rules) dénommées \"Règles\", sauf en cas de litige relevant de la juridiction d'une cour des petites créances (small claims court) et qui, sur décision d'une des parties, sera présenté à une cour des petites créances de la juridiction compétente avant la désignation de l'arbitre. L'arbitrage sera effectué par un arbitre unique sélectionné d'un commun accord par les parties ou selon la procédure de sélection expressément établie par les Règles. Les coûts d'arbitrage seront répartis entre les parties tel qu'expressément établi dans les Règles. La compensation déterminée par l'arbitre sera définitive et obligatoire, sans possibilité d'appel de la part des parties. AFIN D'ÉVITER LA PERTE DE PREUVES ET DE GARANTIR UNE RÉSOLUTION RAPIDE DES RÉCLAMATIONS RÉSULTANT DU PRÉSENT CONTRAT, UNE PARTIE PRÉSENTANT UNE RÉCLAMATION SELON LE PRÉSENT CLUF DOIT ENVOYER À L'AUTRE PARTIE UNE NOTIFICATION ÉCRITE JUSTIFIANT SA RÉCLAMATION DANS UN DÉLAI D'UN (1) AN, OU DANS LE DÉLAI MINIMAL REQUIS PAR LES LOIS APPLICABLES SI CE DÉLAI EST SUPÉRIEUR À UN (1) AN, À PARTIR DE LA DATE DE SURVENANCE DE L'ÉVÉNEMENT OU DES FAITS AYANT DONNÉ LIEU À LA RÉCLAMATION. DANS LE CAS CONTRAIRE, CETTE PARTIE RENONCE À PRÉSENTER UNE RÉCLAMATION BASÉE SUR CET ÉVÈNEMENT OU CES FAITS."
EULA_ENTIRE_AGREEMENT: "Le présent contrat constitue le contrat entier entre vous et Logitech et remplace tous les contrats précédents, écrits ou oraux, relatifs au Logiciel. Toute traduction du présent CLUF répond à des exigences locales, et en cas d'incohérence entre la version anglaise et sa traduction, la version anglaise de ce CLUF sera retenue."

