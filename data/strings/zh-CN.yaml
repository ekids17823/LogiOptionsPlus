# Legacy Options
ENABLE_OPTIONS_MODE_TITLE: 是否确定启用传统 Options 模式？
ENABLE_OPTIONS_MODE_DESCRIPTION: "这会将 Craft 键盘切换回旧版罗技 Options 应用程序。尽管您可以继续使用罗技 Options，<strong>但我们不会对其进行任何进一步的更新</strong>。"
ENABLE_OPTIONS_MODE_DESCRIPTION1: "此外，您也将<strong>无法使用</strong> Actions Ring 和改进的多功能旋钮体验，以及无法使用 Smart Actions、Marketplace 和 AI Prompt Builder（仅在 Logi Options+ 中提供）等其他功能。"
