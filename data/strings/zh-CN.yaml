ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Craft 的使命是<strong>简化创意工作流程</strong>。多功能旋钮是我们的首次尝试，让您通过轻击、按下和旋转即时访问基本工具。基于这一愿景，我们已扩展 Craft 和多功能旋钮的<strong>功能</strong>，并且很高兴向您展示其工作原理。"
