ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>可适应您正在使用的应用程序</strong>，自动切换设备的功能，以便提高效率。您可以使用默认的应用程序配置文件，也可以创建自己的应用程序配置文件，以简化工作流程。"
