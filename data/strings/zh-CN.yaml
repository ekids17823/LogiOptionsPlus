SWITCH_APPLICATION_MODAL_TITLE: 传统 Options 模式
SWITCH_APPLICATION_MODAL_DESCRIPTION: 传统 Options 模式下，您可以继续在过时的罗技 Options 应用程序中使用 Craft 键盘，但也将无法使用 Actions Ring 和改进的多功能旋钮体验，以及无法使用 Smart Actions、Marketplace 和 AI Prompt Builder（仅在 Logi Options+ 中提供）等其他功能。
SWITCH_APPLICATION_MODAL_NOTE: 可以随时切换回 Logi Options+。
