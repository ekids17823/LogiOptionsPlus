SHUTTER_SPEED_TOOLTIP: 快门速度会影响曝光和运动模糊。较慢的快门速度会使画面更亮，但会增加运动模糊。更快的快门会更清晰，但画面更暗。对运动模糊效果满意后，使用 ISO 控制进一步调节亮度。
