TINT: 色调
WHITE_BALANCE_TEMPERATURE_COMPENSATION_TOOLTIP_INFO: 色温补偿让您可以修改自动白平衡设置的色温。
COLOR_TEMPERATURE_TOOLTIP_INFO: 色温让您可以手动调节色彩平衡，使图像更暖或更冷，以适应不同的照明条件。
TINT_TOOLTIP_INFO: 色调让您可以手动调节视频中的绿色和洋红色。
VIBRANCE_TOOLTIP_INFO: “鲜艳度”让您可以调节颜色的强度，类似于饱和度，但调节的方式更加微妙，特别针对场景中较为柔和的色彩。
BRIGHTNESS_TOOLTIP_INFO: 让您可以在传感器捕获图像后进一步调节其整体亮度。如果图像过暗，也可以考虑添加一个光源。
CONTRAST_TOOLTIP_INFO: 对比度是图像中明暗区域之间的变化。
SATURATION_TOOLTIP_INFO: 饱和度让您可以调节颜色的强度。将“饱和度”设置为 0，即可获得黑白图像。
SHARPNESS_TOOLTIP_INFO: 清晰度让您可以在更柔和的图像与边缘更清晰的图像之间进行调整。提高清晰度也会增加图像中的噪点。
