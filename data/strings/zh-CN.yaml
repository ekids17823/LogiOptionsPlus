ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "<strong>按下多功能旋钮</strong>，即可触发 <strong>Actions Ring</strong>，这是可自定义的屏幕叠加层，需要时可直接在 Ring 上使用工具、滤镜、调节、插件等。"
