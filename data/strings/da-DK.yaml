EULA_PRODUCT_LIMITATIONS: "SOFTWAREN ER IKKE BEREGNET TIL BRUG I FORBINDELSE MED DRIFTEN AF KERNEKRAFTVÆRKER, FLYNAVIGATION, KOMMUNIKATIONSSYSTEMER, SYSTEMER TIL KONTROL AF FLYTRAFIK, MEDICINALUDSTYR ELLER ANDET UDSTYR HVOR EN FEJL I SOFTWAREN KAN MEDFØRE DØDSFALD, PERSONSKADE ELLER ALVORLIGE PERSON- ELLER MILJØSKADER.   DU ANERKENDER AT SOFTWAREN IKKE ER CERTIFICERET TIL NØDFORMÅL OG BØR IKKE BRUGES TIL DETTE FORMÅL.  LOGITECH OVERVÅGER IKKE MEDDELELSER OM NØDSITUATIONER OG ER IKKE ANSVARLIG FOR AT SENDE NØDTJENESTER TIL DIT HJEM."
