EULA_LICENSE: "I henhold til betingelserne i denne slutbrugerlicensaftale giver Logitech dig en ikke-eksklusiv tilladelse til at bruge Softwaren udelukkende sammen med det Logitech-produkt du har købt, eller den Logitech-tjeneste du bruger. Bortset fra indlejret software i et Logitech-produkt må softwaren kun kopieres til backup- og arkiveringsformål for at understøtte din brug af softwaren som tilladt herunder og for at gøre den tilgængelig internt i husstanden eller på et internt virksomhedsnetværk og kun til download på enheder, som du ejer eller styrer, indenfor din husstand eller virksomhed, men kun til brug af softwaren som det er angivet heri. Eventuelle kopier skal inkludere alle de meddelelser om copyright og anden ophavsret som findes i originalen.  Til besiddelse af eller kontrol med indlejret software eller med den Logitech-tjeneste, du bruger. Du kan permanent videregive softwaren til en anden person ved permanent at videregive det Logitech-produkt der bruger softwaren, så længe den person indvilger i at være underlagt denne slutbrugerlicensaftale, og at du ved denne videregivelse stopper med at bruge produktet og softwaren."
EULA_RESTRICTIONS: "Du har ikke tilladelse til (og må ikke give andre tilladelse til) at: (A) licensere, sælge, leje, lease eller videregive (undtaget som udtrykkeligt tilladt i afsnit 1), distribuere, hoste, outsource, offentliggøre eller på anden måde kommercielt udnytte softwaren eller gøre softwaren tilgængelig for nogen tredjepart; (B) kopiere softwaren (undtaget som udtrykkeligt tilladt i afsnit 1); (C) dekompilere, adskille, foretage reverse engineering af eller forsøge at aflede kildekoden på eller skabe afledte versioner af eller et installationsprogram for softwaren eller nogen del af den (undtagen som udtrykkeligt tilladt i henhold til gældende lovgivning), (D) fjerne eller ændre varemærker, logoer, copyright eller andre meddelelser om ophavsret, signaturforklaringer, symboler eller mærkater på softwaren."
