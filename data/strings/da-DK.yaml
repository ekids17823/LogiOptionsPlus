##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Der er allerede blevet tildelt nogle standardgenveje til den øverste række på dit Craft-tastatur, men du kan også oprette dine egne."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Synes du om at have medieknapperne, men vil du stadig have adgang til F1, F2 osv.? Du kan skifte mellem at bruge dem som standardfunktionstaster ved at trykke på <strong>Esc+Fn.</strong> Den fungerer som en til/fra-kontakt – du behøver ikke at holde Fn-tasten nede hver gang."
ONBOARD_CRAFT_BASED_ACTIONS_RING: En ny kroneoplevelse
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Vores mission med Craft var at <strong>strømline din kreative arbejdsgang</strong>. Kronen var det første skridt, der gav dig øjeblikkelig adgang til vigtige værktøjer med et tryk, klik og drej. Vi har bygget videre på denne vision for <strong>at udvide mulighederne</strong> med Craft og kronen, og vi glæder os til at vise dig, hvordan det fungerer."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Perfektion ved markørspidsen
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Når du <strong>trykker på kronen</strong>, aktiverer du nu <strong>Actions Ring,</strong> et overlay på skærmen, der kan tilpasses, og som giver dig direkte adgang til værktøjer, filtre, justeringer, plugins og mere direkte på ringen, præcis når du har brug for dem."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Start handlinger
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Når Actions Ring er åben, skal du bruge markøren til at <strong>vælge den handling</strong>, der skal udføres, og derefter klikke."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Foretag justeringer
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "<strong>Hold markøren over handlingen, og drej kronen</strong> for at foretage hurtige justeringer. Du kan også justere handlingen ved at <strong>klikke og trække til venstre eller højre</strong> på handlingen med markøren."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Tilpasser sig dine apps
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>tilpasser sig de programmer, du bruger</strong>, hvilket automatisk ændrer enhedens funktioner med henblik på at opnå større effektivitet. Du kan bruge standardprofilerne for programmer eller oprette dine egne for at strømline din arbejdsgang."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Tryk på knappen herunder for at se nyhederne til dit Craft-tastatur siden opgraderingen til Options+.
