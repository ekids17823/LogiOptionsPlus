EULA_ARBITRATION: "Enhver tvist mellem dig og Logitech skal løses via endegyldig og bindende mægling foretaget under reglerne fremsat i Consumer Arbitration Rules (\"Regler\") fra American Arbitration Association, med undtagelse af tvister som omhandler småsager. Disse kan, hvis en af parterne ønsker det, blive bragt til en domstol med den nødvendige jurisdiktion inden for småsager inden en mægler tilkaldes.  Mæglingen foretages af en enkelt mægler som enten er udpeget efter gensidig aftale mellem parterne eller som følge af den udvælgelsesproces der er beskrevet i reglerne.  Udgifterne ved mægling fordeles mellem parterne som beskrevet i reglerne. Mæglerens kendelse er endelig og bindende og kan ikke ankes af parterne.   FOR AT UNDGÅ BEVISTAB OG SIKRE HURTIG AFKLARING AF KRAV, DER OPSTÅR I HENHOLD TIL DENNE AFTALE, SKAL EN PART, DER STILLER ET HVILKET SOM HELST KRAV I HENHOLD TIL DENNE SLUTBRUGERLICENSAFTALE, GIVE DEN ANDEN PART SKRIFTLIG MEDDELELSE OM GRUNDLAGET FOR SIT KRAV INDEN FOR ET (1) ÅR ELLER INDEN FOR DEN MINIMUMSTID DER KRÆVES I HENHOLD TIL LOVGIVNINGEN HVIS DET ER MERE END ET (1) ÅR FRA DATOEN FOR HÆNDELSEN ELLER DE FAKTA, DER GIVER ANLEDNING TIL KRAVET, ELLERS GIVER DEN PÅGÆLDENDE DERVED AFKALD PÅ RETTEN TIL AT FORFØLGE ET KRAV BASERET PÅ EN SÅDAN HÆNDELSE ELLER SÅDANNE FAKTA."
