SATURATION_TOOLTIP_INFO: 飽和度讓您可以調整顏色的強度。將「飽和度」設定為 0 可獲得黑白影像。
SHARPNESS_TOOLTIP_INFO: 銳利度讓您可以在更柔和 (更平順) 和邊緣更清晰 (更銳利) 的影像之間，進行調整。增加銳利度也會增加影像中的噪點。
