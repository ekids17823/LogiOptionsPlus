ONBOARD_MICE_EASY_SWITCH_DESCRIPTION: "最多可將滑鼠與 3 台裝置配對，按一下 Easy-Switch™ 按鈕即可在這些裝置間輕鬆切換。一個 {DEVICE_NAME} 即可使用於您的筆記型電腦、桌上型電腦或平板電腦。"
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION_V2: "最多可將滑鼠與 3 台裝置配對，按一下 Easy-Switch™ 按鈕即可在這些裝置間輕鬆切換。一個 {DEVICE_NAME} 即可使用於您的筆記型電腦、桌上型電腦或平板電腦。"
ONBOARD_KEYS_K480_EASY_SWITCH_DESCRIPTION: "最多可將鍵盤與 3 台裝置配對，使用選擇器轉鈕即可在這些裝置間輕鬆切換。一個 {DEVICE_NAME} 即可使用於您的筆記型電腦、桌上型電腦或平板電腦。"
