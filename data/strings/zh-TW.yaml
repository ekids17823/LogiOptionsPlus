ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION: 點按聽寫鍵可對任何選取的文字欄位啟動語音轉文字功能。使用表情符號鍵快速存取表情符號。
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_SCREENSHOT: "嘗試使用聽寫按鈕在使用中的文字欄位啟動聽寫功能。您也可以使用表情符號按鍵，以快速存取表情符號。使用螢幕截圖鍵輕鬆擷取螢幕上的內容。"
