EULA_LICENSE: "Förutsatt att villkoren i det här licensavtalet för slutanvändare följs, beviljas du en begränsad, icke-exklusiv licens att använda Logitechs programvara, endast med Logitech-produkter som du har köpt eller Logitech-tjänster som du använder. Förutom inbäddad programvara i en Logitech-produkt, får programvaran bara kopieras i säkerhetskopierings- eller arkiveringssyfte, så att du kan använda programvaran enligt vad som tillåts härunder, och så att du kan tillgängliggöra programvaran på en intern hemma- eller företagsserver, enbart för nedladdning till enheter som tillhör dig eller som är under din kontroll inom hemmet eller företaget, men endast för din användning av programvaran enligt vad som anges häri. Alla kopior måste innehålla alla meddelanden om upphovsrätt och andra meddelanden om äganderätt som originalet innehåller.  För innehav eller kontroll av inbyggd programvara eller med den Logitech-tjänst som används av dig. Du får överlåta programvaran till en annan person permanent efter en permanent överlåtelse av Logitech-produkten som använder programvaran, under förutsättning att den personen samtycker till att vara bunden till detta licensavtal för slutanvändare och att du slutar använda produkten och programvaran efter sådan överlåtelse."
EULA_RESTRICTIONS: "Du får inte (och ska inte låta andra): (A) licensiera, sälja, hyra ut, leasa, överlåta (med undantag för vad som uttryckligen tillåts i avsnitt 1), distribuera, vara värd för, lägga ut, föra vidare eller på annat sätt kommersiellt utnyttja programvaran eller tillgängliggöra programvaran för någon tredje part; (B) kopiera programvaran (med undantag för vad som uttryckligen tillåts i avsnitt 1); (C) dekompilera, dela upp, bakåtkompilera eller försöka att härleda källkoden för, eller skapa härledda verk av eller ett installationsprogram för, programvaran eller någon del därav (med undantag för vad som uttryckligen tillåts av tillämplig lag); eller (D) ta bort eller ändra varumärken, logotyper, upphovsrättsmeddelanden eller andra meddelanden om äganderätt, förklaringar, symboler eller märken i programvaran."
EULA_OWNERSHIP: "Logitech och dess licensgivare äger och behåller alla rättigheter, titlar och intressen i och till programvaran samt all upphovsrätt och andra immateriella rättigheter däri.  Programvaran säljs inte, utan licensieras till dig av Logitech, och Logitech förbehåller sig alla rättigheter som inte uttryckligen tillerkänts dig. "
EULA_AUTOMATIC_SOFTWARE_UPDATES: "Logitech kan då och då tillhandahålla buggfixar, uppdateringar, uppgraderingar och andra ändringar av programvaran (\"uppdateringar\").  Dessa kan installeras automatiskt utan ytterligare varsel eller medgivande.  Du godkänner dessa automatiska uppdateringar.  Om du inte vill få sådana uppdateringar är lösningen att sluta använda produkten.  Villkoren i det här licensavtalet för slutanvändare gäller alla eventuella uppdateringar från Logitech som ersätter och/eller kompletterar den ursprungliga programvaran, såvida sådana uppdateringar inte åtföljs av en separat licens. Finns en separat licens gäller villkoren i den."
EULA_APPLICATION_STORE: "Om du har laddat ner programvaran från en appbutik, till exempel Apple App Store, Apple Mac Store eller Google Play (\"appbutik\"), omfattas du även av användningsvillkoren för den appbutiken. Om användningen av programvaran omfattas av en appbutiks användningsvillkor gäller appbutikens villkor i händelse av konflikter eller oklarheter mellan appbutikens användningsvillkor och detta licensavtal för slutanvändare, men endast i den utsträckning som krävs för att lösa sådana konflikter eller oklarheter. I övrigt förblir villkoren i detta licensavtal för slutanvändare giltiga och i kraft.  Du erkänner att (i) detta licensavtal för slutanvändare sluts mellan Logitech och dig, och inte med appbutiken; (ii) appbutiken inte har någon skyldighet att tillhandahålla något stöd eller någon form av underhåll alls i samband med någon programvara som hämtats därifrån; (iii) Logitech, inte appbutiken, är ansvarig enligt vad som anges i detta licensavtal för slutanvändare, utöver friskrivningar, för all produktgaranti, alla produktfordringar och fordringar för immaterialrätt för programvaran som hämtats från appbutiken. Under alla omständigheter är appbutikens maximala skyldighet för garantianspråk återbetalning av inköpskostnaden (om någon sådan fanns) för Programvaran; (iv) Apple och dess under dotterbolag är tredje part i detta licensavtal för slutanvändare för programvara som hämtats från Apples App Store och Mac Store."
EULA_PRIVACY: "Vår sekretesspraxis beskrivs i vår {link} liksom i produktens särskilda sekretessmeddelanden (sammantaget kallade ”Sekretesspolicy”) som tillhandahålls när en programvara, en app, en produkt eller en tjänst köps, laddas ner eller används. Genom att installera programvara, använda Logitechs produkter eller tillhandahålla din personliga information till oss godkänner du och samtycker du till vår praxis och våra villkor som anges Integritetspolicyn och i eventuella separata sekretessmeddelanden. Vår Integritetspolicy ingår som referens i detta licensavtal för slutanvändare."
EULA_OPEN_SOURCE: "Det här licensavtalet för slutanvändare gäller inte för någon programvara med öppen källkod som eventuellt inkluderas i programvaran (”komponenter med öppen källkod”).  Komponenter med öppen källkod som gäller programvaran och tillhörande tillämpliga licenser visas på: {link}. Användningen av komponenter med öppen källkod omfattas av villkoren i varje tillämplig licens för slutanvändare som åtföljer sådana komponenter med öppen källkod.  Du måste acceptera villkoren i alla sådana licenser eller avstå från att använda Programvaran. Ingenting i detta licensavtal för slutanvändare begränsar dina rättigheter enligt, eller ger dig rättigheter som ersätter, villkoren i någon typ av gällande licensavtal för slutanvändare av komponenter med öppen källkod."
