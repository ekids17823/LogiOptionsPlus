EULA_LIMITATION_OF_LIABILITY: "UNDER INGA SOM HELST OMSTÄNDIGHETER KAN LOGITECH ELLER DESS LICENSGIVARE HÅLLAS ANSVARIGA FÖR EVENTUELLA KOSTNADER FÖR ERSÄTTNINGSPRODUKTER, -PROGRAMVARA ELLER -TJÄNSTER, VINSTBORTFALL, FÖRLORAD INFORMATION ELLER DATA ELLER ANDRA INDIREKTA, TILLFÄLLIGA, OFÖRUTSEDDA ELLER SÄRSKILDA FÖLJDSKADOR SOM PÅ NÅGOT SÄTT KAN HÄRLEDAS TILL FÖRSÄLJNING, LICENSIERING, ANVÄNDNING ELLER FÖRHINDRAD ANVÄNDNING AV NÅGON AV LOGITECHS PRODUKTER ELLER TJÄNSTER OAVSETT HUR DE HAR UPPKOMMIT OCH OAVSETT SKADESTÅNDSTYP (AVTALSBROTT, KRÄNKNING ELLER ANNAT) ÄVEN OM LOGITECH HAR UNDERRÄTTATS OM RISKEN FÖR SÅDANA SKADOR.  LOGITECHS OCH DESS LICENSGIVARES TOTALA ERSÄTTNINGSSKYLDIGHET ÖVERSTIGER ALDRIG DET URSPRUNGLIGA BELOPP SOM ERLAGTS FÖR PRODUKTEN, PROGRAMVARAN ELLER TJÄNSTEN I FRÅGA.  De föregående begränsningarna gäller även om ovanstående ersättning inte uppnår sitt huvudsyfte. I vissa jurisdiktioner är det inte tillåtet att göra undantag för oförutsedda, tillfälliga eller speciella följdskador och det kan därför hända att ovanstående ansvarsbegränsning inte gäller. Ovanstående begränsningar gäller inte i händelse av personskada i den utsträckning gällande lagstiftning föreskriver skadestånd vid sådan skada."
EULA_PRODUCT_LIMITATIONS: "PROGRAMVARAN ÄR INTE AVSEDD ATT ANVÄNDAS FÖR DRIFT AV KÄRNKRAFTSANLÄGGNINGAR, FÖR FLYGPLANSNAVIGERING, FLYGKOMMUNIKATION ELLER FLYGLEDNING ELLER FÖR MEDICINSK ELLER ANNAN UTRUSTNING DÄR DET KAN MEDFÖRA LIVSFARA, ORSAKA PERSONSKADOR ELLER ALLVARLIGA MILJÖSKADOR OM PROGRAMVARAN INTE FUNGERAR KORREKT. DU BEKRÄFTAR ATT PROGRAMVARAN INTE ÄR CERTIFIERAD FÖR NÖDSITUATIONER OCH BÖR INTE ANVÄNDAS I DETTA SYFTE.  LOGITECH ÖVERVAKAR INTE NÖDMEDDELANDEN OCH ANSVARAR INTE FÖR ATT SKICKA RÄDDNINGSTJÄNST ELLER AMBULANS TILL DITT HEM."
EULA_US_GOVERNMENT_END_USERS: 'Programvaran är en ”kommersiell vara”, såsom termen definieras i 48 C.F.R. 2.101, bestående av ”Kommersiell datorprogramvara” och ”Dokumentation för kommersiell datorprogramvara”, och licensieras till slutanvändare på federala myndigheter i USA (a) endast som kommersiella varor och (b) med endast de rättigheter som beviljas alla andra slutanvändare enligt villkoren i detta licensavtal för slutanvändare. Rättigheter som inte meddelats lyder under upphovsrättslagarna i USA.'
