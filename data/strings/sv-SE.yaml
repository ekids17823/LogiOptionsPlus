EULA_TERMINATION: "Detta licensavtal för slutanvändare ska gälla till dess att det sägs upp.  Båda parter har rätt att när som helst säga upp detta licensavtal för slutanvändare, oavsett vilket skäl de anger.  Din rätt att använda programvaran upphör automatiskt utan förvarning från Logitech om du bryter mot något villkor i detta licensavtal för slutanvändare.  Vid sådan uppsägning måste du sluta använda programvaran och avlägsna alla kopior som du har i din ägo eller under din kontroll. Bestämmelserna i avsnitt 6, 7, 8, 9, 10, 11, 12, 16, 17 och 18 förblir i kraft efter sådan uppsägning. Logitech gör inga utfästelser om framtida tillgänglighet av programvaran eller några uppdateringar och ska inte hållas ansvariga om programvaran eller uppdateringar inte är tillgängliga eller tas bort.  Logitech har ingen skyldighet att tillhandahålla underhålls- eller supporttjänster med avseende på programvaran."
