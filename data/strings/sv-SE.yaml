EULA_ARBITRATION: "Eventuella tvister mellan dig och Logitech ska lösas genom en slutgiltig och bindande skiljedom i enlighet med American Arbitration Association och dess Consumer Arbitration Rules (\"regler\"), såvida inte någon form av tvist som annars skulle falla under småmålsförfarande kan på en av parternas begäran föras till en behörig domstol för småmål före utnämningen av skiljedomaren.  Skiljedomen ska utföras av en enda skiljedomare som utsetts gemensamt av båda parterna eller enligt urvalsprocessen som anges i reglerna.  Kostnaderna för skiljedomen ska fördelas mellan parterna såsom det anges i Reglerna. Skiljedomarens ersättning ska vara slutgiltig och bindande för parterna och ska inte kunna överklagas.  FÖR ATT UNDVIKA FÖRLUST AV BEVIS OCH GARANTERA SNABB LÖSNING AV ANSPRÅK SOM UPPSTÅR VID DETTA AVTAL, SKA DEN PART SOM GÖR ANSPRÅK ENLIGT DETTA LICENSAVTAL GE DEN ANDRA PARTEN SKRIFTLIGT VARSEL ANGÅENDE BASEN FÖR ANSPRÅKET INOM ETT (1) ÅR ELLER INOM DEN MINSTA TIDSRYMD SOM GÄLLER ENLIGT LAG OM LÄNGRE ÄN ETT (1) ÅR, FRÅN DATUMET DÅ HÄNDELSEN ELLER FAKTUMET SOM LEDDE TILL ATT ANSPRÅKET UPPSTOD, ELLER OM PARTEN AVSÄGER SIG RÄTTEN ATT GÅ VIDARE MED ANSPRÅKET SOM BASERAS PÅ SÅDAN HÄNDELSE ELLER FAKTA."
