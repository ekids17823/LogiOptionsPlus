##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Den översta raden på Craft-tangentbordet har redan tilldelats några standardgenvägar, men du kan också skapa dina egna."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Vill du till exempel ha mediekontroller men ändå ha tillgång till F1, F2 osv.? Du kan växla mellan att använda dem som standardfunktionsknappar genom att trycka på <strong>Esc+Fn.</strong> Detta fungerar som ett reglage, så du behöver inte hålla ner Fn-knappen varje gång."
ONBOARD_CRAFT_BASED_ACTIONS_RING: En ny kronupplevelse
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Vårt uppdrag med Craft var att <strong>effektivisera ditt kreativa arbetsflöde</strong>. Kronan var vårt första steg och gav dig omedelbar tillgång till viktiga verktyg med rörelserna tryck och vrid. Vi har byggt vidare på den här visionen för att <strong>utöka funktionerna</strong> i Craft och kronan och är glada över att visa hur det fungerar."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Kontroll via markören
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "När du <strong>trycker på kronan</strong> utlöser du nu <strong>Actions Ring,</strong> ett anpassningsbart skärmöverlägg som ger dig direktåtkomst till verktyg, filter, justeringar, plugin-program med mera direkt på ringen, precis när du behöver dem."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Startåtgärder
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: När Actions Ring är öppen använder du markören för att <strong>välja den åtgärd du vill</strong> utföra och klickar.
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Utför justeringar
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "För snabba justeringar håller du bara <strong>markören över åtgärden och vrider på kronan</strong>. Du kan också justera åtgärden genom att <strong>klicka och dra åt vänster eller höger</strong> på åtgärden med markören."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Anpassar sig efter dina appar
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>anpassar sig efter de program du använder </strong> och ändrar automatiskt enhetens funktioner för effektivitetens skull. Du kan använda standardprogramprofilerna eller skapa dina egna för att göra arbetsflödet smidigare."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: Tryck på knappen nedan för att se nyheterna för Craft-tangentbordet sedan uppgraderingen till Options+.
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Allt du behöver för arbete, var som helst."
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "{DEVICE_NAME} är utformat för att uppmuntra till ökad produktivitet och bättre hållning, oavsett var du arbetar."
ONBOARD_SET_UP_EMOJI_KEY: Emoji-knapp
ONBOARD_SET_UP_EMOJI_DESCRIPTION_V2: Lägg direkt en personlig touch till dina meddelanden med Emoji-knappen – din genväg till det roliga!
ONBOARD_SET_UP_PRINT_SCREEN_TITLE: Print Screen
ONBOARD_SET_UP_PRINT_SCREEN_DESCRIPTION_V2: Ta snabbt en skärmbild på hela skärmen och spara den att trycka på Print Screen-knappen.

