# MX-Vertical
ONBOARD_MX_VERTICAL_ERGO_BENEFITS_TITLE: Естественное положение кисти — как при рукопожатии
ONBOARD_MX_VERTICAL_ERGO_BENEFITS_DESCRIPTION: "При работе с мышью MX Vertical кисть находится в естественном положении — как при рукопожатии, потому нагрузка на мышцы снижается. Кроме того, благодаря такому положению руки пользователь может поддерживать здоровую осанку."
ONBOARD_MX_VERTICAL_SETUP_DPI_SWITCH_TITLE: Изменение скорости перемещения указателя
ONBOARD_MX_VERTICAL_SETUP_DPI_SWITCH_DESCRIPTION: "Меняйте скорость и точность позиционирования курсора, оптимизируя управление одним нажатием кнопки."
