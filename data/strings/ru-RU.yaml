#Living room Keyboards Onboard strings start
ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_TITLE: Управление при помощи жестов
ONBOARD_LIVING_ROOM_KB_GESTURE_CONTROL_DESCRIPTION: "Просмотр страниц в Интернете без лишних проблем с помощью сенсорной панели, оптимизированной для использования с большими экранами телевизоров. Двумя пальцами прокручивайте длинные веб-страницы вверх или вниз и изменяйте масштаб на ПК, подключенном к телевизору."
ONBOARD_LIVING_ROOM_KB_D_PAD_TITLE: Манипулятор D-pad
ONBOARD_LIVING_ROOM_KB_D_PAD_DESCRIPTION: D-pad для простой навигации в экранных меню и интерфейсах приложений в Smart TV. Манипулятор D-Pad может использоваться даже для управления проигрывателями мультимедиа в ваших любимых приложениях для трансляций.
ONBOARD_LIVING_ROOM_KB_K830_GESTURE_CONTROL_DESCRIPTION: Управление при помощи жестов распознает движение вашей руки и упрощает управление компьютером.
ONBOARD_SMART_BACKLIGHT_DESCRIPTION: "Датчик освещенности регулирует подсветку для экономии заряда при достаточном естественном освещении. Чтобы настроить подсветку вручную, воспользуйтесь выделенной клавишей."
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_TITLE: Клавиша-аналог левой и правой кнопок мыши
ONBOARD_LEFT_AND_RIGHT_MOUSE_CLICK_BUTTON_DESCRIPTION: "Клавиша-аналог левой и правой кнопок мыши находятся в верхней левой части клавиатуры. Это позволяет осуществлять навигацию с помощью сенсорной панели правой рукой, а выбор делать левой рукой."
