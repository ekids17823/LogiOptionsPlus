PIPL_PAGE_DESC: "Logitech заботится о вашей конфиденциальности, и наши приложения становятся еще прозрачнее. Чтобы обеспечить нормальную работу Options+, компании Logitech необходимо собирать определенный набор персональных данных. Дополнительную информацию о собираемых данных можно найти здесь: {LOGITECH_PRIVACY_POLICY}. Эти разрешения можно просматривать и изменять в настройках в любой момент."
PIPL_PAGE_POLICY_PROCESS: "Я даю свое согласие на обработку моих персональных данных, как описано в документе {LOGITECH_PRIVACY_POLICY}"
PIPL_PAGE_POLICY_TRANSFER: "Я даю свое согласие на пересылку моих персональных данных за границу, как описано в документе {LOGITECH_PRIVACY_POLICY}"
PIPL_PAGE_POLICY_SHARE: "Я даю свое согласие на предоставление моих персональных данных доверенным партнерам и другим подразделениям Logitech, как описано в документе {LOGITECH_PRIVACY_POLICY}"
