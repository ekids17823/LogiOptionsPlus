ONBOARD_SCROLL_WHEEL_MODES_DESCRIPTION: "Колесико прокрутки автоматически переключается из режима построчной прокрутки в режим свободной прокрутки, когда пользователь начинает вращать его быстрее. Нажмите кнопку SmartShift, чтобы переключать режимы вручную."
ONBOARD_SETUP_DPI_SHIFT_TITLE: Технология SmartWheel и изменение чувствительности
ONBOARD_SCROLL_WHEEL_MODES_DESCRIPTION_V2: "Возможность переключения между режимами точной и быстрой прокрутки для мгновенного пролистывания длинных документов. Для переключения между двумя уровнями чувствительности нажмите кнопку переключения чувствительности. Одно нажатие кнопки — и указатель перемещается с большей скоростью или большей точностью."
