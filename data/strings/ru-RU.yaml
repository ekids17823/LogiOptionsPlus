ONBOARD_K860_ERGONIC_DESIGN: Удобный ввод текста
ONBOARD_K860_ERGONIC_DESIGN_DESCRIPTION: "Благодаря изогнутой форме клавиатуры и разделению блоков клавиш печатать стало еще удобнее. Кроме того, такая конструкция поможет вам держать ровную осанку при работе за компьютером. Наклонная поверхность уменьшит нагрузку на мышцы в запястьях и предплечьях — руки и плечи теперь можно расслабить."

ONBOARD_ERGO_M575_BENEFITS_TITLE: "Удобная эргономичная конструкция, созданная именно для вас"
ONBOARD_ERGO_M575_BENEFITS_DESCRIPTION: "Модель ERGO M575 имеет эргономичную форму, идеально повторяющую контуры ладони пользователя. Для перемещения курсора не нужно двигать всей рукой, поэтому усталость в руке и кисти уменьшается."

