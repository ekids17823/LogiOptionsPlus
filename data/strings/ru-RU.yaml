ONBOARD_MX_ERGO_BENEFITS_TITLE: Максимум удобства при минимуме движений
ONBOARD_MX_ERGO_BENEFITS_DESCRIPTION: "Для перемещения курсора не требуется двигать рукой, поэтому вы можете выполнять множество задач при минимуме движений. При использовании трекбола мышцы кисти, запястья и предплечья устают на 20 % меньше, чем при работе с обычной мышью."
