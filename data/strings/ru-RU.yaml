PIPL_PAGE_OPEN_OPTIONS: ОТКРЫТЬ OPTIONS+

PIPL_SETTINGS: Аналитика и использование данных
PIPL_SETTINGS_DESC: "Обратите внимание на то, что сбор определенного набора персональных данных необходим для работы этого программного обеспечения. Изменение этих настроек может привести к неправильной работе службы."
PIPL_SETTINGS_MODAL_TITLE: Отозвать согласие?
PIPL_SETTINGS_MODAL_DESC: "Отзыв согласия не повлияет на существующие конфигурации, однако создавать новые конфигурации в Options+ вы не сможете."
