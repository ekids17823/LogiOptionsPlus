ONBOARD_CUSTOMIZE_APP_SPECIFIC_SETTINGS: Специальные настройки для приложений
ONBOARD_APP_SPECIFIC_SETTINGS_DESCRIPTION: Настройте мышь для любого используемого приложения. Работайте быстрее благодаря некоторым из наших предварительно заданных настроек.
ONBOARD_APP_SPECIFIC_SETTINGS_NO_INSTALLED_APP_DESCRIPTION: "Работайте быстрее благодаря предварительно заданным настройкам, созданным для указанных ниже приложений."
