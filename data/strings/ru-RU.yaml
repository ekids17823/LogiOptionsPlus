##Craft Keyboard
ONBOARD_CRAFT_CUSTOMIZABLE_KEYS_DESCRIPTION: "Для верхней строки клавиатуры Craft уже назначены некоторые сочетания клавиш по умолчанию, но вы также можете создать свои собственные."
ONBOARD_CRAFT_F_ROW_KEYS_DESCRIPTION: "Вам нравятся элементы управления мультимедиа, но нужны клавиши F1, F2 и т. д.? Эти клавиши можно использовать в качестве стандартных функциональных клавиш. Для смены режима нажмите <strong>Esc+Fn.</strong> При этом режим работы клавиш переключается, и вам не нужно каждый раз удерживать клавишу Fn."
ONBOARD_CRAFT_BASED_ACTIONS_RING: Обновленное колесико-переключатель
ONBOARD_CRAFT_BASED_ACTIONS_RING_DESCRIPTION: "Наша миссия с Craft — <strong>оптимизировать ваш творческий процесс</strong>. Колесико-переключатель стало первым шагом на пути к предоставлению пользователю мгновенного доступа к основным инструментам с помощью прикосновения, нажатия и вращения. Основываясь на этом решении, мы <strong>расширили возможности</strong> функции Craft и колесика-переключателя и готовы показать вам, как это работает."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR: Мастерство — у вас под рукой
ONBOARD_CRAFT_BASED_ACTIONS_RING_CURSOR_DESCRIPTION: "Теперь при <strong>нажатии на колесико-переключатель</strong> будет запускаться <strong>Actions Ring</strong> — настраиваемое экранное наложение, которое обеспечивает непосредственный доступ к инструментам, фильтрам, настройкам, плагинам и многому другому — прямо в Ring и именно тогда, когда это необходимо."
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION: Действия для запуска
ONBOARD_CRAFT_BASED_ACTIONS_RING_LAUNCH_ACTION_DESCRIPTION: "Открыв Actions Ring, с помощью курсора <strong>выберите действие, которое нужно</strong> выполнить, и щелкните его."
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS: Выполните настройки
ONBOARD_CRAFT_BASED_ACTIONS_RING_CUSTOMIZE_ACTIONS_DESCRIPTION: "Для быстрой настройки достаточно <strong>навести курсор на действие и повернуть колесико- переключатель</strong>. Настройку можно также выполнить, <strong>щелкнув и перетащив действие курсором влево или вправо</strong>."
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION: Адаптация к вашим приложениям
ONBOARD_CRAFT_BASED_ACTIONS_RING_APP_CUSTOMIZATION_DESCRIPTION: "Actions Ring <strong>адаптируется к используемым приложениям</strong>, автоматически изменяя функции устройства для повышения эффективности. Можно использовать профили приложений по умолчанию или создать собственные для оптимизации рабочего процесса."
ONBOARD_CRAFT_START_SLIDE_NEW_DESCRIPTION: "Нажмите кнопку ниже, чтобы узнать, что изменилось в клавиатуре Craft после обновления до версии Options+."
ONBOARD_WORK_ANYWHERE_ACCESS_TITLE: "Все, что нужно для работы, где бы вы ни находились."
ONBOARD_WORK_ANYWHERE_ACCESS_DESCRIPTION: "{DEVICE_NAME} позволяет повысить работоспособность и улучшить осанку, где бы ни проходил ваш рабочий день."
ONBOARD_SET_UP_EMOJI_KEY: Клавиша эмодзи
ONBOARD_SET_UP_EMOJI_DESCRIPTION_V2: Клавиша эмодзи дает возможность мгновенно добавлять индивидуальности вашим сообщениям.
ONBOARD_SET_UP_PRINT_SCREEN_TITLE: Снимок экрана
ONBOARD_SET_UP_PRINT_SCREEN_DESCRIPTION_V2: "Возможность быстро сделать снимок всего экрана и сохранить его, нажав клавишу «Снимок экрана»."

