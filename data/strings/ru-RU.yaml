EULA_TEXT_1: "{openingTag}НАСТОЯЩЕЕ ЛИЦЕНЗИОННОЕ СОГЛАШЕНИЕ С КОНЕЧНЫМ ПОЛЬЗОВАТЕЛЕМ (далее — «Соглашение») ПРЕДСТАВЛЯЕТ СОБОЙ ЮРИДИЧЕСКОЕ СОГЛАШЕНИЕ МЕЖДУ ВАМИ И КОМПАНИЕЙ LOGITECH EUROPE S.A. (далее — «Logitech»). ВНИМАТЕЛЬНО ПРОЧТИТЕ ЭТО СОГЛАШЕНИЕ ПЕРЕД УСТАНОВКОЙ ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ ИЛИ НАЧАЛОМ РАБОТЫ С ПРОДУКТОМ LOGITECH. УСТАНАВЛИВАЯ ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ ИЛИ ИСПОЛЬЗУЯ ПРОДУКТ LOGITECH, ВЫ СОГЛАШАЕТЕСЬ С УСЛОВИЯМИ НАСТОЯЩЕГО СОГЛАШЕНИЯ. ЕСЛИ ВЫ НЕ СОГЛАСНЫ С УСЛОВИЯМИ НАСТОЯЩЕГО СОГЛАШЕНИЯ, ВЫ МОЖЕТЕ ВЕРНУТЬ ПРОДУКТ ДЛЯ ПОЛУЧЕНИЯ ДЕНЕЖНЫХ СРЕДСТВ В СООТВЕТСТВИИ С ПРАВИЛАМИ И УСЛОВИЯМИ ПОЛИТИКИ ВОЗВРАТА ТОВАРОВ ПРОДАВЦА, У КОТОРОГО ВЫ ПРИОБРЕЛИ ПРОДУКТ.{closingTag}{openingTag}ЕСЛИ ВЫ НЕ ДОСТИГЛИ ВОЗРАСТА СОВЕРШЕННОЛЕТИЯ, УСТАНОВЛЕННОГО ЗАКОНОМ ДЛЯ ВАШЕЙ СТРАНЫ ИЛИ РЕГИОНА ПРОЖИВАНИЯ, УСЛОВИЯ ДАННОГО ЛИЦЕНЗИОННОГО СОГЛАШЕНИЯ С КОНЕЧНЫМ ПОЛЬЗОВАТЕЛЕМ ДОЛЖЕН ПРОЧИТАТЬ И ПРИНЯТЬ ВАШ ЗАКОННЫЙ ПРЕДСТАВИТЕЛЬ.{closingTag}{openingTag} ЕСЛИ ВЫ ПРОЖИВАЕТЕ В СОЕДИНЕННЫХ ШТАТАХ АМЕРИКИ ЛИБО В ЭТОЙ СТРАНЕ РАСПОЛОЖЕНО ВАШЕ ОСНОВНОЕ КОММЕРЧЕСКОЕ ПРЕДПРИЯТИЕ, И ВЫ ПРИМЕНЯЕТЕ ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ ИЛИ ПРОДУКТ ИСКЛЮЧИТЕЛЬНО В ЛИЧНЫХ ЦЕЛЯХ ЛИБО ДЛЯ ДОМАШНЕГО ИСПОЛЬЗОВАНИЯ, ПРОЧТИТЕ РАЗДЕЛ 17 НИЖЕ, В КОТОРОМ ОПИСАНЫ АРБИТРАЖНЫЕ ПРОЦЕДУРЫ В СООТВЕТСТВИИ С ПРАВИЛАМИ УРЕГУЛИРОВАНИЯ СПОРОВ С ПОТРЕБИТЕЛЯМИ.{closingTag}{openingTag} СОГЛАСНО РАЗДЕЛУ 4 НИЖЕ, ВЫ СОГЛАШАЕТЕСЬ НА АВТОМАТИЧЕСКИЕ ОБНОВЛЕНИЯ ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ. ЕСЛИ ВЫ НЕ СОГЛАСНЫ С ТАКИМ УСЛОВИЕМ, НЕ ИСПОЛЬЗУЙТЕ ПРОДУКТ ИЛИ НЕ УСТАНАВЛИВАЙТЕ ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ. {closingTag}{openingTag}В РАЗДЕЛЕ «ОГРАНИЧЕНИЯ ПО ИСПОЛЬЗОВАНИЮ ПРОДУКТА» ПЕРЕЧИСЛЕНЫ ВАЖНЫЕ ОГРАНИЧЕНИЯ, КАСАЮЩИЕСЯ ОБЕСПЕЧЕНИЯ БЕЗОПАСНОСТИ ЖИЗНИ И ВОЗМОЖНЫХ ЧРЕЗВЫЧАЙНЫХ СИТУАЦИЙ ПРИ ИСПОЛЬЗОВАНИИ ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ И СОПУТСТВУЮЩИХ УСЛУГ. ВНИМАТЕЛЬНО ПРОЧТИТЕ ЭТОТ РАЗДЕЛ, ПОСКОЛЬКУ ВЫ ПРИНИМАЕТЕ ИЗЛОЖЕННЫЕ В НЕМ УСЛОВИЯ И ПОДТВЕРЖДАЕТЕ СВОЕ СОГЛАСИЕ С НИМИ. {closingTag}{openingTag} Термин «Программное обеспечение» — это (i) все без исключения программы или приложения, включая программное обеспечение, загруженное и установленное на компьютер или на мобильное устройство; (ii) все без исключения программы, встроенные в продукты Logitech; (iii) любая сопутствующая документация, измененные версии, обновления или улучшения таких программных средств (если иное прямо не предусмотрено различными условиями, действующими на момент обновления или загрузки), а также все последующие версии и копии такого программного обеспечения.{closingTag}{openingTag} Этим документом пользователю предоставляются определенные юридические права. Также возможно наличие других прав, предусмотренных местным законодательством.{closingTag}"
EULA_LICENSE: "В соответствии с условиями настоящего Соглашения компания Logitech предоставляет вам ограниченную неэксклюзивную лицензию на использование Программного обеспечения исключительно с приобретенным продуктом Logitech или используемой вами службой Logitech. За исключением приложений, встроенных в продукты Logitech, Программное обеспечение можно копировать только в целях архивирования или создания резервных копий для использования Программного обеспечения в установленных рамках, а также для размещения на внутреннем домашнем или внутреннем корпоративном сетевом сервере исключительно с целью загрузки на устройства, которыми вы владеете или которыми управляете у себя дома или в организации, но единственно с целью использования Программного обеспечения по условиям Соглашения. Каждая копия должна содержать все уведомления об авторских правах и других правах собственности, предусмотренные в оригинале. Для владения или управления встроенным программным обеспечением или при использовании вами службы Logitech. Вы можете передать Программное обеспечение в постоянное пользование другому лицу вместе с продуктом Logitech, использующим это Программное обеспечение, если получатель обязуется выполнять условия настоящего Соглашения, а вы после такой передачи прекращаете использование продукта и Программного обеспечения."
EULA_RESTRICTIONS: "Вы не имеете права (и обязуетесь не разрешать другим лицам): а) лицензировать, продавать, давать напрокат, сдавать в аренду, передавать в собственность (за исключением случаев, прямо предусмотренных в Разделе 1), распространять, публиковать в сети, передавать на внешний подряд, обнародовать или иным образом использовать это Программное обеспечение в коммерческих целях либо предоставлять к нему доступ третьим лицам; б) копировать Программное обеспечение (за исключением случаев, прямо разрешенных в Разделе 1); в) выполнять обратное проектирование или пытаться получить исходный код, создавать производные продукты либо установочные пакеты, декомпилировать или дизассемблировать Программное обеспечение или любую его часть (кроме случаев, прямо разрешенных действующим законодательством); г) удалять или изменять в Программном обеспечении товарные знаки, эмблемы, уведомления об авторских правах и других правах собственности, условные обозначения и пояснения к ним, символы или метки."
EULA_OWNERSHIP: "Компания Logitech и ее лицензиары сохраняют за собой все права, правовые титулы и интересы в отношении Программного обеспечения, а также все соответствующие авторские права и другие виды прав на интеллектуальную собственность. Компания Logitech не продает вам Программное обеспечение, а предоставляет лицензию на его использование и сохраняет за собой все права, о передаче которых не сообщалось прямо."
EULA_AUTOMATIC_SOFTWARE_UPDATES: "Компания Logitech может периодически вносить изменения в Программное обеспечение для его обновления, усовершенствования, исправления ошибок либо с другой целью (далее — «Обновления»). Обновления могут устанавливаться автоматически без дополнительных уведомлений и получения согласия пользователя. Вы даете согласие на получение автоматических Обновлений. Если вы не хотите получать такие Обновления, прекратите использование данного Продукта. Условия настоящего Соглашения распространяются на любые Обновления, предоставляемые Logitech, которые заменяют и (или) дополняют исходное Программное обеспечение, за исключением случаев, когда Обновления сопровождаются отдельной лицензией, — тогда преимущественную силу будет иметь такая лицензия."
EULA_APPLICATION_STORE: "На Программное обеспечение, загруженное из магазина или другой точки продажи приложений, например Apple App Store, Apple Mac Store или Google Play (далее — «Магазин приложений»), также распространяются условия использования от этого Магазина приложений. Если на Программное обеспечение распространяются условия использования от Магазина приложений, в случае несоответствия или противоречия между условиями использования от Магазина приложений и положениями настоящего Соглашения преимущественную силу имеют условия от Магазина приложений, но только в пределах, необходимых для устранения такого несоответствия или противоречия; при этом остальные положения настоящего Соглашения остаются в силе без изменений. Вы признаете, что: (i) данное Соглашение заключается между компанией Logitech и вами, но не с Магазином приложений; (ii) Магазин приложений не обязан предоставлять какую-либо поддержку или техническое обслуживание в отношении любого Программного обеспечения, загруженного из него; (iii) Logitech, а не Магазин приложений, будет нести ответственность, предусмотренную настоящим Соглашением (за исключением случаев, на которые распространяется отказ от ответственности), за любые гарантии качества, претензии к продукции и интеллектуальной собственности в отношении Программного обеспечения, загруженного из Магазина приложений. В любом случае максимальная ответственность Магазина приложений по любой гарантии состоит в возврате стоимости покупки (если таковая имеется) Программного обеспечения; (iv) компания Apple и ее дочерние компании являются сторонними бенефициарами данного Соглашения в отношении Программного обеспечения, загружаемого из магазинов Apple App Store и Mac Store."
EULA_PRIVACY: "Наши правила конфиденциальности описаны в нашей {link}, а также в отдельных положениях о конфиденциальности (совокупно именуемых «Политика конфиденциальности»), которые предоставляются вместе с приобретаемым, загружаемым или используемым программным обеспечением, приложением, продуктом или услугой. В случае установки Программного обеспечения, использования продуктов Logitech или предоставления нам персональной информации вы принимаете и подтверждаете согласие с правилами, условиями и положениями, описанными в Политике конфиденциальности и отдельных положениях о конфиденциальности. Данное Соглашение содержит ссылку на нашу Политику конфиденциальности."
EULA_OPEN_SOURCE: "Условия настоящего Соглашения не распространяются на любое программное обеспечение с открытым исходным кодом, которое может включаться в состав предоставляемого Программного обеспечения (далее — «Компоненты с открытым исходным кодом»). Сведения об используемых в Программном обеспечении Компонентах с открытым исходным кодом и перечень связанных применимых лицензий можно просмотреть на странице: {link}. Использование вами каждого Компонента с открытым исходным кодом регулируется положениями соответствующей применимой лицензии для конечного пользователя, сопровождающей такой Компонент с открытым исходным кодом. Вы обязаны согласиться с положениями каждой применимой лицензии; в противном случае вы не должны использовать данное Программное обеспечение. Ни одно из условий настоящего Лицензионного соглашения не ограничивает и не отменяет никакие ваши права согласно условиям и положениям любой применимой лицензии для конечных пользователей на Компоненты с открытым исходным кодом."
EULA_THIRD_PARTY_SOFTWARE: "Программное обеспечение и Продукт могут использоваться в сочетании с другими продуктами и программным обеспечением и содержать ссылки на них или связанные элементы интерфейса, а также содержимое и данные программного обеспечения сторонних производителей (далее — «Программное обеспечение сторонних производителей»). Такое Программное обеспечение сторонних производителей должно использоваться в соответствии с условиями, оговоренными его лицензиаром, включая соответствие политике конфиденциальности сторонних производителей. Запуская и используя Программное обеспечение сторонних производителей, вы даете свое согласие следовать применимым политикам конфиденциальности таких производителей. Logitech не делает никаких заявлений и не дает гарантий относительно работы или доступности такого Программного обеспечения сторонних производителей. Ни компания Logitech, ни ее лицензиары не несут ответственности за удаление такого Программного обеспечения сторонних производителей или его недоступность."
EULA_TERMINATION: "Данное Соглашение остается в силе до момента его расторжения. Каждая из сторон имеет право в любой момент расторгнуть Соглашение по любой причине. В случае нарушения условий Соглашения вы автоматически, без уведомления от компании Logitech, теряете право на использование Программного обеспечения. После расторжения Соглашения вы должны прекратить использование Программного обеспечения и удалить все его копии, которыми обладаете или распоряжаетесь. Условия разделов 6, 7, 8, 9 10, 11, 12, 16, 17 и 18 сохраняют юридическую силу даже после расторжения Соглашения. Компания Logitech не гарантирует доступность данного Программного обеспечения или Обновлений в будущем и не несет ответственности за удаление или недоступность Программного обеспечения или Обновлений. Компания Logitech не обязана обеспечивать техническое обслуживание или поддержку в отношении данного Программного обеспечения."
EULA_WARRANTY_DISCLAIMER: 'В МАКСИМАЛЬНОЙ СТЕПЕНИ, ДОПУСТИМОЙ ДЕЙСТВУЮЩИМ ЗАКОНОДАТЕЛЬСТВОМ, ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ И УСЛУГИ LOGITECH ПРЕДОСТАВЛЯЮТСЯ НА УСЛОВИЯХ «КАК ЕСТЬ», СО ВСЕМИ НЕДОСТАТКАМИ И БЕЗ КАКИХ-ЛИБО ГАРАНТИЙ. ВЫ В ЯВНОМ ВИДЕ ПРИЗНАЕТЕ И СОГЛАШАЕТЕСЬ С ТЕМ, ЧТО, ЗА ИСКЛЮЧЕНИЕМ СЛУЧАЕВ, РАЗРЕШЕННЫХ ПРИМЕНИМЫМ ЗАКОНОДАТЕЛЬСТВОМ, ВЫ ИСПОЛЬЗУЕТЕ ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ И УСЛУГИ LOGITECH НА СВОЙ СОБСТВЕННЫЙ РИСК И НЕ ПЕРЕКЛАДЫВАЕТЕ НА КОГО-ЛИБО ОТВЕТСТВЕННОСТЬ ЗА ИХ ДОЛЖНОЕ КАЧЕСТВО, ЭФФЕКТИВНОСТЬ, ТОЧНОСТЬ И ПРИМЕНИМОСТЬ. НАСТОЯЩИМ КОМПАНИЯ LOGITECH И ЕЕ ЛИЦЕНЗИАРЫ ОТКАЗЫВАЮТСЯ ОТ ПРЕДОСТАВЛЕНИЯ ЛЮБЫХ ГАРАНТИЙ И УСЛОВИЙ В ОТНОШЕНИИ ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ И УСЛУГ LOGITECH (ЯВНЫХ, ПОДРАЗУМЕВАЕМЫХ ИЛИ ПРЕДУСМОТРЕННЫХ ЗАКОНОДАТЕЛЬСТВОМ), ВКЛЮЧАЯ, БЕЗ ОГРАНИЧЕНИЯ, ПОДРАЗУМЕВАЕМЫЕ ГАРАНТИИ И (ИЛИ) УСЛОВИЯ ПРИГОДНОСТИ ДЛЯ ПРОДАЖИ, УДОВЛЕТВОРИТЕЛЬНОГО КАЧЕСТВА, СООТВЕТСТВИЯ ОПРЕДЕЛЕННОЙ ЦЕЛИ, ТОЧНОСТИ, БЕСПРЕПЯТСТВЕННОГО ВЛАДЕНИЯ И НЕНАРУШЕНИЯ ПРАВ ТРЕТЬИХ СТОРОН. LOGITECH НЕ ДАЕТ ГАРАНТИЙ НЕВМЕШАТЕЛЬСТВА В ИСПОЛЬЗОВАНИЕ ВАМИ ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ ИЛИ УСЛУГ LOGITECH, А ТАКЖЕ НЕ ГАРАНТИРУЕТ, ЧТО ФУНКЦИИ, РЕАЛИЗОВАННЫЕ В ПРОГРАММНОМ ОБЕСПЕЧЕНИИ ИЛИ УСЛУГАХ LOGITECH, БУДУТ СООТВЕТСТВОВАТЬ ВАШИМ ТРЕБОВАНИЯМ, ЧТО РАБОТА ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ ИЛИ УСЛУГ LOGITECH БУДЕТ БЕСПЕРЕБОЙНОЙ И БЕЗОШИБОЧНОЙ ЛИБО ЧТО ДЕФЕКТЫ В ПРОГРАММНОМ ОБЕСПЕЧЕНИИ ИЛИ УСЛУГАХ LOGITECH БУДУТ УСТРАНЕНЫ. НИ ОДИН ИЗ ДИЛЕРОВ, АГЕНТОВ ИЛИ СОТРУДНИКОВ LOGITECH НЕ ИМЕЕТ ПРАВА ИЗМЕНЯТЬ, РАСШИРЯТЬ ИЛИ ДОПОЛНЯТЬ ЭТОТ ОТКАЗ ОТ ПРЕДОСТАВЛЕНИЯ ГАРАНТИЙ.'
EULA_WARRANTY_DISCLAIMER_ADDON: "Если действующее законодательство не допускает исключения подразумеваемых гарантий или ограничения применимых законных прав потребителя, то указанное выше исключение или ограничение может не распространяться на вас."
EULA_LIMITATION_OF_LIABILITY: "В ТОЙ МЕРЕ, В КОТОРОЙ ЭТО НЕ ЗАПРЕЩАЕТСЯ ДЕЙСТВУЮЩИМ ЗАКОНОДАТЕЛЬСТВОМ, LOGITECH И ЕЕ ЛИЦЕНЗИАРЫ НИ ПРИ КАКИХ ОБСТОЯТЕЛЬСТВАХ НЕ НЕСУТ ОТВЕТСТВЕННОСТИ ЗА ИЗДЕРЖКИ, СВЯЗАННЫЕ С ПРИОБРЕТЕНИЕМ ПРОДУКТОВ, ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ И УСЛУГ ДЛЯ ЗАМЕНЫ, ЗА УПУЩЕННУЮ ВЫГОДУ, ПОТЕРЮ ДАННЫХ ИЛИ ИНФОРМАЦИИ, А ТАКЖЕ ЗА ЛЮБОЙ ДРУГОЙ ФАКТИЧЕСКИЙ УЩЕРБ В РЕЗУЛЬТАТЕ ОСОБЫХ ОБСТОЯТЕЛЬСТВ, КОСВЕННЫЙ, ПОСЛЕДУЮЩИЙ ИЛИ СЛУЧАЙНЫЙ УЩЕРБ, КАКИМ-ЛИБО ОБРАЗОМ СВЯЗАННЫЙ С ПРОДАЖЕЙ, ЛИЦЕНЗИРОВАНИЕМ, ИСПОЛЬЗОВАНИЕМ ИЛИ НЕВОЗМОЖНОСТЬЮ ИСПОЛЬЗОВАНИЯ КАКОГО-ЛИБО ПРОДУКТА, ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ ИЛИ УСЛУГИ LOGITECH, НЕЗАВИСИМО ОТ ПРИЧИНЫ И ВИДА ОТВЕТСТВЕННОСТИ (ДОГОВОР, ПРАВОНАРУШЕНИЕ ИЛИ ИНОЕ), ДАЖЕ ЕСЛИ ПРЕДСТАВИТЕЛИ LOGITECH БЫЛИ ЗАРАНЕЕ ИЗВЕЩЕНЫ О ВОЗМОЖНОСТИ ТАКОГО УЩЕРБА. НИ ПРИ КАКИХ ОБСТОЯТЕЛЬСТВАХ СОВОКУПНАЯ ОТВЕТСТВЕННОСТЬ LOGITECH И ЕЕ ЛИЦЕНЗИАРОВ НЕ МОЖЕТ ПРЕВЫШАТЬ СУММЫ, ФАКТИЧЕСКИ УПЛАЧЕННОЙ ЗА ПРОДУКТ, ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ ИЛИ УСЛУГУ LOGITECH, КОТОРЫЕ ПОСЛУЖИЛИ ПРИЧИНОЙ ВОЗНИКНОВЕНИЯ УКАЗАННОЙ ОТВЕТСТВЕННОСТИ. Упомянутые ограничения применяются даже в тех случаях, когда вышеуказанное средство возмещения не достигает своей основной цели. Если действующее законодательство не допускает отказа от ответственности или ограничения ответственности за косвенный или случайный ущерб, то указанное выше ограничение на вас не распространяется. Указанные выше ограничения не распространяются на те случаи и на ту степень нанесения ущерба здоровью, ответственность за которые предусматривается действующим законодательством."
EULA_PRODUCT_LIMITATIONS: "ДАННОЕ ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ НЕ ПРЕДНАЗНАЧЕНО ДЛЯ ИСПОЛЬЗОВАНИЯ НА ЯДЕРНЫХ ОБЪЕКТАХ, В АЭРОНАВИГАЦИОННЫХ СИСТЕМАХ И СИСТЕМАХ АВИАЦИОННОЙ СВЯЗИ, В СИСТЕМАХ УПРАВЛЕНИЯ ВОЗДУШНЫМ ДВИЖЕНИЕМ, МЕДИЦИНСКИХ ПРИБОРАХ И НА ИНОМ ОБОРУДОВАНИИ, ГДЕ ОТКАЗ ПРОГРАММНОГО ОБЕСПЕЧЕНИЯ МОЖЕТ ПРИВЕСТИ К ГИБЕЛИ ЛЮДЕЙ, ТРАВМАМ ЛИБО СЕРЬЕЗНОМУ ФИЗИЧЕСКОМУ ИЛИ ЭКОЛОГИЧЕСКОМУ УЩЕРБУ. ВЫ ПРИЗНАЕТЕ, ЧТО ДАННОЕ ПРОГРАММНОЕ ОБЕСПЕЧЕНИЕ НЕ СЕРТИФИЦИРОВАНО ДЛЯ ИСПОЛЬЗОВАНИЯ В ЧРЕЗВЫЧАЙНЫХ СИТУАЦИЯХ И НЕ ДОЛЖНО ИСПОЛЬЗОВАТЬСЯ В ТАКИХ УСЛОВИЯХ. КОМПАНИЯ LOGITECH НЕ ОТСЛЕЖИВАЕТ ЭКСТРЕННЫЕ ОПОВЕЩЕНИЯ И НЕ БЕРЕТ НА СЕБЯ ОБЯЗАТЕЛЬСТВО ПО ВЫЗОВУ СЛУЖБ ЭКСТРЕННОЙ ПОМОЩИ К ВАМ НА ДОМ."
EULA_US_GOVERNMENT_END_USERS: 'Согласно определению, данному в Своде федеральных правил (титул 48, п. 2.101), ПО является «коммерческим продуктом», состоящим из «коммерческого компьютерного программного обеспечения» и «документации на коммерческое компьютерное программное обеспечение». Конечным пользователям, работающим в Правительстве США, лицензия на ПО предоставляется: а) только как на коммерческий продукт и б) только с теми же правами, которые даются всем остальным конечным пользователям в соответствии с условиями настоящего Лицензионного соглашения. Права на неопубликованные материалы охраняются в соответствии с законами США об авторском праве.'
EULA_EXPORT_LAW_ASSURANCES: "Вы признаете, что не имеете права экспортировать и реэкспортировать ПО с нарушением каких-либо действующих законов или норм, включая (без ограничений) законодательство Соединенных Штатов Америки, Европейского союза, Швейцарии и (или) законы либо нормативные положения других стран, где было приобретено ПО."
EULA_AGENTS: "Если вы приобретаете данное Программное обеспечение от имени другого лица или организации, то настоящим вы заявляете и гарантируете, что обладаете полномочиями, позволяющими обеспечить выполнение условий и положений настоящего Соглашения со стороны лица или организации, для которых вы приобретаете это Программное обеспечение. Вы заверяете, что достигли установленного законодательством вашей страны возраста, чтобы запускать и использовать такое Программное обеспечение, а также чтобы заключить настоящее Соглашение."
EULA_CONTROLLING_LAW_1: "Если вы находитесь на территории США, настоящее Соглашение регулируется и трактуется исключительно в соответствии с законодательством США и штата Калифорния без учета принципов коллизионного права или их применения. Если вы находитесь за пределами США, настоящее Соглашение регулируется исключительно законодательством Швейцарии. Если какое-либо положение Лицензионного соглашения будет признано недействительным, стороны, несмотря на это, соглашаются, что намерения сторон, отраженные в данном положении, и другие положения Лицензионного соглашения должны иметь полную силу."
EULA_CONTROLLING_LAW_2: "Если вы проживаете в Соединенных Штатах Америки и применяете Программное обеспечение или Продукт исключительно в личных целях и для домашнего использования, прочтите раздел 17 ниже."
EULA_ARBITRATION: "Любой спор, возникающий между вами и Logitech, должен быть разрешен путем разбирательства в арбитражном суде в соответствии с правилами урегулирования потребительских споров («Правила») Американской арбитражной ассоциации с вынесением решения, которое является окончательным и не подлежит обжалованию; с тем исключением, что споры, которые в иных условиях квалифицировались бы как мелкие тяжбы, по выбору одной из сторон и до назначения судьи арбитража могут быть перенесены в суд по мелким искам компетентной юрисдикции. Арбитраж проводится одним судьей, выбранным по взаимному согласию сторон или в соответствии с процедурой отбора, установленной Правилами. Расходы по арбитражному разбирательству должны быть соразмерно разделены между сторонами в соответствии с установленной Правилами процедурой. Решение арбитража является окончательным и юридически обязывающим для всех сторон без права обжалования. ВО ИЗБЕЖАНИЕ ПОТЕРИ ДОКАЗАТЕЛЬСТВ И ОБЕСПЕЧЕНИЯ ОПЕРАТИВНОГО УРЕГУЛИРОВАНИЯ ПРЕТЕНЗИЙ, ВОЗНИКАЮЩИХ ПО ДАННОМУ СОГЛАШЕНИЮ, СТОРОНА, ПОДАЮЩАЯ ИСК В СООТВЕТСТВИИ С НАСТОЯЩИМ СОГЛАШЕНИЕМ, ДОЛЖНА ПРЕДОСТАВИТЬ ДРУГОЙ СТОРОНЕ ПИСЬМЕННОЕ УВЕДОМЛЕНИЕ О СВОЕЙ ПРЕТЕНЗИИ В ТЕЧЕНИЕ 1 (ОДНОГО) ГОДА ИЛИ В ТЕЧЕНИЕ МИНИМАЛЬНОГО СРОКА, ТРЕБУЕМОГО В СООТВЕТСТВИИ С ЗАКОНОДАТЕЛЬСТВОМ, ЕСЛИ ОН СОСТАВЛЯЕТ БОЛЬШЕ 1 (ОДНОГО) ГОДА С ДАТЫ НАСТУПЛЕНИЯ СОБЫТИЯ ИЛИ ФАКТОВ, СТАВШИХ ПОВОДОМ ДЛЯ ПРЕТЕНЗИИ; В ПРОТИВНОМ СЛУЧАЕ ТАКАЯ СТОРОНА УТРАЧИВАЕТ ПРАВО ПОДАВАТЬ ПРЕТЕНЗИИ, ОСНОВАННЫЕ НА ТАКИХ СОБЫТИЯХ ИЛИ ФАКТАХ."
EULA_ENTIRE_AGREEMENT: "Настоящее соглашение является полным соглашением между вами и компанией Logitech и заменяет собой все предшествующие соглашения, письменные или устные, в отношении Программного обеспечения. Все переводы Лицензионного соглашения выполняются в соответствии с местными требованиями, и в случае расхождений между текстами на английском языке и на языке перевода преимущественную силу имеет англоязычная версия настоящего Лицензионного соглашения."

