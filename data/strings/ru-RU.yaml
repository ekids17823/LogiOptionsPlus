# MX-Keys Onboard strings start
ONBOARD_SET_UP_SMART_BACKLIGHTING: Подсветка
ONBOARD_SMART_BACKLIGHTING_DESCRIPTION: Датчик освещенности регулирует яркость подсветки для экономии заряда при достаточном естественном освещении. Можно также регулировать яркость подсветки вручную с помощью двух выделенных клавиш.
ONBOARD_SET_UP_SMART_BACKLIGHTING_TITLE: Умная подсветка
ONBOARD_SET_UP_SMART_BACKLIGHTING_DESCRIPTION: "Чтобы выбрать эффект подсветки для клавиатуры, необходимо нажимать комбинацию клавиш Fn + Lightbulb или открыть список ниже"
ONBOARD_SET_UP_BATTERY_NOTIFICATION: Уведомления о низком уровне заряда батареи
ONBOARD_BATTERY_NOTIFICATION_DESCRIPTION: "Подсветка отключается, когда уровень заряда батареи снижается до 10 %. Светодиод мигает красным, а на экране появляется уведомление. Для подзарядки устройства используйте кабель USB-C."
ONBOARD_EASY_SWITCH: Easy-Switch
ONBOARD_SET_UP_CUSTOMIZE_KEYS: Назначение функций клавишам
ONBOARD_CUSTOMIZE_KEYS_DESCRIPTION: "Мы задали некоторые сочетания клавиш по умолчанию, но вы также можете создать свои собственные."
ONBOARD_SET_YOUR_F_KEYS: Настройка F-клавиш
ONBOARD_SET_YOUR_F_KEYS_DESCRIPTION: "Переключайтесь между клавишами управления мультимедиа и функциональными клавишами в любой момент, нажав Fn+Esc. Используйте функциональные клавиши свободно, без необходимости удерживать клавишу Fn."
ONBOARD_SET_UP_MUTE_UNMUTE: Отключить/включить звук
ONBOARD_MUTE_UNMUTE_DESCRIPTION: "Чтобы отключить/включить звук во время проведения видеоконференции, нажмите на кнопку микрофона."
ONBOARD_MUTE_UNMUTE_DESCRIPTION_1: "Нажмите эту клавишу, чтобы включить или выключить микрофон во время звонка."
ONBOARD_SET_UP_DICTATION_AND_EMOJI: Диктовка и эмодзи
ONBOARD_SET_UP_DICTATION_AND_EMOJI_SCREENSHOT: "Клавиши диктовки, эмодзи и снимка экрана"
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION: Нажмите на клавишу диктовки для голосового ввода текста в выбранном текстовом поле. Быстрый доступ к смайлику с помощью специальной клавиши.
ONBOARD_DICTATION_AND_EMOJI_DESCRIPTION_SCREENSHOT: "Нажмите на кнопку диктовки, чтобы начать произносить текст, который появится в активном текстовом поле. Вы также можете быстро открыть панель эмодзи с помощью специальной клавиши. Без труда делайте снимки содержимого экрана с помощью соответствующей клавиши."
ONBOARD_SET_UP_DO_NOT_DISTURB: Не беспокоить
ONBOARD_DO_NOT_DISTURB_DESCRIPTION: "Активируйте на компьютере Mac режим «Не беспокоить», чтобы сосредоточиться именно на той задаче, которая больше всего требует внимания на данный момент."
ONBOARD_NEXT_TRACK: Следующая композиция
ONBOARD_NEXT_TRACK_DESCRIPTION: "Чтобы пропустить композицию, дважды нажмите на кнопку воспроизведения или паузы."
ONBOARD_SET_UP_EMOJI_MENU: Меню эмодзи
ONBOARD_EMOJI_MENU_DESCRIPTION: "Кроме того, можно раскрыть меню, в котором представлены разнообразные эмодзи, и выбрать подходящий по настроению символ."
ONBOARD_SET_UP_CUSTOMIZE_KEYS_CAPS: Настройте клавиши под себя
ONBOARD_CUSTOMIZE_KEYS_CAPS_DESCRIPTION: "Установите эмодзи для каждой из 8 специальных клавиш, чтобы получить возможность проявить свою индивидуальность в сети. Меняйте символы клавиш и настраивайте их так, как вам нравится."
ONBOARD_OPEN_CLOSE_TAB: Открыть новую вкладку и закрыть используемую вкладку браузера
ONBOARD_OPEN_CLOSE_TAB_DESCRIPTION: "Нажмите клавишу, чтобы открыть новую вкладку и закрыть уже используемую вкладку браузера."
ONBOARD_LANGUAGE_SWITCH: Выбор языка
ONBOARD_LANGUAGE_SWITCH_DESCRIPTION: "Нажмите клавишу переключения языка, чтобы перейти к настройкам ввода текста на клавиатуре."
ONBOARD_KEYS_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Выполните сопряжение клавиатуры с 2 устройствами и с легкостью переключайтесь между ними нажатием кнопки Easy-Switch™. {DEVICE_NAME} можно одновременно использовать на ноутбуке, компьютере или планшете."
ONBOARD_MICE_TWO_CHANNELS_EASY_SWITCH_DESCRIPTION: "Выполните сопряжение мыши с несколькими устройствами (до 2-х) и с легкостью переключайтесь между ними нажатием кнопки Easy-Switch™. {DEVICE_NAME} можно одновременно использовать на ноутбуке, компьютере или планшете."
ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION: "Выполните сопряжение клавиатуры с 3 устройствами и с легкостью переключайтесь между ними нажатием кнопки Easy-Switch™. {DEVICE_NAME} можно одновременно использовать на ноутбуке, компьютере или планшете."
ONBOARD_KEYS_EASY_SWITCH_DESCRIPTION_V2: "Выполните сопряжение клавиатуры с тремя устройствами и с легкостью переключайтесь между ними нажатием клавиши Easy-Switch™. Клавиатуру {DEVICE_NAME} можно одновременно использовать для телефона, ноутбука или компьютера."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION: "Выполните сопряжение мыши с несколькими устройствами (до 3-х) и с легкостью переключайтесь между ними нажатием кнопки Easy-Switch™. {DEVICE_NAME} можно одновременно использовать на ноутбуке, компьютере или планшете."
ONBOARD_MICE_EASY_SWITCH_DESCRIPTION_V2: "Выполните сопряжение мыши с несколькими устройствами (до 3-х) и переключайтесь между ними нажатием кнопки Easy-Switch™. Одно устройство {DEVICE_NAME} можно использовать для ноутбука, компьютера или планшета."
ONBOARD_KEYS_K480_EASY_SWITCH_DESCRIPTION: "Выполните сопряжение клавиатуры с тремя устройствами и с легкостью переключайтесь между ними с помощью регулятора. {DEVICE_NAME} можно одновременно использовать на ноутбуке, компьютере или планшете."
# MX-Keys Onboard strings end

# K800 Onboard strings start
ONBOARD_BATTERY_NOTIFICATION: Уведомление об уровне заряда батареи
ONBOARD_SET_UP_BATTERY_NOTIFICATION_DESCRIPTION: При низком уровне заряда батареи индикатор ее состояния горит красным светом. Для зарядки клавиатуры используйте зарядный кабель из ее комплекта поставки.
ONBOARD_F_KEY_DESCRIPTION: "Удобные функциональные клавиши позволяют легко запускать приложения. Чтобы воспользоваться расширенными функциями (обозначены желтыми значками), сначала нажмите и удерживайте клавишу ‘/, а затем нажмите F-клавишу, которую хотите использовать."
